default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v3.0.0
  hooks:
  - id: ai-rulez-generate
  - id: trailing-whitespace
  - id: end-of-file-fixer
  - id: check-merge-conflict
  - id: check-yaml
  - id: check-added-large-files
    args:
    - --maxkb=500
  - id: detect-private-key
  - id: check-case-conflict
  - id: checkstyle
  - id: cpd
  - id: java-verify
  - id: rumdl-fmt
  - id: actionlint
  - id: gh-actions-updater
  - id: typos
    args:
    - --force-exclude
- repo: local
  hooks:
  - id: spotless-check
    name: spotless (java formatting)
    entry: mvn spotless:check --batch-mode -q
    language: system
    pass_filenames: false
    files: \.java$
