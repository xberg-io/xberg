default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|scripts/ci/|^e2e/|^packages/|^crates/kreuzberg-(py|node|ffi|php|wasm)/|^docs/reference/api-|\.cache/|\.venv/|rust-vendor/
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/kreuzberg-dev/pre-commit-hooks
  rev: v2.0.0
  hooks:
    # AI governance
    - id: ai-rulez-generate

    # File safety
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: check-merge-conflict
    - id: check-added-large-files
      exclude: uv.lock|docs/benchmarks/app/
    - id: detect-private-key
    - id: check-case-conflict
    - id: check-executables-have-shebangs
    - id: check-shebang-scripts-are-executable
    - id: mixed-line-ending
    - id: typos
      args: ["--force-exclude"]
    - id: check-json
    - id: check-yaml
      args:
      - --allow-multiple-documents
      - --unsafe
      exclude: ^charts/
    - id: check-toml

    # GitHub Actions
    - id: actionlint
    - id: gh-actions-updater

    # Shell
    - id: shfmt
      args: ["-w", "-i", "2"]
    - id: shellcheck
      args:
      - -x

    # Markdown
    - id: rumdl-fmt
      exclude: ^templates/
    - id: markdownlint-rumdl-strict
    - id: textlint
      files: ^docs/.*\.md$
      exclude: ^docs/(reference/|api-|snippets/|migration/)
      args:
      - --fix
      - --config
      - .textlintrc.json

    # Rust — cargo-check dropped in v2.0.0; cargo-clippy with -D warnings supersedes it
    - id: cargo-fmt
      args: ["--all"]
    - id: cargo-clippy
      args:
      - --fix
      - --allow-dirty
      - --allow-staged
      - --workspace
      - --exclude=kreuzberg-ffi
      - --exclude=kreuzberg-py
      - --exclude=kreuzberg-node
      - --exclude=kreuzberg-php
      - --exclude=kreuzberg-wasm
      - --exclude=kreuzberg-dart
      - --exclude=kreuzberg-swift
      - --all-features
      - --all-targets
      - --
      - -D
      - warnings
    - id: cargo-sort
      exclude: ^(crates/kreuzberg-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust)/Cargo\.toml$
    - id: cargo-machete
      args:
      - crates/
      - packages/
      - tools/
      exclude: ^e2e/
    - id: cargo-deny
      args: ["check"]
    - id: rustdoc-lint
    - id: rust-max-lines
      args: ["--max=1000"]

    # Python
    - id: pyproject-fmt
    - id: ruff
    - id: ruff-format
    - id: mypy
      files: ^(lib|src|kreuzberg|tools)/.*\.py$
      exclude: e2e/|tests/|scripts/
    - id: pydocstyle
      files: ^packages/python/.*\.py$
      exclude: ^packages/python/(tests/|.*_native\.py$)

    # JS/TS
    - id: oxlint
    - id: oxfmt
    - id: tsc-typecheck
    - id: tsdoc-lint

    # Go
    - id: go-fmt
      exclude: ^(e2e/|test_apps/|tools/)
    - id: golangci-lint
      exclude: ^(e2e/|test_apps/|tools/)
    - id: govulncheck
      exclude: ^(e2e/|test_apps/|tools/)
    - id: godoc-lint

    # Java
    - id: palantir-java-format
    - id: checkstyle
      args:
      - -c
      - packages/java/checkstyle.xml
      - -p
      - packages/java/checkstyle.properties
      exclude: ^(\.mvn/wrapper/|e2e/|tools/e2e-generator/e2e/|crates/kreuzberg-wasm/e2e/|packages/java/src/)
    - id: pmd
    - id: cpd
    - id: java-verify
      files: ^packages/java/
    - id: javadoc-lint
      files: ^packages/java/src/main/.*\.java$

    # Kotlin (Android target)
    - id: ktfmt
      args:
      - --kotlinlang-style
      files: ^packages/kotlin-android/.*\.kts?$
    - id: detekt
      args:
      - --build-upon-default-config
      files: ^packages/kotlin-android/.*\.kts?$
    - id: ktlint
      files: ^packages/kotlin-android/.*\.kts?$
    - id: kotlin-dokka

    # Ruby
    - id: rubocop
      files: ^packages/ruby/.*\.rb$
    - id: rubocop-lint
      files: ^packages/ruby/.*\.(rb|rbs)$
    - id: steep
      files: ^packages/ruby/.*\.(rb|rbs)$
    - id: yard-coverage

    # C#
    - id: dotnet-format
      files: ^packages/csharp/.*\.cs$
    - id: dotnet-format-check
      files: ^packages/csharp/.*\.cs$
    - id: cs-xmldoc-lint
      files: ^packages/csharp/Kreuzberg/.*\.cs$

    # PHP
    - id: php-cs-fixer
      files: ^packages/php/.*\.php$
    - id: phpstan
      files: ^packages/php/.*\.php$
    - id: phpdoc-lint
      files: ^packages/php/src/.*\.php$

    # Elixir
    - id: mix-format
      files: ^packages/elixir/
    - id: mix-credo
      files: ^packages/elixir/
    - id: ex-doc-coverage

    # R
    - id: air-format
      files: ^packages/r/.*\.[Rr]$
    - id: air-check
      files: ^packages/r/.*\.[Rr]$
    - id: lintr
      files: ^packages/r/.*\.[Rr]$
    - id: roxygen2-check
      files: ^packages/r/R/.*\.R$

    # Swift
    - id: swift-format
      files: ^packages/swift/.*\.swift$
    - id: swiftlint
      files: ^packages/swift/.*\.swift$
    - id: swift-doc-coverage

    # Dart
    - id: dart-format
      files: ^packages/dart/.*\.dart$
    - id: dart-analyze
      files: ^packages/dart/.*\.dart$
    - id: dart-doc-lint
      files: ^packages/dart/lib/.*\.dart$
      exclude: ^packages/dart/lib/src/rust/

    # Zig
    - id: zig-fmt
      files: ^packages/zig/.*\.zig$
    - id: zig-build-check
      files: ^packages/zig/.*\.zig$
    - id: zig-doc-lint

    # Alef bindings (this repo consumes alef-generated bindings)
    - id: alef-verify
    - id: alef-sync-versions
    - id: alef-docs-fresh
    - id: alef-snippets-validate

    # preserved from prior config
    - id: clang-format
      args:
      - --style=file
      files: ^crates/kreuzberg-ffi/tests/c/
    - id: clang-tidy
      files: ^crates/kreuzberg-ffi/tests/c/
    - id: cppcheck
    - id: helm-lint
      files: ^charts/.*/(Chart\.yaml|templates/.+\.ya?ml)$
    - id: kubeconform
      args:
      - -strict
      - -summary
      files: ^charts/.*/templates/.+\.ya?ml$
      exclude: ^charts/.*/(values|Chart)\.ya?ml$
