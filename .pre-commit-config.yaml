default_install_hook_types:
- pre-commit
- commit-msg
default_stages:
- pre-commit
exclude: ^docs/snippets/|vendor/|node_modules/|target/|invalid*|dist/|artifacts/|test_documents/|scripts/ci/|^e2e/|^packages/|^crates/xberg-(py|node|ffi|php|wasm)/|^docs/reference/api-|^docs/reference/(types|errors|configuration)\.md$|\.cache/|\.venv/|rust-vendor/|^tools/benchmark-harness/vendored/|^\.ai-rulez/domains/|^\.ai-rulez/\.generated-manifest\.json$|^\.agents/|^\.(cursor|github/agents|github/commands|github/skills)/
repos:
- repo: https://github.com/Goldziher/gitfluff
  rev: v0.8.0
  hooks:
  - id: gitfluff-lint
    args:
    - --write
    stages:
    - commit-msg
- repo: https://github.com/xberg-io/pre-commit-hooks
  rev: v3.0.0
  hooks:
    # Alef verification
    - id: alef-verify

    # Cargo / Rust
    - id: cargo-clippy
      args:
      - --fix
      - --allow-dirty
      - --allow-staged
      - --workspace
      - --exclude=xberg-ffi
      - --exclude=xberg-py
      - --exclude=xberg-node
      - --exclude=xberg-php
      - --exclude=xberg-wasm
      - --exclude=xberg-dart
      - --exclude=xberg-swift
      # `full` is the comprehensive cross-platform feature set. `--all-features`
      # force-enables the candle hardware-accelerator features (metal/cuda/mkl/
      # accelerate), which pull Apple-only `objc2` (`compile_error!` on Linux)
      # and require nvcc — breaking clippy on the Linux CI runner and on dev
      # machines without CUDA. `full` excludes those accelerators (CPU paths
      # still lint) while covering every format/OCR/ML surface.
      - --features=full
      - --all-targets
      - --
      - -D
      - warnings
    - id: cargo-sort
      exclude: ^(crates/xberg-(wasm|node|py|php|ffi)|packages/(dart|swift)/rust)/Cargo\.toml$
    - id: cargo-machete
      args:
      - crates/
      - packages/
      - tools/
      exclude: ^e2e/
    - id: cargo-deny
      args: ["check"]
    # rustdoc-lint runs `cargo doc` with `-D missing-docs -D rustdoc::broken_intra_doc_links`
    # workspace-wide. Re-enabled after the doc-backlog cleanup (#154).
    - id: rustdoc-lint
    - id: rust-max-lines
      args: ["--max=1000"]
      # Remediation backlog: existing files over the 1,000-LOC ceiling. New files
      # are subject to the cap. Shrink this list when files are split.
      exclude: ^(crates/xberg-pdfium-render/.*\.rs|crates/xberg-candle-ocr/src/models/.*\.rs|crates/xberg/src/core/pipeline/features\.rs|crates/xberg/src/pdf/images\.rs|crates/xberg/src/pdf/structure/content_convert\.rs|crates/xberg/src/pdf/structure/bridge\.rs|crates/xberg-cli/src/commands/overrides\.rs|crates/xberg-jni/src/lib\.rs|crates/xberg-tesseract/build\.rs|crates/xberg-tesseract/src/api\.rs|crates/xberg/src/api/handlers\.rs|crates/xberg/src/chunking/core\.rs|crates/xberg/src/core/config/ocr\.rs|crates/xberg/src/core/mime\.rs|crates/xberg/src/embeddings/mod\.rs|crates/xberg/src/extraction/archive/mod\.rs|crates/xberg/src/extraction/derive\.rs|crates/xberg/src/extraction/docx/math\.rs|crates/xberg/src/extraction/docx/parser\.rs|crates/xberg/src/extraction/docx/styles\.rs|crates/xberg/src/extraction/docx/table\.rs|crates/xberg/src/extraction/email\.rs|crates/xberg/src/extraction/excel\.rs|crates/xberg/src/extraction/html/structure\.rs|crates/xberg/src/extraction/image_kind\.rs|crates/xberg/src/extraction/pptx/mod\.rs|crates/xberg/src/extractors/docbook\.rs|crates/xberg/src/extractors/docx\.rs|crates/xberg/src/extractors/image\.rs|crates/xberg/src/extractors/fictionbook\.rs|crates/xberg/src/extractors/html\.rs|crates/xberg/src/extractors/jats/mod\.rs|crates/xberg/src/extractors/latex/mod\.rs|crates/xberg/src/extractors/markdown\.rs|crates/xberg/src/extractors/mdx\.rs|crates/xberg/src/extractors/odt\.rs|crates/xberg/src/extractors/orgmode\.rs|crates/xberg/src/extractors/pdf/mod\.rs|crates/xberg/src/extractors/pdf/ocr\.rs|crates/xberg/src/extractors/rst\.rs|crates/xberg/src/extractors/rtf/parser\.rs|crates/xberg/src/extractors/typst\.rs|crates/xberg/src/layout/models/tatr\.rs|crates/xberg/src/mcp/server\.rs|crates/xberg/src/ocr/hocr_parser\.rs|crates/xberg/src/ocr/processor/execution\.rs|crates/xberg/src/paddle_ocr/model_manager\.rs|crates/xberg/src/pdf/oxide/table\.rs|crates/xberg/src/pdf/structure/assembly\.rs|crates/xberg/src/pdf/structure/classify\.rs|crates/xberg/src/pdf/structure/layout_classify\.rs|crates/xberg/src/pdf/structure/pipeline\.rs|crates/xberg/src/pdf/table_reconstruct\.rs|crates/xberg/src/rendering/comrak_bridge\.rs|crates/xberg/src/reranking/mod\.rs|crates/xberg/src/stopwords/mod\.rs|crates/xberg/src/types/document_structure\.rs|crates/xberg/src/types/internal\.rs|crates/xberg/src/types/internal_builder\.rs|crates/xberg/src/types/metadata\.rs|tools/benchmark-harness/src/adapters/subprocess\.rs|tools/benchmark-harness/src/aggregate\.rs|tools/benchmark-harness/src/comparison\.rs|tools/benchmark-harness/src/main\.rs|tools/benchmark-harness/src/markdown_quality\.rs|tools/benchmark-harness/src/noise_detection\.rs|tools/benchmark-harness/src/runner\.rs|tools/benchmark-harness/src/sizes\.rs)$

    # Linters and checks
    - id: ai-rulez-generate
    - id: ai-rulez-validate

    - id: check-merge-conflict
    - id: check-added-large-files
      exclude: uv.lock|docs/benchmarks/app/
    - id: detect-private-key
    - id: check-case-conflict
    - id: check-executables-have-shebangs
      # Rust inner attributes (`#![cfg(...)]`, `#![allow(...)]`) start with `#!`
      # and trip this hook; .rs files never have a real shebang.
      exclude: \.rs$
    - id: check-shebang-scripts-are-executable
      exclude: \.rs$
    - id: typos
      args: ["--force-exclude"]
    - id: check-json
      # Test fixtures (e.g. minified tokenizer vocabs) may contain duplicate keys that the
      # tokenizers crate accepts (last-wins) but strict JSON validation rejects. Excluded like
      # the oxfmt/typos testdata exclusions.
      exclude: (^|/)testdata/
    - id: check-yaml
      args:
      - --allow-multiple-documents
      - --unsafe
      exclude: ^charts/
    - id: check-toml

    - id: actionlint
    - id: gh-actions-updater

    - id: shellcheck
      args:
      - -x
      exclude: ^(test_apps/kotlin_android|packages/kotlin-android)/gradlew$
    - id: hadolint

    - id: markdownlint-rumdl-strict
      # Strict 120-char hard limit (incl. code blocks + tables) is too aggressive
      # for long-form docs with kubectl manifests, xberg JSON config
      # examples, comparison tables, install matrices, audit notes, generated
      # READMEs/templates, and prose that legitimately exceeds the cap inside
      # fenced blocks. Non-strict `rumdl-fmt` still runs over these files.
      exclude: ^(docs/|audit-notes/|skills/|templates/|tools/|scripts/|docker/|\.ai-rulez/|\.github/|crates/[^/]+/(README|patches/README)\.md$|ATTRIBUTIONS\.md$|SECURITY\.md$|CONTRIBUTING\.md$|CHANGELOG\.md$|README\.md$)
    - id: textlint
      files: ^docs/.*\.md$
      exclude: ^docs/(reference/|api-|snippets/|migration/)
      args:
      - --fix
      - --config
      - .textlintrc.json

    - id: ruff
    - id: mypy
      files: ^(lib|src|xberg|tools)/.*\.py$
      # python_baselines are standalone OCR-library reference scripts that import
      # optional, uninstalled ML deps (transformers/paddlex/paddleocr) — mypy
      # cannot resolve them in CI, same rationale as the excluded scripts/ dir.
      exclude: e2e/|tests/|scripts/|tools/benchmark-harness/python_baselines/
    - id: pydocstyle
      files: ^packages/python/.*\.py$
      exclude: ^packages/python/(tests/|.*_native\.py$)

    - id: oxlint
    - id: tsc-typecheck
    - id: tsdoc-lint

    - id: golangci-lint
      exclude: ^(e2e/|test_apps/|tools/)
    - id: govulncheck
      exclude: ^(e2e/|test_apps/|tools/)
    - id: godoc-lint

    - id: checkstyle
      args:
      - -c
      - packages/java/checkstyle.xml
      - -p
      - packages/java/checkstyle.properties
      exclude: ^(\.mvn/wrapper/|e2e/|tools/e2e-generator/e2e/|crates/xberg-wasm/e2e/|packages/java/src/)
    - id: pmd
      # Benchmark harness scripts are auxiliary tooling, not shipped code. The
      # Java subprocess runner deliberately catches Error/Throwable to emit a
      # clean failure record before exiting, which trips PMD's
      # AvoidCatchingGenericException — not a concern for a benchmark driver.
      exclude: ^tools/benchmark-harness/scripts/
    - id: cpd
    - id: java-verify
      files: ^packages/java/
    - id: javadoc-lint
      files: ^packages/java/src/main/.*\.java$

    - id: detekt
      args:
      - --build-upon-default-config
      files: ^packages/kotlin-android/.*\.kts?$
    # NOTE: ktlint is intentionally NOT run on alef-generated kotlin-android.
    # ktfmt (--kotlinlang-style) is the canonical formatter (matches alef:format);
    # ktlint's always-format mode conflicts with ktfmt (blank-line-after-brace) and
    # mangles alef's `///` doc comments into `// /`. detekt covers static analysis.
    - id: kotlin-dokka

    - id: rubocop-lint
      files: ^packages/ruby/.*\.(rb|rbs)$
    - id: steep
      files: ^packages/ruby/.*\.(rb|rbs)$
    - id: yard-coverage

    - id: dotnet-format-check
      files: ^packages/csharp/.*\.cs$
    - id: cs-xmldoc-lint
      files: ^packages/csharp/Xberg/.*\.cs$

    - id: phpstan
      files: ^packages/php/.*\.php$
    - id: phpdoc-lint
      files: ^packages/php/src/.*\.php$

    - id: mix-credo
      files: ^packages/elixir/
    - id: ex-doc-coverage

    - id: air-check
      files: ^packages/r/.*\.[Rr]$
    - id: lintr
      files: ^packages/r/.*\.[Rr]$
    - id: roxygen2-check
      files: ^packages/r/R/.*\.R$

    - id: swiftlint
      files: ^packages/swift/.*\.swift$
    - id: swift-doc-coverage

    - id: dart-analyze
      files: ^packages/dart/.*\.dart$
    - id: dart-doc-lint
      files: ^packages/dart/lib/.*\.dart$
      exclude: ^packages/dart/lib/src/rust/

    - id: zig-build-check
      files: ^packages/zig/.*\.zig$
    - id: zig-doc-lint

    - id: clang-tidy
      files: ^crates/xberg-ffi/tests/c/
    - id: cppcheck
    - id: alef-docs-fresh
    - id: alef-snippets-validate

    # Formatters
    - id: trailing-whitespace
    - id: end-of-file-fixer
    - id: mixed-line-ending
    - id: shfmt
      args: ["-w", "-i", "2"]
    - id: rumdl-fmt
      exclude: ^templates/
    - id: cargo-fmt
      args: ["--all"]
    - id: pyproject-fmt
    - id: ruff-format
    - id: oxfmt
    - id: go-fmt
      exclude: ^(e2e/|test_apps/|tools/)
    - id: palantir-java-format
    - id: ktfmt
      args:
      - --kotlinlang-style
      files: ^packages/kotlin-android/.*\.kts?$
    - id: rubocop
      files: ^packages/ruby/.*\.rb$
    - id: dotnet-format
      files: ^packages/csharp/.*\.cs$
    - id: php-cs-fixer
      files: ^packages/php/.*\.php$
    - id: mix-format
      files: ^packages/elixir/
    - id: air-format
      files: ^packages/r/.*\.[Rr]$
    - id: swift-format
      files: ^packages/swift/.*\.swift$
    - id: dart-format
      files: ^packages/dart/.*\.dart$
    - id: zig-fmt
      files: ^packages/zig/.*\.zig$
    - id: clang-format
      args:
      - --style=file
      files: ^crates/xberg-ffi/tests/c/
