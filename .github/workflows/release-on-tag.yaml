name: Create GitHub Release on tag push

on:
  push:
    tags: ["v4.9.*"]

permissions:
  contents: write

jobs:
  create-release:
    name: "Create Release"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag points at chore/v4.9-lts
        shell: bash
        run: |
          git fetch origin chore/v4.9-lts:refs/remotes/origin/chore/v4.9-lts
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/chore/v4.9-lts; then
            echo "::error::Tag $GITHUB_REF_NAME points at $GITHUB_SHA which is not on chore/v4.9-lts" >&2
            exit 1
          fi

      # Use the GitHub App token (not GITHUB_TOKEN) so the resulting
      # release event cascades to publish.yaml / publish-docker.yaml /
      # publish-helm.yaml. GitHub deliberately suppresses downstream
      # workflows when a release is created with the default token.
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes \
            --target "$GITHUB_SHA"
