name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Git branch to benchmark"
        required: false
        default: "main"
        type: string
      timeout:
        description: "Timeout per document in seconds"
        required: false
        default: "900"
        type: string

env:
  ITERATIONS: "3"
  TIKA_VERSION: "3.3.1"
  ORT_VERSION: "1.24.2"
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  RUSTFLAGS: "-C strip=symbols"
  MEASURE_QUALITY: "true"
  OCR_ENABLED: "true"
  RUN_OCR_BENCHMARKS: "true"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  GROUND_TRUTH_DIR: "test_documents/ground_truth"

concurrency:
  group: benchmarks-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  setup:
    name: Build harness + native libs
    runs-on: runner-medium-arm64
    timeout-minutes: 360
    permissions:
      contents: read
      id-token: write
    outputs:
      artifact-name: benchmarks-target
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

          submodules: recursive
          lfs: true
      - name: Free disk space
        uses: xberg-io/actions/free-disk-space-linux@v1

      - name: Ensure benchmark harness exists
        run: scripts/benchmarks/ensure-benchmark-harness-exists.sh

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Rust
        uses: xberg-io/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-setup
          use-sccache: "true"
          report-stats: "true"

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Install Task
        uses: xberg-io/actions/install-task@v1

      - name: Cache benchmark harness
        uses: ./.github/actions/cache-benchmark-harness
        with:
          build-profile: release

      - name: Build xberg-cli (release, all features)
        run: cargo build --locked --release -p xberg-cli --features all

      - name: Pull test_documents LFS objects
        run: git -C test_documents lfs pull

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_BENCHMARK_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Install zstd (corpus cache decompression)
        run: sudo apt-get install -y zstd

      - name: Restore reference corpus cache
        env:
          GCP_BENCHMARK_BUCKET: ${{ secrets.GCP_BENCHMARK_BUCKET }}
        run: scripts/benchmarks/restore-corpus-cache.sh

      - name: Validate ground truth
        run: cargo run --locked --release -p benchmark-harness -- validate-gt --fixtures tools/benchmark-harness/fixtures/pdf/ --strict

      - name: Validate benchmark cohorts
        run: cargo test --locked --release -p benchmark-harness 'cohort::tests::'

      - name: Package reference corpus cache
        run: tar -C test_documents -cf corpus-cache.tar .corpus-cache/pdf .corpus-cache/ground_truth

      - name: Upload reference corpus cache
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-corpus-cache
          path: corpus-cache.tar
          retention-days: 7

      - name: Log disk space before artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space before artifact upload"

      - name: Upload build artifacts (harness binary + xberg-cli)
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-target
          path: |
            target/release/benchmark-harness
            target/release/xberg
          retention-days: 7
          if-no-files-found: warn

      - name: Upload benchmark harness binary (for third-party jobs)
        uses: actions/upload-artifact@v7
        with:
          name: benchmark-harness-binary
          path: |
            target/release/benchmark-harness
          retention-days: 7

      - name: Log disk space after artifact upload
        run: scripts/ci/validate/show-disk-space.sh "Disk space after artifact upload"

  bench-rust:
    name: bench-rust (${{ matrix.pipeline }}, ${{ matrix.output_format }}, ${{ matrix.mode }}, ${{ matrix.cohort }})
    needs: setup
    runs-on: ${{ matrix.pipeline == 'layout' && 'runner-large-arm64' || 'runner-medium-arm64' }}
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        pipeline: [baseline, layout]
        output_format: [markdown, plaintext]
        mode: [single-file, batch]
        cohort: [native-pdf-fast-b8, ocr-pdf-fast-b4]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

          submodules: recursive
          lfs: true
      - name: Free disk space
        uses: xberg-io/actions/free-disk-space-linux@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Rust toolchain
        uses: xberg-io/actions/setup-rust@v1
        with:
          cache-key-prefix: benchmarks-rust-${{ matrix.pipeline }}
          use-sccache: "true"
          report-stats: "true"

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.setup.outputs.artifact-name }}
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Pull test_documents LFS objects
        run: git -C test_documents lfs pull

      - name: Download reference corpus cache
        uses: actions/download-artifact@v8
        with:
          name: benchmark-corpus-cache
          path: .

      - name: Unpack reference corpus cache
        run: tar -C test_documents -xf corpus-cache.tar

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        if: matrix.pipeline == 'layout'
        uses: ./.github/actions/setup-layout-models

      - name: Run benchmark
        env:
          FRAMEWORK: xberg-${{ matrix.output_format }}-${{ matrix.pipeline }}
          MODE: ${{ matrix.mode }}
          OUTPUT_FORMAT: ${{ matrix.output_format }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
          COHORT: tools/benchmark-harness/cohorts/${{ matrix.cohort }}.json
          BATCH_SIZE: ${{ matrix.mode == 'batch' && (matrix.cohort == 'native-pdf-fast-b8' && 8 || 4) || '' }}
          OCR_ENABLED: ${{ matrix.cohort == 'ocr-pdf-fast-b4' }}
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-rust-${{ matrix.pipeline }}-${{ matrix.output_format }}-${{ matrix.mode }}-${{ matrix.cohort }}-${{ github.run_id }}
          path: benchmark-results/
          retention-days: 30

  bench-docling:
    name: docling (${{ matrix.output_format }}, ${{ matrix.mode }}, ${{ matrix.cohort }})
    needs: bench-rust
    if: ${{ !cancelled() }}
    runs-on: runner-medium-arm64
    timeout-minutes: 360
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        mode: [single-file, batch]
        output_format: [markdown, plaintext]
        cohort: [native-pdf-fast-b8, ocr-pdf-fast-b4]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

          submodules: recursive
          lfs: true
      - name: Free disk space
        uses: xberg-io/actions/free-disk-space-linux@v1

      - name: Download benchmark harness binary
        uses: actions/download-artifact@v8
        with:
          name: benchmark-harness-binary
          path: target/release

      - name: Restore benchmark binary permissions
        run: scripts/benchmarks/restore-binary-permissions.sh

      - name: Pull test_documents LFS objects
        run: git -C test_documents lfs pull

      - name: Download reference corpus cache
        uses: actions/download-artifact@v8
        with:
          name: benchmark-corpus-cache
          path: .

      - name: Unpack reference corpus cache
        run: tar -C test_documents -xf corpus-cache.tar

      - name: Install system dependencies (libheif + native libs for harness binary)
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Python
        uses: xberg-io/actions/setup-python-env@v1
        with:
          python-version: "3.11"
          cache-prefix: benchmark-docling
          install-command: "uv sync --no-install-project --no-install-workspace --group dev --group bench-docling"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1 libglib2.0-0 tesseract-ocr tesseract-ocr-eng

      - name: Run benchmark
        env:
          FRAMEWORK: docling
          MODE: ${{ matrix.mode }}
          OUTPUT_FORMAT: ${{ matrix.output_format }}
          ITERATIONS: ${{ env.ITERATIONS }}
          TIMEOUT: ${{ github.event.inputs.timeout }}
          COHORT: tools/benchmark-harness/cohorts/${{ matrix.cohort }}.json
          BATCH_SIZE: ${{ matrix.mode == 'batch' && (matrix.cohort == 'native-pdf-fast-b8' && 8 || 4) || '' }}
          OCR_ENABLED: ${{ matrix.cohort == 'ocr-pdf-fast-b4' }}
          UV_NO_SYNC: "1"
        run: scripts/benchmarks/run-benchmark.sh

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: benchmarks-docling-${{ matrix.output_format }}-${{ matrix.mode }}-${{ matrix.cohort }}-${{ github.run_id }}
