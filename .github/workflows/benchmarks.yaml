          path: .

      - name: Unpack reference corpus cache
        run: tar -C test_documents -xf corpus-cache.tar

      - name: Install system dependencies (libheif + native libs for harness binary)
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
