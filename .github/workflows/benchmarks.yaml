      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-eng libmagic-dev poppler-utils libreoffice pandoc

      - name: Setup Python
        uses: xberg-io/actions/setup-python-env@v1
        with:
          python-version: "3.11"
