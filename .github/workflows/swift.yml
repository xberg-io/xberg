name: Swift

on:
  workflow_dispatch:
  # Swift binding is alef-experimental (added v0.10.0). The C interop fails
  # to build against Xcode 16's SDK; re-enable on push/PR once
  # alef-backend-swift matures.

jobs:
  test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: packages/swift
    steps:
      - uses: actions/checkout@v4
      - name: Set up Swift
        uses: swift-actions/setup-swift@v3
        with:
          swift-version: "5.10"
      - name: Build Swift package
        run: swift build
      - name: Run tests
        run: swift test
