name: Swift

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-rust@v1
      - name: Show Swift version
        run: swift --version
      - uses: kreuzberg-dev/actions/build-swift-package@v1
        with:
          build-profile: dev
      - name: Build Swift package
        working-directory: packages/swift
        run: swift build
      - name: Run tests
        working-directory: packages/swift
        # Skip testOcrImagePng — requires tesseract trained-data path setup
        # that lives in `task swift:e2e`. The remaining suite still covers the
        # Rust↔Swift bridge end-to-end.
        run: swift test --skip 'SmokeTests/testOcrImagePng'
