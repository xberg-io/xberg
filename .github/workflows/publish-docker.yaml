name: Publish Docker Images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v4.3.6)"
        required: true
        type: string
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      force_republish:
        description: "Force re-publish even if artifacts already exist"
        required: false
        type: boolean
        default: false
  # Docker images build from source (no binding artifacts needed), so this
  # workflow runs fully in parallel with publish.yaml — both fire on the same
  # `release: published` event. Kept `repository_dispatch` for manual/scripted
  # re-publish; publish.yaml no longer dispatches it (the trigger-docker-publish
  # job was removed) so there is no double-fire.
  release:
    types: [published]
  repository_dispatch:
    types: [publish-docker]

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  ORT_VERSION: "1.24.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      release_docker: ${{ steps.meta.outputs.release_docker }}
    steps:
      - name: Checkout code (default)
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: meta
        uses: xberg-io/actions/prepare-release-metadata@v1
        with:
          tag: ${{ inputs.tag || github.event.client_payload.tag || github.event.release.tag_name }}
          ref: ${{ inputs.ref || github.event.client_payload.ref }}
          # This workflow only builds the docker target; scope metadata accordingly
          # so release_docker resolves true and unrelated release_* stay false.
          available-targets: docker
          dry-run: ${{ inputs.dry_run }}
          force-republish: ${{ inputs.force_republish }}

      - name: Re-checkout at target ref
        if: ${{ steps.meta.outputs.checkout_ref != '' }}
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Show metadata
        env:
          META_TAG: ${{ steps.meta.outputs.tag }}
          META_VERSION: ${{ steps.meta.outputs.version }}
          META_REF: ${{ steps.meta.outputs.ref }}
          META_DRY_RUN: ${{ steps.meta.outputs.dry_run }}
          META_FORCE_REPUBLISH: ${{ steps.meta.outputs.force_republish }}
          META_CHECKOUT_REF: ${{ steps.meta.outputs.checkout_ref }}
          META_TARGET_SHA: ${{ steps.meta.outputs.target_sha }}
          META_IS_TAG: ${{ steps.meta.outputs.is_tag }}
          META_RELEASE_DOCKER: ${{ steps.meta.outputs.release_docker }}
        run: |
          {
            echo "## Release Metadata"
            echo "- **Tag**: \`$META_TAG\`"
            echo "- **Version**: \`$META_VERSION\`"
            echo "- **Ref**: \`$META_REF\`"
            echo "- **Dry Run**: \`$META_DRY_RUN\`"
            echo "- **Force Republish**: \`$META_FORCE_REPUBLISH\`"
            echo "- **Checkout Ref**: \`$META_CHECKOUT_REF\`"
            echo "- **Target SHA**: \`$META_TARGET_SHA\`"
            echo "- **Is Tag**: \`$META_IS_TAG\`"
            echo "- **Release Docker**: \`$META_RELEASE_DOCKER\`"
          } >> "$GITHUB_STEP_SUMMARY"

  check-docker:
    name: Check if Docker image tag exists
    needs: prepare
    if: ${{ needs.prepare.outputs.release_docker == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      core_exists: ${{ steps.core.outputs.exists }}
      full_exists: ${{ steps.full.outputs.exists }}
      cli_exists: ${{ steps.cli.outputs.exists }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check core image tag
        id: core
        env:
          DOCKER_TAG: ghcr.io/xberg-io/xberg:${{ needs.prepare.outputs.version }}-core
          SUMMARY_LABEL: core
        run: scripts/publish/check-docker-tag.sh

      - name: Check full image tag
        id: full
        env:
          DOCKER_TAG: ghcr.io/xberg-io/xberg:${{ needs.prepare.outputs.version }}
          SUMMARY_LABEL: full
        run: scripts/publish/check-docker-tag.sh

      - name: Check CLI image tag
        id: cli
        env:
          DOCKER_TAG: ghcr.io/xberg-io/xberg-cli:${{ needs.prepare.outputs.version }}
          SUMMARY_LABEL: cli
        run: scripts/publish/check-docker-tag.sh

  # Build each (variant, arch) on a NATIVE runner — no QEMU. Emulated arm64 builds
  # were taking ~4h and hanging at tesseract static-linking, tripping the 6h cap.
  # Each job builds + tests its single-arch image, then pushes it to GHCR by digest;
  # the merge-docker job assembles the multi-arch manifest from the per-arch digests.
  build-docker:
    name: Build ${{ matrix.variant }} (${{ matrix.platform.name }})
    needs:
      - prepare
      - check-docker
    runs-on: ${{ matrix.platform.runner }}
    timeout-minutes: 90
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        variant: [core, full, cli]
        platform:
          - { name: amd64, docker: linux/amd64, runner: ubuntu-latest }
          - { name: arm64, docker: linux/arm64, runner: ubuntu-24.04-arm }
        include:
          - { variant: core, dockerfile: docker/Dockerfile.core, image: ghcr.io/xberg-io/xberg, tag_suffix: "-core" }
          - { variant: full, dockerfile: docker/Dockerfile.full, image: ghcr.io/xberg-io/xberg, tag_suffix: "" }
          - { variant: cli, dockerfile: docker/Dockerfile.cli, image: ghcr.io/xberg-io/xberg-cli, tag_suffix: "" }
    if: ${{ needs.prepare.outputs.release_docker == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive

      - name: Free up disk space
        uses: xberg-io/actions/free-disk-space-linux@v1

      - name: Ensure target commit
        if: ${{ needs.prepare.outputs.target_sha != '' }}
        run: git checkout --progress --force ${{ needs.prepare.outputs.target_sha }}

      # Build unless this variant's tag already exists (and we aren't force-republishing).
      - name: Decide whether to build
        id: gate
        env:
          FORCE: ${{ needs.prepare.outputs.force_republish }}
          VARIANT: ${{ matrix.variant }}
          CORE_EXISTS: ${{ needs.check-docker.outputs.core_exists }}
          FULL_EXISTS: ${{ needs.check-docker.outputs.full_exists }}
          CLI_EXISTS: ${{ needs.check-docker.outputs.cli_exists }}
        run: |
          go=false
          if [ "$FORCE" = "true" ]; then
            go=true
          else
            case "$VARIANT" in
              core) if [ "$CORE_EXISTS" != "true" ]; then go=true; fi ;;
              full) if [ "$FULL_EXISTS" != "true" ]; then go=true; fi ;;
              cli)  if [ "$CLI_EXISTS"  != "true" ]; then go=true; fi ;;
            esac
          fi
          echo "go=$go" >> "$GITHUB_OUTPUT"
          if [ "$go" != "true" ]; then
            echo "Docker tag already exists for variant $VARIANT; skipping build." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Set up Docker Buildx
        if: ${{ steps.gate.outputs.go == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Build test image
        if: ${{ steps.gate.outputs.go == 'true' }}
        run: docker build -f ${{ matrix.dockerfile }} --platform ${{ matrix.platform.docker }} --build-arg ONNXRUNTIME_VERSION=${{ env.ORT_VERSION }} -t xberg-publish:${{ matrix.variant }}-test .

      - name: Run Docker tests
        if: ${{ steps.gate.outputs.go == 'true' }}
        run: python3 scripts/ci/docker/test_docker.py --image xberg-publish:${{ matrix.variant }}-test --variant ${{ matrix.variant }} --verbose

      - name: Log in to GitHub Container Registry
        if: ${{ steps.gate.outputs.go == 'true' && needs.prepare.outputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        if: ${{ steps.gate.outputs.go == 'true' && needs.prepare.outputs.dry_run != 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          platforms: ${{ matrix.platform.docker }}
          build-args: |
            ONNXRUNTIME_VERSION=${{ env.ORT_VERSION }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.description=Xberg document intelligence - ${{ matrix.variant }} variant
            org.opencontainers.image.licenses=MIT
          outputs: type=image,name=${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=publish-docker-${{ matrix.variant }}-${{ matrix.platform.name }}
          cache-to: type=gha,mode=max,scope=publish-docker-${{ matrix.variant }}-${{ matrix.platform.name }}

      - name: Export digest
        if: ${{ steps.gate.outputs.go == 'true' && needs.prepare.outputs.dry_run != 'true' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        if: ${{ steps.gate.outputs.go == 'true' && needs.prepare.outputs.dry_run != 'true' }}
        uses: actions/upload-artifact@v7
        with:
          name: digest-${{ matrix.variant }}-${{ matrix.platform.name }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

      - name: Docker dry-run summary
        if: ${{ steps.gate.outputs.go == 'true' && needs.prepare.outputs.dry_run == 'true' && matrix.platform.name == 'amd64' }}
        env:
          IMAGE: ${{ matrix.image }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_SUFFIX: ${{ matrix.tag_suffix }}
        run: scripts/publish/docker/dry-run-summary.sh

      - name: Clean up local Docker images
        if: ${{ always() }}
        run: docker rmi xberg-publish:${{ matrix.variant }}-test || true

  # Assemble and push the multi-arch manifest from the per-arch digests.
  merge-docker:
    name: Publish ${{ matrix.variant }} manifest
    needs:
      - prepare
      - check-docker
      - build-docker
    if: ${{ needs.prepare.outputs.release_docker == 'true' && needs.prepare.outputs.dry_run != 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { variant: core, image: ghcr.io/xberg-io/xberg, tag_suffix: "-core", extra_tag: "core" }
          - { variant: full, image: ghcr.io/xberg-io/xberg, tag_suffix: "", extra_tag: "latest" }
          - { variant: cli, image: ghcr.io/xberg-io/xberg-cli, tag_suffix: "", extra_tag: "latest" }
    steps:
      - name: Decide whether to publish
        id: gate
        env:
          FORCE: ${{ needs.prepare.outputs.force_republish }}
          VARIANT: ${{ matrix.variant }}
          CORE_EXISTS: ${{ needs.check-docker.outputs.core_exists }}
          FULL_EXISTS: ${{ needs.check-docker.outputs.full_exists }}
          CLI_EXISTS: ${{ needs.check-docker.outputs.cli_exists }}
        run: |
          go=false
          if [ "$FORCE" = "true" ]; then
            go=true
          else
            case "$VARIANT" in
              core) if [ "$CORE_EXISTS" != "true" ]; then go=true; fi ;;
              full) if [ "$FULL_EXISTS" != "true" ]; then go=true; fi ;;
              cli)  if [ "$CLI_EXISTS"  != "true" ]; then go=true; fi ;;
            esac
          fi
          echo "go=$go" >> "$GITHUB_OUTPUT"

      - name: Download digests
        if: ${{ steps.gate.outputs.go == 'true' }}
        uses: actions/download-artifact@v8
        with:
          path: /tmp/digests
          pattern: digest-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Log in to GitHub Container Registry
        if: ${{ steps.gate.outputs.go == 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        if: ${{ steps.gate.outputs.go == 'true' }}
        uses: docker/setup-buildx-action@v4

      - name: Extract Docker metadata
        id: docker_meta
        if: ${{ steps.gate.outputs.go == 'true' }}
        uses: docker/metadata-action@v6
        with:
          images: ${{ matrix.image }}
          tags: |
            type=raw,value=${{ needs.prepare.outputs.version }}${{ matrix.tag_suffix }}
            type=raw,value=${{ matrix.extra_tag }},enable=${{ needs.prepare.outputs.is_prerelease != 'true' }}

      - name: Create and push manifest
        if: ${{ steps.gate.outputs.go == 'true' }}
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ matrix.image }}@sha256:%s ' *)

      - name: Inspect published manifest
        if: ${{ steps.gate.outputs.go == 'true' }}
        run: docker buildx imagetools inspect ${{ matrix.image }}:${{ needs.prepare.outputs.version }}${{ matrix.tag_suffix }}
