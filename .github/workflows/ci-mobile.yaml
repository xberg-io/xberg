name: CI Mobile

on:
  push:
    branches: [main]
    paths:
      - "crates/kreuzberg/**"
      - "crates/kreuzberg-ffi/**"
      - "crates/kreuzberg-dart/**"
      - "crates/kreuzberg-swift/**"
      - "crates/kreuzberg-jni/**"
      - "packages/dart/**"
      - "packages/swift/**"
      - "packages/kotlin-android/**"
      - ".github/workflows/ci-mobile.yaml"
  pull_request:
    branches: [main]
    paths:
      - "crates/kreuzberg/**"
      - "crates/kreuzberg-ffi/**"
      - "crates/kreuzberg-dart/**"
      - "crates/kreuzberg-swift/**"
      - "crates/kreuzberg-jni/**"
      - "packages/dart/**"
      - "packages/swift/**"
      - "packages/kotlin-android/**"
      - ".github/workflows/ci-mobile.yaml"
  workflow_dispatch:

concurrency:
  group: ci-mobile-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  # Mobile feature subsets (Android drops ORT-requiring features) leave some
  # functions only used in the full-feature graph; -A dead_code keeps the
  # cross-compile check honest about other classes of warnings without choking
  # on these. -A unexpected_cfgs: the kreuzberg-ffi crate's auto-derived feature
  # list omits a few core features (structured/enrichment/heuristics/presets)
  # that its generated cfg-guards still reference, so the reduced android-target
  # graph trips unexpected_cfgs on feature names that simply aren't declared.
  RUSTFLAGS: "-D warnings -A dead_code -A unexpected_cfgs -A unpredictable-function-pointer-comparisons -A mismatched-lifetime-syntaxes"

permissions:
  contents: read

jobs:
  android-check:
    name: Android cargo check (${{ matrix.abi }})
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        abi: [arm64-v8a, x86_64]
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          cache-key-prefix: ci-mobile-android-${{ matrix.abi }}
          use-sccache: "true"
      - uses: kreuzberg-dev/actions/setup-android-ndk@v1
      - name: cargo ndk check kreuzberg-dart
        run: cargo ndk --target ${{ matrix.abi }} --platform 21 -- check -p kreuzberg-dart --no-default-features --features android-target
      - name: cargo ndk check kreuzberg-ffi
        run: cargo ndk --target ${{ matrix.abi }} --platform 21 -- check -p kreuzberg-ffi --no-default-features --features android-target

  ios-check:
    name: iOS cargo check (${{ matrix.target }})
    if: github.repository == 'kreuzberg-dev/kreuzberg' && github.actor != 'dependabot[bot]'
    runs-on: macos-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        target: [aarch64-apple-ios, aarch64-apple-ios-sim]
    steps:
      - uses: actions/checkout@v6
      - uses: kreuzberg-dev/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: ci-mobile-ios-${{ matrix.target }}
          use-sccache: "true"
      - name: cargo check kreuzberg-dart
        run: cargo check --locked -p kreuzberg-dart --target ${{ matrix.target }}
      - name: cargo check kreuzberg-swift
        run: cargo check --locked -p kreuzberg-swift --target ${{ matrix.target }}
