name: CI Lint

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs-site/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - ".task/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs-site/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - ".task/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  benchmark-scripts:
    name: Benchmark script regressions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install Task
        uses: xberg-io/actions/install-task@v1
      - name: Validate benchmark scripts
        run: task benchmark:validate:scripts

  validate:
    uses: xberg-io/actions/.github/workflows/reusable-validate.yml@v1
    with:
      setup-rust: true
      setup-python: true
