name: CI Lint

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  pull_request:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      CARGO_TERM_COLOR: always
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      # rustdoc-lint defaults to `--all-features`, which force-enables the candle
      # hardware-accelerator features (metal → Apple-only objc2; cuda → nvcc),
      # breaking `cargo doc` on the Linux runner. Pin it to the cross-platform
      # `full` set (same rationale as the cargo-clippy hook). Single `--features=full`
      # token because run.sh passes $RUSTDOC_FEATURES as one quoted argument.
      RUSTDOC_FEATURES: "--features=full"
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: jamon8888/actions/setup-rust@v1
        with:
          cache-key-prefix: lint

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Python
        uses: jamon8888/actions/setup-python-env@v1
        with:
          python-version: "3.13"
          cache-prefix: lint-py
          install-command: "uv sync --group dev --no-install-project --no-install-workspace --frozen"

      - name: Setup Node
        uses: jamon8888/actions/setup-node-workspace@v1

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26"

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Elixir
        uses: jamon8888/actions/setup-elixir@v1

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: false
          working-directory: packages/ruby

      - name: Bundle install
        working-directory: packages/ruby
        run: |
          bundle config set frozen true
          bundle install --jobs 4

      - name: Setup PHP
        uses: jamon8888/actions/setup-php@v1

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup R
        uses: jamon8888/actions/setup-r@v1
        with:
          r-version: "release"
          install-deps: "false"

      - name: Install Task
        uses: jamon8888/actions/install-task@v1

      - name: Install alef CLI
        uses: jamon8888/actions/install-alef@v1

      - name: Run all prek hooks
        uses: j178/prek-action@v2
        with:
          cache: false
          extra-args: --all-files

      - name: Validate C header
        shell: bash
        run: |
          HEADER="crates/xberg-ffi/include/xberg.h"
          if [ ! -f "$HEADER" ]; then
            echo "::error::C header not found at $HEADER — run 'task alef:generate'"
            exit 1
          fi
          echo "C header verified at $HEADER"
