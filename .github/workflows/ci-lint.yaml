name: CI Lint

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "packages/**"
      - "e2e/**"
      - "tools/**"
      - "docs/**"
      - "*.toml"
      - "*.yaml"
      - "*.yml"
      - "*.md"
      - ".github/**"
      - "Taskfile.yml"
      - "alef.toml"
      - "pyproject.toml"
  workflow_dispatch:

concurrency:
  group: ci-lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    uses: xberg-io/actions/.github/workflows/reusable-validate.yml@v1
    with:
      setup-rust: true
      setup-python: true
