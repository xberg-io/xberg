name: Publish pub.dev

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag or commit) to publish the Dart package from"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  publish-pub:
    name: Publish pub.dev
    runs-on: ubuntu-latest
    steps:
      # Publish the thin, source-only package straight from git. The native
      # libraries are NOT bundled (they exceed pub.dev's 100MB cap); the package
      # ships bin/download_libs.dart + lib/src/native_loader.dart, which fetch the
      # platform library from the GitHub release into the versioned user cache on
      # first use. Publishing from a git checkout guarantees only tracked source
      # is uploaded (~300KB), never stray build output. ~keep
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          submodules: recursive

      - uses: dart-lang/setup-dart@v1

      - uses: xberg-io/actions/publish-pub@v1
        with:
          package-dir: packages/dart
