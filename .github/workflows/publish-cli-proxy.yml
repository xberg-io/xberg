name: Publish CLI proxy

# Hand-written proxy packages under cli-proxy/ that download the native
# kreuzberg binary from GitHub releases. Published separately from the main
# publish.yaml so binding releases and proxy releases stay decoupled.
#
# Proxy releases MUST use a tag of the form `cli-proxy-v*` (e.g. cli-proxy-v0.1.0).
# The `release: [published]` trigger fires for every release in this repo,
# including language-binding releases — the job below is gated so it only
# publishes for the proxy's own `cli-proxy-v*` tag (or a manual workflow_dispatch).

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build and pack without publishing"
        type: boolean
        default: false
  release:
    types: [published]

permissions:
  contents: read

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.event.release.tag_name, 'cli-proxy-v')
    permissions:
      id-token: write
      contents: read
    uses: kreuzberg-dev/actions/.github/workflows/reusable-cli-proxy-publish.yml@v1
    with:
      npm-package-dir: cli-proxy/npm
      pypi-package-dir: cli-proxy/pypi
      publish-npm: true
      publish-pypi: false
      dry-run: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
