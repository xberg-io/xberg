name: Dart

on:
  workflow_dispatch:
  # Dart/Gleam/Zig/Kotlin/Swift bindings are alef-experimental (added v0.10.0).
  # Codegen bugs (wrong List<T> syntax, missing bridge file, etc.) make
  # `dart analyze` fail; re-enable on push/PR once alef-backend-dart matures.

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/dart
    steps:
      - uses: actions/checkout@v4
      - name: Set up Dart
        uses: dart-lang/setup-dart@v1
        with:
          sdk: stable
      - name: Get Dart dependencies
        run: dart pub get
      - name: Analyze Dart code
        run: dart analyze
      - name: Run tests
        run: dart test
