name: Publish Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v5.0.0-rc.1)"
        required: false
        type: string
      ref:
        description: "Git ref (branch, tag, or commit) to build; defaults to the tag"
        required: false
        type: string
      targets:
        description: "Comma-separated list of release targets, or 'all'"
        required: false
        type: string
        default: "all"
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
      republish:
        description: "Delete and re-create the tag on current HEAD before publishing"
        required: false
        type: boolean
        default: false
      force_republish:
        description: "Force republish targets whose registry version already exists"
        required: false
        type: boolean
        default: false
  release:
    types: [published]
  repository_dispatch:
    types: [publish-release]

permissions:
  contents: read
  id-token: write

concurrency:
  group: ${{ github.workflow }}-${{ (github.event_name == 'workflow_dispatch' && (github.event.inputs.ref || github.event.inputs.tag)) || github.ref || github.run_id }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare metadata
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      ref: ${{ steps.meta.outputs.ref }}
      checkout_ref: ${{ steps.meta.outputs.checkout_ref }}
      target_sha: ${{ steps.meta.outputs.target_sha }}
      matrix_ref: ${{ steps.meta.outputs.matrix_ref }}
      is_tag: ${{ steps.meta.outputs.is_tag }}
      is_prerelease: ${{ steps.meta.outputs.is_prerelease }}
      npm_tag: ${{ steps.meta.outputs.npm_tag }}
      dry_run: ${{ steps.meta.outputs.dry_run }}
      force_republish: ${{ steps.meta.outputs.force_republish }}
      release_targets: ${{ steps.meta.outputs.release_targets }}
      release_any: ${{ steps.meta.outputs.release_any }}
      release_python: ${{ steps.meta.outputs.release_python }}
      release_node: ${{ steps.meta.outputs.release_node }}
      release_ruby: ${{ steps.meta.outputs.release_ruby }}
      release_cli: ${{ steps.meta.outputs.release_cli }}
      release_crates: ${{ steps.meta.outputs.release_crates }}
      release_homebrew: ${{ steps.meta.outputs.release_homebrew }}
      release_java: ${{ steps.meta.outputs.release_java }}
      release_csharp: ${{ steps.meta.outputs.release_csharp }}
      release_go: ${{ steps.meta.outputs.release_go }}
      release_wasm: ${{ steps.meta.outputs.release_wasm }}
      release_php: ${{ steps.meta.outputs.release_php }}
      release_elixir: ${{ steps.meta.outputs.release_elixir }}
      release_c_ffi: ${{ steps.meta.outputs.release_c_ffi }}
      release_dart: ${{ steps.meta.outputs.release_dart }}
      release_swift: ${{ steps.meta.outputs.release_swift }}
      release_zig: ${{ steps.meta.outputs.release_zig }}
      release_kotlin: ${{ steps.meta.outputs.release_kotlin }}
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ (inputs.republish == true && (inputs.ref || github.event.repository.default_branch)) || inputs.ref || inputs.tag || github.ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name "xberg-dev-publisher[bot]"
          git config user.email "291994444+xberg-dev-publisher[bot]@users.noreply.github.com"

      - name: Retag for republish
        if: ${{ inputs.republish == true || github.event.client_payload.republish == true }}
        uses: xberg-io/actions/retag-for-republish@v1
        with:
          tag: ${{ inputs.tag || github.event.client_payload.tag }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Resolve release metadata
        id: meta
        uses: xberg-io/actions/prepare-release-metadata@v1

      - name: Ensure GitHub Release exists for tag
        if: ${{ steps.meta.outputs.is_tag == 'true' && steps.meta.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/publish-github-release@v1
        with:
          tag: ${{ steps.meta.outputs.tag }}
          target: ${{ steps.meta.outputs.target_sha }}
          notes: "Release ${{ steps.meta.outputs.tag }}"
          draft: "true"
          prerelease: ${{ steps.meta.outputs.is_prerelease }}
          token: ${{ steps.app-token.outputs.token }}

  validate-versions:
    name: Validate language manifest versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - name: Validate versions
        uses: xberg-io/actions/validate-versions@v1
        with:
          version: ${{ needs.prepare.outputs.version }}

  check-pypi:
    name: Check PyPI for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_python == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: pypi
          package: xberg
          version: ${{ needs.prepare.outputs.version }}

  check-npm:
    name: Check npm for existing versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.prepare.outputs.release_node == 'true' || needs.prepare.outputs.release_wasm == 'true') }}
    runs-on: ubuntu-latest
    outputs:
      node_exists: ${{ steps.check.outputs.exists }}
      wasm_exists: ${{ steps.check.outputs.wasm_exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: npm
          package: "@xberg-io/xberg"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            wasm_exists=@xberg-io/xberg-wasm

  check-rubygems:
    name: Check RubyGems for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_ruby == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: rubygems
          package: xberg
          version: ${{ needs.prepare.outputs.version }}

  check-maven:
    name: Check Maven Central for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.prepare.outputs.release_java == 'true' || needs.prepare.outputs.release_kotlin == 'true') }}
    runs-on: ubuntu-latest
    outputs:
      java_exists: ${{ steps.check.outputs.exists }}
      kotlin_exists: ${{ steps.check.outputs.kotlin_exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: maven
          package: "io.xberg:xberg"
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            kotlin_exists=io.xberg:xberg-android

  check-nuget:
    name: Check NuGet for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_csharp == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: nuget
          package: Xberg
          version: ${{ needs.prepare.outputs.version }}

  check-packagist:
    name: Check Packagist for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_php == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: packagist
          package: xberg/xberg
          version: ${{ needs.prepare.outputs.version }}

  check-cratesio:
    name: Check crates.io for existing versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_crates == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      xberg_exists: ${{ steps.check.outputs.exists }}
      tesseract_exists: ${{ steps.check.outputs.tesseract_exists }}
      paddle_exists: ${{ steps.check.outputs.paddle_exists }}
      candle_exists: ${{ steps.check.outputs.candle_exists }}
      libheif_exists: ${{ steps.check.outputs.libheif_exists }}
      gliner_exists: ${{ steps.check.outputs.gliner_exists }}
      cli_exists: ${{ steps.check.outputs.cli_exists }}
      all_exist: ${{ steps.derive.outputs.all_exist }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: cratesio
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          extra-packages: |
            tesseract_exists=xberg-tesseract
            paddle_exists=xberg-paddle-ocr
            candle_exists=xberg-candle-ocr
            libheif_exists=xberg-libheif
            gliner_exists=xberg-gliner
            cli_exists=xberg-cli

      - id: derive
        run: |
          if [[ "${{ steps.check.outputs.exists }}" == "true" \
            && "${{ steps.check.outputs.tesseract_exists }}" == "true" \
            && "${{ steps.check.outputs.paddle_exists }}" == "true" \
            && "${{ steps.check.outputs.candle_exists }}" == "true" \
            && "${{ steps.check.outputs.libheif_exists }}" == "true" \
            && "${{ steps.check.outputs.gliner_exists }}" == "true" \
            && "${{ steps.check.outputs.cli_exists }}" == "true" ]]; then
            echo "all_exist=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_exist=false" >> "$GITHUB_OUTPUT"
          fi

  check-hex:
    name: Check Hex.pm for existing versions
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      elixir_exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: hex
          package: xberg
          version: ${{ needs.prepare.outputs.version }}

  check-pub:
    name: Check pub.dev for existing version
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_dart == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: pub
          package: xberg
          version: ${{ needs.prepare.outputs.version }}

  check-zig:
    name: Check Zig package presence
    needs: prepare
    if: ${{ (needs.prepare.outputs.is_tag == 'true' || needs.prepare.outputs.dry_run == 'true') && needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: github-release
          package: xberg-zig-v${{ needs.prepare.outputs.version }}.tar.gz
          version: ${{ needs.prepare.outputs.version }}
          repo: ${{ github.repository }}
          assets: xberg-zig-v${{ needs.prepare.outputs.version }}.tar.gz

  check-homebrew:
    name: Check Homebrew tap for formula
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_homebrew == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: homebrew
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          tap-repo: xberg-io/homebrew-tap

  check-cli:
    name: Check GitHub Release for CLI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_cli == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: github-release
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          repo: xberg-io/xberg
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: xberg-cli-
          assets: |
            xberg-cli-aarch64-apple-darwin.tar.gz,xberg-cli-x86_64-apple-darwin.tar.gz,xberg-cli-aarch64-unknown-linux-gnu.tar.gz,xberg-cli-aarch64-unknown-linux-musl.tar.gz,xberg-cli-x86_64-unknown-linux-gnu.tar.gz,xberg-cli-x86_64-unknown-linux-musl.tar.gz,xberg-cli-x86_64-pc-windows-msvc.zip

  check-go:
    name: Check GitHub Release for Go FFI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_go == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: github-release
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          repo: xberg-io/xberg
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: xberg-go-

  check-c-ffi:
    name: Check GitHub Release for C FFI assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_c_ffi == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: github-release
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          repo: xberg-io/xberg
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: xberg-ffi-

  check-elixir-release:
    name: Check GitHub Release for Elixir NIF assets
    needs: prepare
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_elixir == 'true' }}
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - id: check
        uses: xberg-io/actions/check-registry@v1
        with:
          registry: github-release
          package: xberg
          version: ${{ needs.prepare.outputs.version }}
          repo: xberg-io/xberg
          tag: ${{ needs.prepare.outputs.tag }}
          asset-prefix: libxberg_nif-

  python-wheels:
    name: Build Python wheels (${{ matrix.os }})
    needs: [prepare, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-latest, macos-15, macos-15-intel]
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Build wheels
        uses: xberg-io/actions/build-python-wheels@v1
        with:
          python-version: "3.13"
          package-dir: packages/python
          cibw-build: "cp310-*"
          upload-artifact: "false"
          build-libheif: "true"
          manylinux-x86_64-image: "manylinux_2_28"
          manylinux-aarch64-image: "manylinux_2_28"
          cibw-before-build-linux: |
            set -euo pipefail
            pip install maturin uv
            source ~/.cargo/env
            # Prevent GCC 14+ from emitting C23-versioned glibc symbols (__isoc23_strtoll etc.)
            # that require glibc ≥ 2.38. Fixes #588: ensures wheels work on Debian 12 (glibc 2.36),
            # Ubuntu 22.04 LTS (2.35), and RHEL 8 (2.28).
            export CFLAGS="-std=gnu11"
            export CXXFLAGS="-std=gnu++17"
            export CPPFLAGS="-std=gnu11"
            export CMAKE_C_FLAGS="${CFLAGS}"
            export CMAKE_CXX_FLAGS="${CXXFLAGS}"
            export CC="gcc ${CFLAGS}"
            export CXX="g++ ${CXXFLAGS}"
          cibw-environment: 'MATURIN_BUILD_ARGS="--compatibility manylinux_2_28" CARGO_TARGET_X86_64_UNKNOWN_LINUX_GNU_LINKER=gcc CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=gcc CC_x86_64_unknown_linux_gnu=gcc CC_aarch64_unknown_linux_gnu=gcc CXX_x86_64_unknown_linux_gnu=g++ CXX_aarch64_unknown_linux_gnu=g++'
          # The deployment target is the wheel's macOS floor: 15.0 left macOS 11-14
          # with no installable wheel (#1243). delocate bundles the libheif closure,
          # so the hook builds it from source at the target and PKG_CONFIG_PATH links
          # the wheel against it instead of Homebrew's runner-OS bottles.
          cibw-before-build-macos: bash {project}/scripts/ci/build-macos-heif-deps.sh
          cibw-environment-macos: 'MATURIN_BUILD_ARGS="" CARGO_BUILD_LOCKED=true MACOSX_DEPLOYMENT_TARGET=11.0 PKG_CONFIG_PATH=/tmp/xberg-heif/lib/pkgconfig'
          cibw-before-build-windows: "rustup install 1.95-x86_64-pc-windows-msvc --profile minimal --component rust-src --component rustfmt --component clippy && rustup target add x86_64-pc-windows-msvc --toolchain 1.95-x86_64-pc-windows-msvc && pip install maturin uv && set PATH=%USERPROFILE%\\.cargo\\bin;%PATH%"
          cibw-environment-windows: 'MATURIN_BUILD_ARGS="--target x86_64-pc-windows-msvc" RUSTUP_TOOLCHAIN="1.95-x86_64-pc-windows-msvc" RUSTC_WRAPPER='

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: python-wheels-${{ matrix.os }}
          path: wheelhouse/*.whl
          retention-days: 14

  python-sdist:
    name: Build Python sdist
    needs: [prepare, check-pypi, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_python == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/build-python-sdist@v1
        with:
          output-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - uses: actions/upload-artifact@v7
        with:
          name: python-sdist
          path: dist/*.tar.gz
          retention-days: 14

  node-bindings:
    name: Build Node bindings (${{ matrix.target }})
    needs: [prepare, check-npm]
    if: ${{ needs.prepare.outputs.release_node == 'true' && (needs.check-npm.outputs.node_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-15, target: aarch64-apple-darwin }
          # x86_64-apple-darwin (Intel macOS) intentionally omitted: pyke ships
          # no static ORT for it and Microsoft's last dylib is 1.23.2. Kept in
          # sync with alef's [crates.node].exclude_platforms=["darwin-x64"].
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}

      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: "1.24.2"

      # Build the libheif closure from source at the macOS floor (#1243) and
      # make the .node link it instead of Homebrew's runner-OS bottles.
      - name: Build libheif stack for the macOS floor
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          export MACOSX_DEPLOYMENT_TARGET=11.0
          bash scripts/ci/build-macos-heif-deps.sh
          {
            echo "MACOSX_DEPLOYMENT_TARGET=$MACOSX_DEPLOYMENT_TARGET"
            echo "PKG_CONFIG_PATH=/tmp/xberg-heif/lib/pkgconfig"
          } >>"$GITHUB_ENV"

      - name: Build NAPI binding
        uses: xberg-io/actions/build-node-napi@v1
        with:
          crate-dir: crates/xberg-node
          target: ${{ matrix.target }}
          use-napi-cross: "false"
          pack-target-tarball: node-bindings-${{ matrix.target }}.tar.gz

      - name: Vendor macOS dylib closure (libheif + codecs) into the .node package
        if: contains(matrix.target, 'apple-darwin')
        shell: bash
        run: |
          set -euo pipefail
          # build-node-napi staged the .node (+ @rpath-relocatable ONNX Runtime)
          # into crates/xberg-node/npm/<platform>/ and packed the tarball. The
          # libheif closure is still absolute paths in the .node, so vendor it
          # beside the .node (@loader_path) and repack.
          node_file="$(find crates/xberg-node/npm -maxdepth 2 -name '*.node' -type f | head -1)"
          [ -n "$node_file" ] || { echo "::error::no .node staged under crates/xberg-node/npm"; exit 1; }
          platform_dir="$(dirname "$node_file")"
          bash scripts/ci/vendor-macos-node-dylibs.sh "$platform_dir"
          # Reconcile the platform package.json `files` with every binary now on
          # disk so npm pack ships the whole closure.
          node -e '
            const fs = require("fs"), path = require("path");
            const dir = process.argv[1];
            const p = path.join(dir, "package.json");
            const pkg = JSON.parse(fs.readFileSync(p, "utf8"));
            const ship = /\.(node|dylib|dll)$|\.so(\.[0-9]+)*$/;
            const onDisk = fs.readdirSync(dir).filter((f) => ship.test(f));
            pkg.files = [...new Set([...(pkg.files || []), ...onDisk])].sort();
            fs.writeFileSync(p, JSON.stringify(pkg, null, 2) + "\n");
            console.log("reconciled files:", JSON.stringify(pkg.files));
          ' "$platform_dir"
          # Repack the per-target tarball with the same layout build-node-napi
          # uses (npm/ tree + root index.js/index.d.ts), overwriting the
          # pre-vendor one.
          members=(npm)
          [ -f crates/xberg-node/index.js ] && members+=(index.js)
          [ -f crates/xberg-node/index.d.ts ] && members+=(index.d.ts)
          tar -czf "node-bindings-${{ matrix.target }}.tar.gz" -C crates/xberg-node "${members[@]}"

      - uses: actions/upload-artifact@v7
        with:
          name: node-bindings-${{ matrix.target }}
          path: node-bindings-${{ matrix.target }}.tar.gz
          retention-days: 14

  node-bindings-musl:
    name: Build Node bindings (linux-musl-${{ matrix.arch }})
    needs: [prepare, check-npm]
    if: ${{ needs.prepare.outputs.release_node == 'true' && (needs.check-npm.outputs.node_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, arch: x86_64, napi_arch: x64, target: x86_64-unknown-linux-musl }
          - { os: ubuntu-24.04-arm, arch: aarch64, napi_arch: arm64, target: aarch64-unknown-linux-musl }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive
      - name: Build Node NAPI binding via Alpine Docker
        run: |
          docker build -f docker/Dockerfile.musl-node \
            --build-arg TARGET=${{ matrix.target }} \
            --output type=local,dest=./build-output .
      - name: Stage .node into napi platform dir for npm
        run: |
          platform="linux-${{ matrix.napi_arch }}-musl"
          mkdir -p "staging/npm/${platform}"
          find build-output -name "*.node" -exec cp {} "staging/npm/${platform}/" \;
          test -n "$(find "staging/npm/${platform}" -name '*.node')" || {
            echo "::error::no .node produced by musl build for ${platform}"; exit 1; }
          # Ship the .node's vendored shared-lib closure (libonnxruntime + codecs)
          # beside it — the .node's RUNPATH is $ORIGIN, so co-located libs resolve
          # at require() time. Without them consumers hit ERR_DLOPEN_FAILED.
          if [ -d build-output/vendor ] && [ -n "$(ls -A build-output/vendor 2>/dev/null)" ]; then
            cp -v build-output/vendor/* "staging/npm/${platform}/"
          else
            echo "::error::no vendored shared libs produced by musl build for ${platform}"; exit 1
          fi
          cp "crates/xberg-node/npm/${platform}/package.json" "staging/npm/${platform}/package.json"
          # Reconcile `files` with the binaries on disk — napi create-npm-dirs
          # regenerates the committed package.json to list only *.node, so the
          # vendored libs must be re-added here or npm publish drops them.
          python3 -c '
          import json, os, re, sys
          d = sys.argv[1]; p = os.path.join(d, "package.json")
          pkg = json.load(open(p))
          ship = re.compile(r"\.(node|dylib|dll)$|\.so(\.[0-9]+)*$")
          on_disk = sorted(f for f in os.listdir(d) if ship.search(f))
          pkg["files"] = sorted(set(pkg.get("files", [])) | set(on_disk))
          with open(p, "w") as fh:
              json.dump(pkg, fh, indent=2); fh.write("\n")
          print("reconciled files:", pkg["files"])
          ' "staging/npm/${platform}"
          tar -czf node-bindings-${{ matrix.target }}.tar.gz -C staging npm
      - uses: actions/upload-artifact@v7
        with:
          name: node-bindings-${{ matrix.target }}
          path: node-bindings-${{ matrix.target }}.tar.gz
          if-no-files-found: error
          retention-days: 14

