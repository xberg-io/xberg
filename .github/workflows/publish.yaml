          cp crates/xberg-ffi/include/xberg.h "$STAGE/include/"
          cp LICENSE "$STAGE/" 2>/dev/null || true
          mkdir -p dist/c-ffi
          tar -czf "dist/c-ffi/${STAGE}.tar.gz" "$STAGE"

      - uses: actions/upload-artifact@v7
        with:
          name: c-ffi-${{ matrix.platform }}
