      - uses: actions/upload-artifact@v7
        with:
          name: php-package-${{ matrix.platform.label }}-php${{ matrix.php }}
          path: |
            dist/php-package/php_*.tgz
            dist/php-package/php_*.tgz.sha256
            dist/php-package/php_*.zip
            dist/php-package/php_*.zip.sha256
          retention-days: 14

  cli-binaries:
    name: Build CLI binary (${{ matrix.target }})
    needs: [prepare, check-cli]
    if: ${{ needs.prepare.outputs.release_cli == 'true' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: ubuntu-24.04,
              target: x86_64-unknown-linux-gnu,
            }
          - {
              os: ubuntu-24.04-arm,
              target: aarch64-unknown-linux-gnu,
            }
          - { os: macos-15, target: aarch64-apple-darwin }
          - {
              os: macos-15-intel,
              target: x86_64-apple-darwin,
              extra_cargo_args: "--features ort-dynamic,mcp,mcp-http,api",
            }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive

      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
          cache-key-prefix: cli-native-v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        if: contains(matrix.target, 'windows')
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: "1.24.2"

      - uses: xberg-io/actions/build-rust-cli@v1
        id: build
        with:
          package-name: xberg-cli
          binary-name: xberg
          target: ${{ matrix.target }}
          extra-cargo-args: ${{ matrix.extra_cargo_args || '--features mcp,mcp-http,api' }}

      - name: Vendor ONNX Runtime dylib (Intel macOS)
        if: matrix.target == 'x86_64-apple-darwin'
        shell: bash
        run: |
          set -euxo pipefail
          # This target loads ONNX Runtime at runtime (ort-dynamic) rather than
          # static-linking: pyke ships no x86_64-apple-darwin build. Vendor the
          # dylib setup-onnx-runtime staged (Microsoft's last x86_64 release,
          # 1.23.2, self-contained) next to the binary.
          test -f "$ORT_DYLIB_PATH"
          echo "ORT_VENDOR_LIB=$ORT_DYLIB_PATH" >> "$GITHUB_ENV"

      - name: Package CLI artifact
        env:
          BINARY_PATH: ${{ steps.build.outputs.binary-path }}
          TARGET: ${{ matrix.target }}
        shell: bash
        run: |
          STAGE="xberg-cli-${TARGET}"
          mkdir -p "$STAGE"
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$BINARY_PATH" "$STAGE/xberg.exe"
            7z a "${STAGE}.zip" "$STAGE" >/dev/null
          else
            cp "$BINARY_PATH" "$STAGE/xberg"
            # Intel macOS: bundle libonnxruntime.dylib next to the binary; ort
            # resolves the default dylib name relative to the executable. The
            # official build links only system frameworks, so the one file is
            # the whole closure.
            if [[ "$TARGET" == "x86_64-apple-darwin" && -n "${ORT_VENDOR_LIB:-}" ]]; then
              cp "$ORT_VENDOR_LIB" "$STAGE/libonnxruntime.dylib"
              chmod u+w "$STAGE/libonnxruntime.dylib"
              install_name_tool -id "@loader_path/libonnxruntime.dylib" "$STAGE/libonnxruntime.dylib"
              deps="$(otool -L "$STAGE/libonnxruntime.dylib" | tail -n +3 | awk '{print $1}' \
                | grep -E '^(/opt/homebrew|/usr/local)/' || true)"
              if [[ -n "$deps" ]]; then
                echo "::error::vendored ONNX Runtime links non-system libraries:"; echo "$deps"; exit 1
              fi
              codesign --force -s - "$STAGE/libonnxruntime.dylib" || true
            fi
            tar -czf "${STAGE}.tar.gz" "$STAGE"
          fi

      - uses: actions/upload-artifact@v7
        with:
          name: cli-${{ matrix.target }}
          path: |
            xberg-cli-${{ matrix.target }}.tar.gz
            xberg-cli-${{ matrix.target }}.zip
          if-no-files-found: ignore
          retention-days: 14

