  wasm-bindings:
    name: Build WASM package
    needs: [prepare, check-npm]
    if: ${{ needs.prepare.outputs.release_wasm == 'true' && (needs.check-npm.outputs.wasm_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    timeout-minutes: 120
    continue-on-error: true
    env:
      CARGO_BUILD_JOBS: 1
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: wasm32-unknown-unknown
          cache-key-prefix: wasm-bindings

      - uses: xberg-io/actions/install-wasi-sdk@v1

      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/build-wasm-package@v1
        with:
          crate-dir: crates/xberg-wasm
          pack-tarball: "true"
          # The wasm-pack nodejs glue carries unresolvable require("env") /
          # require("wasi_snapshot_preview1") calls (from the WASI-cross-compiled
          # Tesseract in ocr-wasm) that throw on load. fix-wasi-imports.mjs stubs
          # them post-build. This override is the durable hook: alef regenerates
          # crates/xberg-wasm/package.json scripts and drops any hand-added
          # suffix, so we invoke the patch here (publish.yaml is not generated)
          # rather than relying on a package.json script surviving regen.
          build-command: "pnpm run build:all && node scripts/fix-wasi-imports.mjs"

      - name: Smoke test — Node can load the wasm glue
        working-directory: crates/xberg-wasm
        shell: bash
        run: |
          set -euo pipefail
          # Guards the exact rc.21 regression: the wasm-pack nodejs glue carried
          # unresolvable require("env") / require("wasi_snapshot_preview1") calls
          # that threw on load. scripts/fix-wasi-imports.mjs (run via the
          # build-command override above) must have stubbed them; if not, a
          # plain require() throws here and
          # fails the job before a broken package can publish. Load-only (no
          # tessdata needed) so it is fast and network-free.
          node -e '
            const wasm = require("./pkg/nodejs/xberg_wasm.js");
            if (typeof wasm.extract !== "function" || typeof wasm.WasmExtractInput !== "function") {
              console.error("wasm glue loaded but expected exports are missing"); process.exit(1);
            }
            console.log("wasm nodejs glue loaded; exports present:", Object.keys(wasm).length);
          '

      - uses: actions/upload-artifact@v7
        with:
          name: wasm-bundle
          path: |
            crates/xberg-wasm/dist/**
            crates/xberg-wasm/dist-node/**
            crates/xberg-wasm/dist-web/**
            crates/xberg-wasm/pkg/**
            crates/xberg-wasm/package.json
          retention-days: 14

