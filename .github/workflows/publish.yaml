  elixir-natives:
    name: Build Elixir NIF (${{ matrix.label }} nif-${{ matrix.nif }})
    needs: [prepare, check-elixir-release, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' && (needs.check-elixir-release.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-15, macos-15-intel, windows-latest]
        nif: ["2.16"]
        include:
          - os: ubuntu-latest
            label: linux-x86_64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            label: linux-aarch64
            target: aarch64-unknown-linux-gnu
          - os: macos-15-intel
            label: macos-x86_64
            target: x86_64-apple-darwin
          - os: macos-15
            label: macos-arm64
            target: aarch64-apple-darwin
          - os: windows-latest
            label: windows-x86_64
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - name: Override ImageOS on ARM Linux runners
        if: matrix.os == 'ubuntu-24.04-arm'
        shell: bash
        run: echo "ImageOS=ubuntu24" >> "$GITHUB_ENV"

      - name: Override ImageOS on Windows runners
        if: runner.os == 'Windows'
        shell: bash
        run: echo "ImageOS=win25" >> "$GITHUB_ENV"

      - uses: erlef/setup-beam@v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1

      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild

      - name: Disable sccache wrapper on Windows
        if: contains(matrix.target, 'windows')
        shell: bash
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - uses: xberg-io/actions/build-elixir-natives@v1
        with:
          target: ${{ matrix.target }}
          nif-crate-name: xberg_nif
          nif-crate-path: packages/elixir/native/xberg_nif
          package-dir: packages/elixir
          nif-version: ${{ needs.prepare.outputs.version }}
          nif-api-version: ${{ matrix.nif }}
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - uses: actions/upload-artifact@v7
        with:
          name: elixir-${{ matrix.label }}-nif-${{ matrix.nif }}
          path: dist/elixir-natives/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  elixir-natives-musl:
    name: Build Elixir NIF (linux-musl-${{ matrix.arch }} nif-${{ matrix.nif }})
    needs: [prepare, check-elixir-release, publish-crates]
    if: ${{ !cancelled() && needs.publish-crates.result != 'failure' && needs.prepare.outputs.release_elixir == 'true' && (needs.check-elixir-release.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
        nif: ["2.16"]
        include:
          - os: ubuntu-latest
            arch: x86_64
            target: x86_64-unknown-linux-musl
          - os: ubuntu-24.04-arm
            arch: aarch64
            target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - name: Build xberg_nif via Alpine Docker
        run: |
          docker build -f docker/Dockerfile.musl-rustler \
            --output type=local,dest=./build-output .

      - name: Package NIF as RustlerPrecompiled tarball
        env:
          TARGET: ${{ matrix.target }}
          NIF_API: ${{ matrix.nif }}
          NIF_VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/elixir-natives staging
          cp build-output/libxberg_nif.so staging/libxberg_nif.so
          TARBALL="libxberg_nif-v${NIF_VERSION}-nif-${NIF_API}-${TARGET}.so.tar.gz"
          tar -czf "dist/elixir-natives/${TARBALL}" -C staging libxberg_nif.so
          ( cd dist/elixir-natives && sha256sum "${TARBALL}" >"${TARBALL}.sha256" )

      - uses: actions/upload-artifact@v7
        with:
          name: elixir-musl-${{ matrix.arch }}-nif-${{ matrix.nif }}
          path: dist/elixir-natives/*.tar.gz
          if-no-files-found: error
          retention-days: 14

  dart-server-natives:
    name: Build Dart server native (${{ matrix.blob }})
    needs: [prepare, check-pub]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && (needs.check-pub.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              os: ubuntu-latest,
              target: x86_64-unknown-linux-gnu,
              blob: linux-x86_64,
              lib: libxberg_dart.so,
            }
          - {
              os: ubuntu-24.04-arm,
              target: aarch64-unknown-linux-gnu,
              blob: linux-aarch64,
              lib: libxberg_dart.so,
            }
          - {
              os: macos-15,
              target: aarch64-apple-darwin,
              # Asset blob uses the aarch64 spelling to match native_loader.dart's
              # nativeAssetBlob() (and the linux-aarch64 asset); the cache RID stays
              # macos-arm64. A macos-arm64 asset name here 404s on Apple Silicon.
              blob: macos-aarch64,
              lib: libxberg_dart.dylib,
            }
          - {
              os: macos-15-intel,
              target: x86_64-apple-darwin,
              blob: macos-x86_64,
              lib: libxberg_dart.dylib,
            }
          - {
              os: windows-latest,
              target: x86_64-pc-windows-msvc,
              blob: windows-x86_64,
              lib: xberg_dart.dll,
            }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}
      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps
      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: "1.24.2"
      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1
      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild
      - name: Disable sccache wrapper on Windows
        if: contains(matrix.target, 'windows')
        shell: bash
        run: echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"

      - name: Build Dart server native
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"
          # `cargo zigbuild` REPLACES the `build` subcommand (no literal "build"
          # after it), so bake the whole subcommand into BUILD_CMD.
          BUILD_CMD="cargo build"
          TARGET_ARG="$TARGET"
          # Use zigbuild for linux-gnu targets to set glibc floor to 2.28
          if [[ "$TARGET" == *"-linux-gnu" ]]; then
            BUILD_CMD="cargo zigbuild"
            TARGET_ARG="${TARGET}.2.28"
            echo "[publish] glibc floor: 2.28 (target: ${TARGET_ARG})"
          fi
          ${BUILD_CMD} --locked -p xberg-dart --release --target "${TARGET_ARG}"
      - name: Stage native library
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          LIB: ${{ matrix.lib }}
        run: |
          mkdir -p dist/server-natives
          cp "target/${TARGET}/release/${LIB}" "dist/server-natives/${LIB}"
      - uses: actions/upload-artifact@v7
        with:
          name: dart-server-${{ matrix.blob }}
          path: dist/server-natives
          if-no-files-found: error
          retention-days: 14

  upload-dart-release:
    name: Upload Dart server natives to GitHub Release
    needs: [prepare, dart-server-natives]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.release_dart == 'true' && needs.dart-server-natives.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: dart-server-*
          path: dart-server-artifacts

      - name: Package server natives as tarballs
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/dart-release
          for dir in dart-server-artifacts/dart-server-*; do
            [[ -d "$dir" ]] || continue
            blob="$(basename "$dir" | sed 's/^dart-server-//')"
            lib="$(find "$dir" -type f | head -n1)"
            [[ -f "$lib" ]] || continue
            staging="$(mktemp -d)"
            cp "$lib" "$staging/"
            tarball="xberg-dart-v${VERSION}-${blob}.tar.gz"
            tar -czf "dist/dart-release/${tarball}" -C "$staging" "$(basename "$lib")"
            ( cd dist/dart-release && sha256sum "${tarball}" >"${tarball}.sha256" )
            rm -rf "$staging"
          done

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/dart-release
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          # Include the .sha256 sidecars: native_loader.dart verifies the
          # downloaded tarball against them before extracting, so a bare
          # xberg-dart-*.tar.gz pattern (no trailing *) would ship natives the
          # loader then refuses to install.
          assets: xberg-dart-*.tar.gz*

  swift-artifactbundle:
    name: Build Swift artifact bundle
    needs: prepare
    if: ${{ needs.prepare.outputs.release_swift == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/build-swift-artifactbundle@v1
        id: bundle
        with:
          crate-name: xberg-swift
          # Must match the asset filename the alef-generated root Package.swift
          # binaryTarget resolves: `<name>.artifactbundle.zip`. The manifest
          # references Xberg-rs.artifactbundle.zip, so the uploaded asset (named
          # after artifact-name) must be Xberg-rs, not XbergSwift, or SwiftPM 404s.
          artifact-name: Xberg-rs
          include-macos-x86_64: "false"
          include-ios-x86_64: "false"
      - uses: actions/upload-artifact@v7
        with:
          name: swift-artifactbundle
          path: ${{ steps.bundle.outputs.bundle-zip }}
          if-no-files-found: error
          retention-days: 14
      - uses: actions/upload-artifact@v7
        with:
          name: swift-checksum
          path: ${{ steps.bundle.outputs.checksum-file }}
          if-no-files-found: error
          retention-days: 14

  swift-package:
    name: Build Swift package
    needs: prepare
    if: ${{ needs.prepare.outputs.release_swift == 'true' }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/build-swift-package@v1
        with:
          package-dir: packages/swift
          crate-name: xberg-swift

      - uses: actions/upload-artifact@v7
        with:
          name: swift-package
          path: packages/swift
          retention-days: 14

  update-swift-package-manifest:
    name: Update Swift Package.swift manifest with version and checksum
    needs: [prepare, swift-artifactbundle]
    if: ${{ needs.prepare.outputs.release_swift == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - uses: actions/download-artifact@v8
        with:
          name: swift-checksum
          path: swift-checksums

      - name: Update Package.swift with version and checksum
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          CHECKSUM=$(cat swift-checksums/*.checksum | tr -d '[:space:]')

          # Replace placeholders in Package.swift. The version placeholder is normally already
          # substituted by `alef sync-versions` at bump time; the checksum is only known here,
          # after the artifactbundle is built.
          sed -i "s/__ALEF_SWIFT_VERSION__/${VERSION}/g" Package.swift
          sed -i "s/__ALEF_SWIFT_CHECKSUM__/${CHECKSUM}/g" Package.swift

          echo "Updated Package.swift:"
          head -40 Package.swift

      - name: Commit and push Package.swift
        run: |
          git config user.name "xberg-dev-publisher[bot]"
          git config user.email "291994444+xberg-dev-publisher[bot]@users.noreply.github.com"
          git add Package.swift
          git commit -m "chore(swift): update Package.swift with checksum for v${{ needs.prepare.outputs.version }}"
          git tag -f "${{ needs.prepare.outputs.tag }}"
          git push origin -f "refs/tags/${{ needs.prepare.outputs.tag }}"
          # Also publish the checksummed commit to a release/swift/<version> branch. The
          # alef-generated Swift e2e/test-app pins `branch: "release/swift/<version>"`, so this
          # ref must exist for SwiftPM to resolve the package with the substituted XCFramework
          # checksum.
          git push origin -f "HEAD:refs/heads/release/swift/${{ needs.prepare.outputs.version }}"

  zig-package:
    name: Build Zig package (smoke check)
    needs: prepare
    if: ${{ needs.prepare.outputs.release_zig == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/build-zig-package@v1
        with:
          ffi-crate: xberg-ffi
          package-dir: packages/zig

  cli-proxy-wheels:
    name: Build CLI proxy wheel (${{ matrix.target }})
    needs: [prepare, check-cli, cli-binaries, cli-binaries-musl]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.cli-binaries.result == 'success' && needs.cli-binaries-musl.result == 'success' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: aarch64-apple-darwin }
          - { target: aarch64-unknown-linux-gnu }
          - { target: aarch64-unknown-linux-musl }
          - { target: x86_64-apple-darwin }
          - { target: x86_64-unknown-linux-gnu }
          - { target: x86_64-unknown-linux-musl }
          - { target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download CLI binaries
        uses: actions/download-artifact@v8
        with:
          pattern: cli-${{ matrix.target }}
          path: dist-cli-binaries
          merge-multiple: true

      - name: Prepare binary for wheel
        shell: bash
        run: |
          set -euo pipefail
          TARGET="${{ matrix.target }}"

          # Find the binary artifact
          if [ -f "dist-cli-binaries/xberg-cli-${TARGET}.tar.gz" ]; then
            ARTIFACT="dist-cli-binaries/xberg-cli-${TARGET}.tar.gz"
          elif [ -f "dist-cli-binaries/xberg-cli-${TARGET}.zip" ]; then
            ARTIFACT="dist-cli-binaries/xberg-cli-${TARGET}.zip"
          else
            echo "Error: No binary found for ${TARGET}"
            ls -la dist-cli-binaries/ || true
            exit 1
          fi

          # Extract to repo root so hatch_build.py can find it
          cp "$ARTIFACT" "xberg-cli-${TARGET}.$([ "${ARTIFACT##*.}" = "gz" ] && echo tar.gz || echo zip)"
          echo "Binary prepared: xberg-cli-${TARGET}.*"

      - name: Build wheel with bundled binary
        shell: bash
        working-directory: cli-proxy/pypi
        env:
          XBERG_CLI_TARGET: ${{ matrix.target }}
        run: |
          pip install hatchling build
          python -m build --wheel

      - name: Upload wheel
        uses: actions/upload-artifact@v7
        with:
          name: cli-proxy-wheel-${{ matrix.target }}
          path: cli-proxy/pypi/dist/*.whl
          retention-days: 14

  upload-cli-release:
    name: Upload CLI binaries to GitHub Release
    needs: [prepare, cli-binaries, cli-binaries-musl]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.cli-binaries.result == 'success' && needs.cli-binaries-musl.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: cli-*
          path: dist/cli
          merge-multiple: true

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/cli
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: |
            xberg-cli-*.tar.gz
            xberg-cli-*.zip

  upload-go-release:
    name: Upload Go FFI archives to GitHub Release
    needs: [prepare, go-ffi-libraries]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.go-ffi-libraries.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: go-ffi-*
          path: dist/go-ffi
          merge-multiple: true

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/go-ffi
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: xberg-go-*.tar.gz

  upload-c-ffi-release:
    name: Upload C FFI archives to GitHub Release
    needs: [prepare, c-ffi-libraries]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.c-ffi-libraries.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: c-ffi-*
          path: dist/c-ffi
          merge-multiple: true

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/c-ffi
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: xberg-ffi-*.tar.gz

  upload-elixir-release:
    name: Upload Elixir NIF archives to GitHub Release
    needs: [prepare, elixir-natives, elixir-natives-musl]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && (needs.elixir-natives.result == 'success' || needs.elixir-natives-musl.result == 'success') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: elixir-*
          path: dist/elixir
          merge-multiple: true

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/elixir
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: libxberg_nif-*.tar.gz

  upload-php-pie-release:
    name: Upload PHP PIE archives to GitHub Release
    needs: [prepare, php-extension]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.php-extension.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          pattern: php-package-*
          path: dist/php-package
          merge-multiple: true

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/php-package
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: |
            php_*.tgz
            php_*.tgz.sha256
            php_*.zip
            php_*.zip.sha256

  upload-swift-bundle:
    name: Upload Swift artifact bundle to GitHub Release
    needs: [prepare, swift-artifactbundle]
    if: ${{ needs.prepare.outputs.is_tag == 'true' && needs.swift-artifactbundle.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/download-artifact@v8
        with:
          name: swift-artifactbundle
          path: dist/swift-bundle

      - uses: xberg-io/actions/upload-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          working-directory: dist/swift-bundle
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          token: ${{ steps.app-token.outputs.token }}
          assets: "*.zip"

  verify-assets:
    name: Verify release assets
    needs:
      - prepare
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
    if: ${{ always() && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && !contains(needs.*.result, 'failure') }}
    runs-on: ubuntu-latest
    steps:
      - uses: xberg-io/actions/verify-release-assets@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          expected-assets: |
            # CLI
            xberg-cli-*.tar.gz
            xberg-cli-*.zip
            # Go FFI
            xberg-go-*.tar.gz
            # C FFI
            xberg-ffi-*.tar.gz
            # Elixir NIF
            libxberg_nif-*.tar.gz

  publish-crates:
    name: Publish crates.io packages
    needs: [prepare, validate-versions, check-cratesio]
    if: ${{ needs.prepare.outputs.release_crates == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-cratesio.outputs.all_exist != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - uses: xberg-io/actions/publish-crates@v1
        with:
          crates: xberg-libheif xberg-tesseract xberg-paddle-ocr xberg-candle-ocr xberg-gliner xberg xberg-cli
          version: ${{ needs.prepare.outputs.version }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-pypi:
    name: Publish to PyPI
    needs: [prepare, python-wheels, python-sdist, check-pypi]
    if: ${{ needs.prepare.outputs.release_python == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-pypi.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: python-wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v8
        with:
          name: python-sdist
          path: dist

      - name: Verify Python wheel package contents
        uses: xberg-io/actions/verify-package-contents@v1
        with:
          language: python
          artifact-path: dist
          package-name: xberg
          strict: "false"

      - uses: xberg-io/actions/publish-pypi@v1
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-cli-proxy:
    name: Publish CLI proxy to PyPI (wheels + sdist)
    needs: [prepare, check-cli, cli-proxy-wheels]
    if: ${{ needs.prepare.outputs.release_cli == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Download CLI proxy wheels
        uses: actions/download-artifact@v8
        with:
          pattern: cli-proxy-wheel-*
          path: dist
          merge-multiple: true

      - name: Build CLI proxy sdist (fallback with downloader)
        working-directory: cli-proxy/pypi
        run: |
          pip install hatchling build
          python -m build --sdist
          cp dist/*.tar.gz ../../dist/

      - name: Verify CLI proxy package contents
        uses: xberg-io/actions/verify-package-contents@v1
        with:
          language: python
          artifact-path: dist
          package-name: xberg-cli
          strict: "false"

      - uses: xberg-io/actions/publish-pypi@v1
        with:
          packages-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-rubygems:
    name: Publish Ruby gems
    needs: [prepare, ruby-gem, check-rubygems]
    if: ${{ needs.prepare.outputs.release_ruby == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-rubygems.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: rubygems-*
          path: dist

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: false

      - name: Update RubyGems for OIDC trusted publishing
        run: gem update --system

      - uses: rubygems/configure-rubygems-credentials@v2.0.0

      - name: Verify Ruby gem package contents
        uses: xberg-io/actions/verify-package-contents@v1
        with:
          language: ruby
          artifact-path: dist
          package-name: xberg

      - uses: xberg-io/actions/publish-rubygems@v1
        with:
          gems-dir: dist
          dry-run: ${{ needs.prepare.outputs.dry_run }}

  publish-node:
    name: Publish Node packages
    needs: [prepare, node-bindings, node-bindings-musl, node-bindings-manylinux, check-npm]
    if: ${{ needs.prepare.outputs.release_node == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-npm.outputs.node_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: actions/download-artifact@v8
        with:
          pattern: node-bindings-*
          path: node-artifacts
          merge-multiple: true

      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - name: Stage platform packages and main package
        shell: bash
        run: |
          # Every node-bindings artifact ships the canonical napi layout
          # (npm/<napi-platform>/{package.json,*.node}); the macOS/Windows legs
          # also carry index.js + index.d.ts at the tarball root. Extract them,
          # pack each platform sub-package that has both a package.json and a
          # built .node, and stamp the main package's optionalDependencies from
          # exactly those sub-packages. Platform dirs that napi created but no
          # job built (e.g. win32-arm64-msvc) have a package.json but no .node —
          # skip them so we never publish an empty package or reference it.
          # Extract each artifact in ISOLATION and copy only the platform dirs
          # that actually contain a built .node. `napi create-npm-dirs` stamps a
          # package.json stub for EVERY platform into EVERY artifact, so a blind
          # `tar -xzf` of all artifacts onto one shared tree lets a later
          # artifact's empty stub clobber the dylib-aware package.json a
          # platform's own artifact produced — resetting `files` to just the
          # .node, which makes `npm pack` silently drop the vendored ORT dylib
          # (rc.21 shipped darwin-arm64/-x64 + linux-arm64-gnu broken this way).
          # Copying only dirs-that-have-a-.node makes the merge a union of
          # populated dirs, immune to extraction order.
          rm -rf crates/xberg-node/npm
          mkdir -p crates/xberg-node/npm
          for pkg in node-artifacts/*.tar.gz; do
            scratch="$(mktemp -d)"
            tar -xzf "${pkg}" -C "${scratch}"
            for dir in "${scratch}"/npm/*/; do
              if ls "${dir}"*.node >/dev/null 2>&1; then
                # strip trailing slash so `cp -R src dest/` copies the dir
                # itself, not its contents (BSD/macOS cp semantics; harmless
                # on the GNU cp used in CI).
                cp -R "${dir%/}" crates/xberg-node/npm/
              fi
            done
            # index.js / index.d.ts ride at the tarball root on the macOS and
            # Windows legs and are identical across targets; copy when present.
            [ -f "${scratch}/index.js" ] && cp -f "${scratch}/index.js" crates/xberg-node/index.js
            [ -f "${scratch}/index.d.ts" ] && cp -f "${scratch}/index.d.ts" crates/xberg-node/index.d.ts
            rm -rf "${scratch}"
          done

          # Pack each platform sub-package (only those that shipped a binary).
          cd crates/xberg-node/npm
          for dir in */; do
            if [ -f "$dir/package.json" ] && ls "$dir"*.node >/dev/null 2>&1; then
              (cd "$dir" && npm pack && mv ./*.tgz ..)
            fi
          done
          cd ../../..

          # Stamp main package's optionalDependencies with the packed platforms.
          tmp_pkg_json="$(mktemp)"
          optional_deps_json='{}'
          for platform_pkg_json in crates/xberg-node/npm/*/package.json; do
            dir="$(dirname "$platform_pkg_json")"
            ls "$dir"/*.node >/dev/null 2>&1 || continue
            name="$(jq -r '.name // empty' "$platform_pkg_json")"
            version="$(jq -r '.version // empty' "$platform_pkg_json")"
            [[ -z "$name" || -z "$version" ]] && { echo "Invalid: $platform_pkg_json" >&2; exit 1; }
            optional_deps_json="$(jq -c --arg n "$name" --arg v "$version" '. + {($n): $v}' <<<"$optional_deps_json")"
          done
          jq --argjson deps "$optional_deps_json" '.optionalDependencies = $deps' \
            crates/xberg-node/package.json > "$tmp_pkg_json"
          mv "$tmp_pkg_json" crates/xberg-node/package.json

      - name: Publish platform sub-packages
        continue-on-error: true
        uses: xberg-io/actions/publish-npm@v1
        with:
          packages-dir: crates/xberg-node/npm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Wait for npm indexing (node-linux-x64-gnu)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@xberg-io/xberg-linux-x64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "60"

      - name: Wait for npm indexing (node-linux-arm64-gnu)
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        uses: xberg-io/actions/wait-for-package@v1
        with:
          registry: npm
          package: "@xberg-io/xberg-linux-arm64-gnu"
          version: ${{ needs.prepare.outputs.version }}
          max-attempts: "60"

      - name: Publish main @xberg-io/xberg package
        uses: xberg-io/actions/publish-npm@v1
        with:
          package-dir: crates/xberg-node
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          provenance: "true"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-wasm:
    name: Publish WASM package
    needs: [prepare, wasm-bindings, check-npm]
    if: ${{ needs.wasm-bindings.result == 'success' && needs.prepare.outputs.release_wasm == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-npm.outputs.wasm_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: actions/download-artifact@v8
        with:
          name: wasm-bundle
          path: crates/xberg-wasm

      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"

      - uses: xberg-io/actions/publish-npm@v1
        with:
          package-dir: crates/xberg-wasm
          npm-tag: ${{ needs.prepare.outputs.npm_tag }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
          provenance: "true"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish-packagist:
    name: Trigger Packagist update
    needs: [prepare, upload-php-pie-release, check-packagist]
    if: ${{ needs.prepare.outputs.release_php == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-packagist.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: xberg-io/actions/publish-packagist@v1
        with:
          packagist-username: xberg-dev
          package-name: xberg/xberg
          version: ${{ needs.prepare.outputs.version }}
          repository-url: https://github.com/xberg-io/xberg
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}

  publish-maven:
    name: Publish Maven (Java) package
    needs: [prepare, java-natives, java-natives-musl, check-maven]
    if: ${{ needs.prepare.outputs.release_java == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.java_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: actions/download-artifact@v8
        with:
          pattern: java-natives-*
          path: artifacts/java-natives
          merge-multiple: true

      - uses: xberg-io/actions/stage-java-natives@v1
        with:
          resources-dir: packages/java/src/main/resources/natives
          required-classifiers: >-
            linux-x86_64 linux-aarch64 macos-arm64 macos-x86_64 windows-x86_64
            linux-musl-x86_64 linux-musl-aarch64
          lib-name: xberg_ffi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - uses: xberg-io/actions/setup-maven@v1

      - uses: xberg-io/actions/publish-maven@v1
        with:
          pom-file: packages/java/pom.xml
          maven-profile: publish
          extra-args: -DskipTests
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-kotlin-android:
    name: Publish Kotlin Android (Maven Central via Gradle)
    needs: [prepare, kotlin-android-natives, check-maven]
    if: ${{ needs.prepare.outputs.release_kotlin == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-maven.outputs.kotlin_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: actions/download-artifact@v8
        with:
          pattern: kotlin-android-*
          path: kotlin-android-artifacts
          merge-multiple: true

      - name: Stage Android natives into Kotlin Android module
        shell: bash
        run: |
          for abi in arm64-v8a x86_64; do
            dest="packages/kotlin-android/src/main/jniLibs/${abi}"
            mkdir -p "$dest"
            src="kotlin-android-artifacts/${abi}/libxberg_ffi.so"
            if [[ -f "$src" ]]; then
              cp -v "$src" "$dest/"
            fi
          done

      - uses: android-actions/setup-android@v4
        with:
          packages: "platforms;android-36 build-tools;36.0.0"

      - uses: xberg-io/actions/publish-maven-gradle@v1
        with:
          working-directory: packages/kotlin-android
          gradle-task: publishAndReleaseToMavenCentral
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          MAVEN_GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  publish-nuget:
    name: Publish NuGet package
    needs: [prepare, csharp-natives, csharp-natives-musl, check-nuget]
    if: ${{ needs.prepare.outputs.release_csharp == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-nuget.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: actions/download-artifact@v8
        with:
          pattern: csharp-natives-*
          path: csharp-natives
          merge-multiple: true

      - name: Stage runtimes/<rid>/native into NuGet project
        run: |
          mkdir -p packages/csharp/Xberg/runtimes
          for dir in csharp-natives/runtimes/*/; do
            rid="$(basename "$dir")"
            mkdir -p "packages/csharp/Xberg/runtimes/${rid}/native"
            cp -v "${dir}native/"* "packages/csharp/Xberg/runtimes/${rid}/native/"
          done
        shell: bash

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: Pack NuGet package
        run: |
          dotnet pack packages/csharp/Xberg/Xberg.csproj \
            -c Release \
            -p:Version=${{ needs.prepare.outputs.version }} \
            -o dist/nuget
        shell: bash

      - uses: xberg-io/actions/publish-nuget@v1
        with:
          packages-dir: dist/nuget
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  finalize-github-release-after-uploads:
    name: Finalize GitHub Release (after uploads)
    needs:
      - prepare
      - verify-assets
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
      - upload-swift-bundle
    if: >-
      ${{ always()
      && needs.prepare.outputs.is_tag == 'true'
      && needs.prepare.outputs.dry_run != 'true'
      && needs.verify-assets.result == 'success'
      && needs.upload-cli-release.result == 'success'
      && needs.upload-go-release.result == 'success'
      && needs.upload-c-ffi-release.result == 'success'
      && needs.upload-elixir-release.result == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: xberg-io/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          is-prerelease: ${{ needs.prepare.outputs.is_prerelease }}
          token: ${{ steps.app-token.outputs.token }}

  publish-hex:
    name: Publish Elixir Hex package
    needs: [prepare, finalize-github-release-after-uploads, check-hex]
    if: ${{ needs.prepare.outputs.release_elixir == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-hex.outputs.elixir_exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}

          submodules: recursive
      - uses: xberg-io/actions/setup-rust@v1
      - uses: erlef/setup-beam@v1.24.0
        with:
          elixir-version: "1.17"
          otp-version: "27"

      - name: Generate NIF checksum file
        uses: xberg-io/actions/generate-elixir-checksums@v1
        with:
          github-repo: xberg-io/xberg
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          lib-name: xberg_nif
          # Must match the NIF versions actually built (elixir-natives matrix) and
          # declared in packages/elixir/lib/xberg/native.ex (`nif_versions: ["2.16"]`).
          # NIF 2.16 loads fine on OTP 27 (NIF minor versions are backward compatible),
          # so a single 2.16 artifact covers every supported runtime. Requesting 2.17
          # here made the checksum step hunt for assets that were never built.
          nif-versions: "2.16"
          targets: x86_64-unknown-linux-gnu,aarch64-unknown-linux-gnu,x86_64-unknown-linux-musl,aarch64-unknown-linux-musl,aarch64-apple-darwin,x86_64-apple-darwin,x86_64-pc-windows-msvc
          output-path: packages/elixir/checksum-Elixir.Xberg.Native.exs

      - name: Build Elixir Hex tarball with dependency rewrite
        id: build-hex
        uses: xberg-io/actions/build-elixir-hex@v1
        with:
          package-dir: packages/elixir
          nif-crate-path: packages/elixir/native/xberg_nif
          rewrite-native-deps: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}

      - uses: xberg-io/actions/publish-hex@v1
        with:
          package-dir: packages/elixir
          tarball-path: ${{ steps.build-hex.outputs.archive-path }}
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  trigger-pubdev:
    name: Trigger pub.dev publish workflow
    needs: [prepare, check-pub, upload-dart-release]
    if: ${{ needs.prepare.outputs.release_dart == 'true' && needs.prepare.outputs.is_tag == 'true' && needs.prepare.outputs.dry_run != 'true' && (needs.check-pub.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') && needs.upload-dart-release.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - name: Dispatch publish-pubdev workflow
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh workflow run publish-pubdev.yaml \
            --ref ${{ github.ref_name }} \
            -f ref=${{ needs.prepare.outputs.checkout_ref }}

  publish-zig:
    name: Publish Zig package metadata
    needs: [prepare, finalize-github-release-after-uploads, check-zig, c-ffi-libraries]
    if: ${{ needs.prepare.outputs.release_zig == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-zig.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref }}
          submodules: recursive

      - uses: actions/download-artifact@v8
        with:
          pattern: c-ffi-*
          path: dist/c-ffi-downloaded
          merge-multiple: false

      - name: Lay out FFI artifacts for multi-platform Zig bundle
        shell: bash
        run: |
          set -euo pipefail
          # xberg c-ffi tarballs are named by platform label (no version):
          # xberg-ffi-<platform>.tar.gz, each containing <stage>/lib/* and
          # <stage>/include/*.h. Map each platform to the publish-zig RID layout.
          declare -A RID_FOR=(
            ["linux-x86_64"]="linux-x64"
            ["linux-aarch64"]="linux-arm64"
            ["macos-arm64"]="osx-arm64"
            ["macos-x86_64"]="osx-x64"
            ["windows-x86_64"]="win-x64"
          )
          out="ffi-artifacts"
          mkdir -p "$out/include"
          for art in dist/c-ffi-downloaded/*/xberg-ffi-*.tar.gz; do
            [ -f "$art" ] || continue
            platform="$(basename "$art" .tar.gz)"
            platform="${platform#xberg-ffi-}"
            rid="${RID_FOR[$platform]:-}"
            if [ -z "$rid" ]; then
              echo "::warning::Unknown C FFI platform '$platform' — skipping"
              continue
            fi
            tmp="$(mktemp -d)"
            tar -xzf "$art" -C "$tmp"
            stage_root="$(find "$tmp" -maxdepth 1 -mindepth 1 -type d | head -1)"
            mkdir -p "$out/$rid"
            # Ship shared libraries only. packages/zig/build.zig links xberg_ffi
            # dynamically (linkSystemLibrary), so the per-platform static archives
            # (libxberg_ffi.a, 500-760MB each) are dead weight. Bundling all five
            # platforms' .a produced a 1.15GB release tarball whose upload to
            # uploads.github.com failed; shared libs alone are ~70-105MB/platform.
            shopt -s nullglob
            copied=0
            for lib in "$stage_root"/lib/*.so "$stage_root"/lib/*.so.* \
                       "$stage_root"/lib/*.dylib "$stage_root"/lib/*.dll; do
              cp "$lib" "$out/$rid/"
              copied=1
            done
            shopt -u nullglob
            if [ "$copied" -eq 0 ]; then
              echo "::warning::no shared library found for $rid under $stage_root/lib — skipping"
            fi
            cp "$stage_root"/include/*.h "$out/include/" 2>/dev/null || true
            rm -rf "$tmp"
          done
          ls -la "$out"
          for d in "$out"/*/; do echo "--- $d ---"; ls -la "$d"; done

      # Mint the app token immediately before the upload. GitHub App installation
      # tokens have a hard 1h TTL; laying out the multi-platform FFI bundle (>1GB)
      # can outlast a token minted at job start, causing the release upload to 401.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: xberg-io/actions/publish-zig@v1
        with:
          working-directory: packages/zig
          tag: ${{ needs.prepare.outputs.tag }}
          # ~keep Override the auto-detected package-name (`.xberg` from
          # ~keep build.zig.zon) to match the alef-emitted test_app URL pattern
          # ~keep `{crate-name}-zig-v{version}.tar.gz`. Without this, the asset
          # ~keep uploads as `xberg-v{version}.tar.gz` while test_apps/zig
          # ~keep fetches `xberg-zig-v{version}.tar.gz` → 404 + consumer
          # ~keep build.zig.zon placeholder hash.
          package-name: xberg-zig
          multi-platform-ffi-dir: ffi-artifacts
          module-name: xberg
          ffi-lib-name: xberg_ffi
          update-release-notes: "true"
          update-existing: "true"
          dry-run: ${{ needs.prepare.outputs.dry_run }}
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  publish-homebrew-formula:
    name: Update Homebrew formula
    needs: [prepare, upload-cli-release, check-homebrew]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-homebrew.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: actions/create-github-app-token@v2
        id: tap-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io
          repositories: homebrew-tap

      - name: Checkout source repo
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: xberg-io/homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap
          persist-credentials: true

      - name: Update formula files
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
          TAP_DIR: ${{ github.workspace }}/homebrew-tap
          DRY_RUN: ${{ needs.prepare.outputs.dry_run }}
        run: scripts/publish/update-homebrew-formula.sh
        shell: bash

      - name: Commit and push to tap
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          git config user.name "xberg-dev-publisher[bot]"
          git config user.email "291994444+xberg-dev-publisher[bot]@users.noreply.github.com"
          if git diff --quiet Formula/; then
            echo "No formula changes; skipping commit."
            exit 0
          fi
          git add Formula/xberg.rb
          git commit -m "xberg ${{ needs.prepare.outputs.version }}"
          git push origin HEAD
        shell: bash

  homebrew-bottles:
    name: Build Homebrew bottle (${{ matrix.bottle_tag }})
    # Depends on finalize so the GitHub Release is out of draft before the bottle
    # build's `brew install` fetches the source tarball: the formula now pins a
    # release-asset URL (stable bytes, uploaded by publish-homebrew-formula), and
    # draft-release assets are not publicly downloadable. In dry-run finalize is
    # skipped, so this job is skipped too (no asset is uploaded to point at).
    needs: [prepare, publish-homebrew-formula, finalize-github-release-after-uploads]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' && needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-latest, bottle_tag: arm64_sonoma, install_brew: false }
          - { os: macos-15-intel, bottle_tag: sequoia, install_brew: false }
          - { os: ubuntu-latest, bottle_tag: x86_64_linux, install_brew: true }
          - { os: ubuntu-24.04-arm, bottle_tag: arm64_linux, install_brew: true }
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

          submodules: recursive
      - name: Install Homebrew (Linux)
        if: ${{ matrix.install_brew }}
        uses: xberg-io/actions/install-homebrew-linux@v1

      # Mint the app token immediately before the bottle build+upload. GitHub App
      # installation tokens have a hard 1h TTL; a from-source bottle build (esp. the
      # slow macOS runners) minted at job start can expire before the action uploads
      # the bottle to the release, causing a 401. Minting here gives the full hour.
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - name: Build bottles
        uses: xberg-io/actions/homebrew-build-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap: xberg-io/homebrew-tap
          formulas: |
            xberg
          out-dir: ${{ github.workspace }}/bottle-json
          github-repo: xberg-io/xberg
          token: ${{ steps.app-token.outputs.token }}

      - uses: actions/upload-artifact@v7
        with:
          name: homebrew-bottle-json-${{ matrix.bottle_tag }}
          path: ${{ github.workspace }}/bottle-json/*.json
          if-no-files-found: error
          retention-days: 14

  publish-homebrew-bottles:
    name: Merge Homebrew bottle DSL
    needs: [prepare, publish-homebrew-formula, homebrew-bottles]
    if: ${{ needs.prepare.outputs.release_homebrew == 'true' && needs.prepare.outputs.is_tag == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: tap-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io
          repositories: homebrew-tap

      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}

          submodules: recursive
      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: xberg-io/homebrew-tap
          token: ${{ steps.tap-token.outputs.token }}
          path: homebrew-tap
          persist-credentials: true

      - uses: actions/download-artifact@v8
        with:
          path: ${{ github.workspace }}/bottle-json
          pattern: homebrew-bottle-json-*
          merge-multiple: true

      - uses: xberg-io/actions/homebrew-merge-bottles@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          version: ${{ needs.prepare.outputs.version }}
          tap-dir: ${{ github.workspace }}/homebrew-tap
          json-dir: ${{ github.workspace }}/bottle-json
          formulas: |
            xberg
          github-repo: xberg-io/xberg

      - name: Commit and push bottle DSL
        if: ${{ needs.prepare.outputs.dry_run != 'true' }}
        working-directory: homebrew-tap
        env:
          GH_TOKEN: ${{ steps.tap-token.outputs.token }}
        run: |
          git config user.name "xberg-dev-publisher[bot]"
          git config user.email "291994444+xberg-dev-publisher[bot]@users.noreply.github.com"
          if git diff --quiet Formula/; then
            echo "No bottle DSL changes; skipping commit."
            exit 0
          fi
          git add Formula/xberg.rb
          git commit -m "xberg ${{ needs.prepare.outputs.version }}: add bottle DSL"
          git push origin HEAD
        shell: bash

  release-finalize:
    name: Finalize GitHub Release (post-publish validation)
    needs:
      - prepare
      - finalize-github-release-after-uploads
      - update-swift-package-manifest
      - publish-crates
      - publish-pypi
      - publish-rubygems
      - publish-node
      - publish-wasm
      - publish-packagist
      - publish-maven
      - publish-kotlin-android
      - publish-nuget
      - publish-hex
      - trigger-pubdev
      - publish-zig
      - publish-homebrew-formula
      - publish-homebrew-bottles
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.finalize-github-release-after-uploads.result != 'failure' &&
      needs.publish-crates.result != 'failure' &&
      needs.publish-pypi.result != 'failure' &&
      needs.publish-rubygems.result != 'failure' &&
      needs.publish-node.result != 'failure' &&
      needs.publish-wasm.result != 'failure' &&
      needs.publish-packagist.result != 'failure' &&
      needs.publish-maven.result != 'failure' &&
      needs.publish-kotlin-android.result != 'failure' &&
      needs.publish-nuget.result != 'failure' &&
      needs.publish-hex.result != 'failure' &&
      needs.publish-zig.result != 'failure'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: xberg-io/actions/finalize-release@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          is-prerelease: ${{ needs.prepare.outputs.is_prerelease == 'true' && 'true' || 'false' }}
          go-module-path: packages/go
          go-strip-major-version: "false"
          token: ${{ steps.app-token.outputs.token }}

  announce-discord:
    name: Announce release on Discord
    needs:
      - prepare
      - publish-crates
      - publish-pypi
      - publish-rubygems
      - publish-node
      - publish-wasm
      - publish-packagist
      - publish-maven
      - publish-kotlin-android
      - publish-nuget
      - publish-hex
      - trigger-pubdev
      - publish-zig
      - publish-homebrew-formula
      - publish-homebrew-bottles
      - upload-cli-release
      - upload-go-release
      - upload-c-ffi-release
      - upload-elixir-release
      - upload-php-pie-release
      - upload-swift-bundle
      - release-finalize
    if: |
      always() &&
      !cancelled() &&
      needs.prepare.outputs.is_tag == 'true' &&
      needs.prepare.outputs.dry_run != 'true' &&
      needs.prepare.outputs.is_prerelease != 'true' &&
      !contains(needs.*.result, 'failure')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/create-github-app-token@v2
        id: app-token
        with:
          app-id: ${{ secrets.BOT_APP_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          owner: xberg-io

      - uses: xberg-io/actions/announce-release-discord@v1
        with:
          tag: ${{ needs.prepare.outputs.tag }}
          webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
          project-name: xberg
          token: ${{ steps.app-token.outputs.token }}

  cli-proxy:
    name: Publish CLI proxy package (npm)
    needs: [prepare, check-cli]
    if: ${{ needs.prepare.outputs.release_cli == 'true' && needs.prepare.outputs.is_tag == 'true' && (needs.check-cli.outputs.exists != 'true' || needs.prepare.outputs.force_republish == 'true') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.checkout_ref }}
      - uses: xberg-io/actions/setup-node-workspace@v1
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org/"
      - uses: xberg-io/actions/publish-npm@v1
        with:
          package-dir: cli-proxy/npm
          access: public
          provenance: "true"
