      - uses: xberg-io/actions/setup-rust@v1
        with:
          target: ${{ matrix.target }}

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Zig for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        uses: xberg-io/actions/setup-zig@v1

      - name: Install cargo-zigbuild for glibc 2.28 floor
        if: contains(matrix.target, '-linux-gnu')
        shell: bash
        run: command -v cargo-zigbuild || cargo install --locked cargo-zigbuild

      - uses: xberg-io/actions/build-rust-ffi@v1
        with:
          crate-name: xberg-ffi
          target: ${{ matrix.target }}
          glibc-version: ${{ contains(matrix.target, '-linux-gnu') && '2.28' || '' }}

      - name: Stage C FFI distribution
        # Inline: bundle library + header + LICENSE into a single tarball
        env:
          TARGET: ${{ matrix.target }}
          PLATFORM: ${{ matrix.platform }}
        shell: bash
        run: |
          STAGE="xberg-ffi-${PLATFORM}"
