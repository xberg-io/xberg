name: CI Rust

on:
  push:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "crates/**"
      - "packages/dart/rust/**"
      - "packages/swift/rust/**"
      - "packages/elixir/native/**"
      - "packages/r/src/rust/**"
      - "packages/ruby/ext/xberg_rb/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci-rust.yaml"
      - "scripts/ci/rust/**"
  pull_request:
    branches: [main, "feature/**", "fix/**"]
    paths:
      - "crates/**"
      - "packages/dart/rust/**"
      - "packages/swift/rust/**"
      - "packages/elixir/native/**"
      - "packages/r/src/rust/**"
      - "packages/ruby/ext/xberg_rb/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
      - ".github/workflows/ci-rust.yaml"
      - "scripts/ci/rust/**"
  workflow_dispatch:

concurrency:
  group: ci-rust-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  ORT_VERSION: "1.24.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  BUILD_PROFILE: "ci"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    if: github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04-arm
          - os: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jamon8888/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Rust
        uses: jamon8888/actions/setup-rust@v1
        with:
          cache-key-prefix: rust-${{ matrix.os }}
          use-sccache: "true"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Tesseract cache
        uses: ./.github/actions/setup-tesseract-cache
        with:
          label: ${{ matrix.os }}

      - name: Install Task
        uses: jamon8888/actions/install-task@v1

      - name: Run clippy
        # Full workspace, all targets. sccache (wired by setup-rust above via
        # use-sccache) wraps rustc for this step, so generated binding crates
        # compile from cache on warm runs.
        run: cargo clippy --workspace --all-targets -- -D warnings
        shell: bash

      - name: Run tests
        run: task rust:test:ci
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH || '' }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH || '' }}

      - name: Check no-default-features
        run: cargo check --locked -p xberg --no-default-features
        shell: bash

  live-hf:
    name: Live HF preset tests
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Free disk space
        uses: jamon8888/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Rust
        uses: jamon8888/actions/setup-rust@v1
        with:
          cache-key-prefix: rust-live-hf
          use-sccache: "true"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Cache HuggingFace fastembed models
        uses: ./.github/actions/cache-hf-fastembed
        with:
          cache-key-suffix: reranker

      - name: Run live HF reranker tests
        run: |
          cargo test --locked \
            -p xberg \
            --features "reranker,reranker-presets,tokio-runtime" \
            --test reranker_live \
            -- --nocapture
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH || '' }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH || '' }}
          RUST_LOG: warn
