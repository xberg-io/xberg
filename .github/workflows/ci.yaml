name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Install poly
        uses: Goldziher/polylint@v0
      - name: Format check
        run: poly fmt --check .
      - name: Lint
        run: poly lint .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        package:
          - readers/llama-index-readers-xberg
          - node_parsers/llama-index-node-parser-xberg
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7

      - name: Install package dependencies
        run: cd ${{ matrix.package }} && uv sync

      - name: Run tests
        run: cd ${{ matrix.package }} && uv run pytest --cov --cov-report=xml
