name: CI GPU

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - ".github/workflows/ci-gpu.yaml"
      - ".github/actions/**"
      - "Cargo.toml"
      - "Cargo.lock"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - ".github/workflows/ci-gpu.yaml"
      - ".github/actions/**"
      - "Cargo.toml"
      - "Cargo.lock"
  workflow_dispatch:

concurrency:
  group: ci-gpu-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  ORT_VERSION: "1.24.2"

permissions:
  contents: read

jobs:
  gpu-tests:
    name: "GPU Tests (CUDA)"
    runs-on: runner-gpu-t4-spot
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NVIDIA drivers and CUDA toolkit
        run: |
          # Check if GPU is visible
          nvidia-smi || {
            echo "ERROR: nvidia-smi failed — no GPU detected"
            exit 1
          }
          echo "GPU detected:"
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            pkg-config libssl-dev libclang-dev \
            libtesseract-dev libleptonica-dev tesseract-ocr-eng

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gpu-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            gpu-cargo-${{ runner.os }}-

      - name: Download ONNX Runtime (GPU/CUDA)
        run: |
          ORT_DIR="$RUNNER_TEMP/onnxruntime"
          ORT_NAME="onnxruntime-linux-x64-gpu-${ORT_VERSION}"
          ARCHIVE="${ORT_NAME}.tgz"

          if [ ! -d "$ORT_DIR/$ORT_NAME" ]; then
            echo "Downloading ONNX Runtime ${ORT_VERSION} (GPU)"
            curl -fsSL --retry 3 --retry-delay 5 \
              -o "$RUNNER_TEMP/$ARCHIVE" \
              "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/$ARCHIVE"
            mkdir -p "$ORT_DIR"
            tar -xzf "$RUNNER_TEMP/$ARCHIVE" -C "$ORT_DIR"
            rm -f "$RUNNER_TEMP/$ARCHIVE"
          fi

          ORT_LIB="$ORT_DIR/$ORT_NAME/lib"
          echo "ORT_DYLIB_PATH=${ORT_LIB}/libonnxruntime.so" >> "$GITHUB_ENV"
          echo "LD_LIBRARY_PATH=${ORT_LIB}:${LD_LIBRARY_PATH:-}" >> "$GITHUB_ENV"
          echo "ONNX Runtime GPU libraries staged at ${ORT_LIB}"
          ls -la "${ORT_LIB}"/libonnxruntime*.so*

      - name: Setup PaddleOCR models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Run GPU tests (Rust)
        run: |
          cargo test -p kreuzberg \
            --features "paddle-ocr,layout-detection,embeddings,pdf,ocr,ort-dynamic" \
            --test gpu_acceleration \
            -- --ignored --nocapture
        env:
          RUST_LOG: "kreuzberg=debug"
