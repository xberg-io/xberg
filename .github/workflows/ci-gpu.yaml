name: CI GPU

on:
  # Manual dispatch only — this suite is heavy (real model weights, GPU
  # inference across the candle model matrix). Trigger it explicitly.
  workflow_dispatch:

concurrency:
  # Heavy, dispatch-only suite (multi-GB model downloads, real GPU inference).
  # Never cancel an in-flight run; queue re-dispatches instead so an expensive
  # run is not killed mid-flight.
  group: ci-gpu-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  ORT_VERSION: "1.24.2"

permissions:
  contents: read

jobs:
  build:
    name: "Build ORT test binary"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.95"

      - name: Cache Cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gpu-build-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            gpu-build-${{ runner.os }}-

      - name: Build GPU test binary
        uses: xberg-io/actions/build-gpu-test-binary@v1
        with:
          package: xberg
          test-name: gpu_acceleration
          features: "paddle-ocr,layout-detection,embeddings,pdf,ocr,ort-dynamic"
          output-name: gpu-acceleration-test

      - name: Upload test binary
        uses: actions/upload-artifact@v7
        with:
          name: gpu-test-binary
          path: gpu-acceleration-test
          retention-days: 1

  gpu-tests:
    name: "GPU Tests: ONNX/ORT (paddle-ocr, layout, embeddings)"
    needs: build
    runs-on: runner-gpu-l4
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify GPU
        run: |
          nvidia-smi || {
            echo "ERROR: nvidia-smi failed — no GPU detected"
            exit 1
          }
          echo "GPU detected:"
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader

      - name: Download test binary
        uses: actions/download-artifact@v8
        with:
          name: gpu-test-binary

      - name: Download ONNX Runtime (GPU/CUDA)
        uses: xberg-io/actions/setup-onnx-runtime-gpu@v1
        with:
          version: ${{ env.ORT_VERSION }}

      - name: Setup PaddleOCR models
        uses: ./.github/actions/setup-paddle-ocr-models

      - name: Clear stale layout model cache (self-hosted runner persistence)
        run: |
          rm -rf "$HOME/.cache/xberg/layout"
          echo "Cleared layout model cache"

      - name: Run GPU tests
        run: |
          chmod +x gpu-acceleration-test
          ./gpu-acceleration-test --ignored --nocapture
        env:
          RUST_LOG: "xberg=debug,xberg_paddle_ocr=debug"
          TEST_DOCUMENTS_DIR: ${{ github.workspace }}/test_documents

  build-candle:
    # Compile the candle/CUDA test binaries on cheap, abundant ubuntu-latest
    # runners (nvcc compiles CUDA kernels without needing a physical GPU). All
    # five model builds fan out in parallel here, so the scarce GPU runner only
    # ever runs inference — never a ~12-minute CUDA compile.
    name: "Build Candle (${{ matrix.model.name }})"
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      # candle-kernels' build script shells out to nvidia-smi to detect the GPU
      # compute capability, but these compiles run on non-GPU ubuntu-latest
      # runners (no nvidia-smi) → ComputeCapDetectionFailed. Pin it to the L4
      # (sm_89) target used by the runner-gpu-l4 inference jobs so the CUDA
      # kernels build without a physical GPU present.
      CUDA_COMPUTE_CAP: "89"
    strategy:
      fail-fast: false
      matrix:
        model:
          - { name: trocr, feature: candle-trocr }
          - { name: glm-ocr, feature: candle-glm-ocr }
          - { name: hunyuan-ocr, feature: candle-hunyuan-ocr }
          - { name: deepseek-ocr, feature: candle-deepseek-ocr }
          - { name: paddleocr-vl, feature: candle-paddleocr-vl }

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: xberg-io/actions/setup-rust@v1
        with:
          toolchain: "1.95"
          cache-key-prefix: candle-build-${{ matrix.model.name }}
          use-sccache: "true"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup CUDA toolkit (nvcc)
        # candle-cuda compiles CUDA kernels via cudarc at build time, which needs
        # nvcc. ubuntu-latest has no CUDA toolkit; install it from NVIDIA's apt repo.
        run: |
          set -euxo pipefail
          if command -v nvcc >/dev/null 2>&1; then
            echo "nvcc already present: $(command -v nvcc)"
          elif [ -x /usr/local/cuda/bin/nvcc ]; then
            echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
            echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
            echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
          else
            arch="$(uname -m)"
            case "$arch" in
              x86_64) repo_arch="x86_64" ;;
              aarch64) repo_arch="sbsa" ;;
              *) echo "Unsupported arch: $arch"; exit 1 ;;
            esac
            . /etc/os-release
            distro="${ID}${VERSION_ID//./}"
            keyring="cuda-keyring_1.1-1_all.deb"
            curl -fsSL -o "${keyring}" "https://developer.download.nvidia.com/compute/cuda/repos/${distro}/${repo_arch}/${keyring}"
            sudo dpkg -i "${keyring}"
            sudo apt-get update
            sudo apt-get install -y --no-install-recommends cuda-toolkit-12-6
            echo "/usr/local/cuda-12.6/bin" >> "$GITHUB_PATH"
            echo "CUDA_PATH=/usr/local/cuda-12.6" >> "$GITHUB_ENV"
            echo "CUDA_HOME=/usr/local/cuda-12.6" >> "$GITHUB_ENV"
          fi

      - name: Verify nvcc
        run: nvcc --version

      - name: Setup ONNX Runtime
        # candle-glm-ocr pulls layout-detection, which links ONNX Runtime.
        if: matrix.model.name == 'glm-ocr'
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Build candle test binary
        uses: xberg-io/actions/build-gpu-test-binary@v1
        with:
          package: xberg
          test-name: candle_backends
          features: "${{ matrix.model.feature }},candle-cuda"
          output-name: candle-test-${{ matrix.model.name }}

      - name: Upload test binary
        uses: actions/upload-artifact@v7
        with:
          name: candle-test-${{ matrix.model.name }}
          path: candle-test-${{ matrix.model.name }}
          retention-days: 1

  candle-gpu-tests:
    name: "GPU Tests: Candle VLM-OCR (${{ matrix.model.name }})"
    needs: build-candle
    runs-on: runner-gpu-l4
    # Inference + weight download only (the CUDA compile is offloaded to the
    # build-candle fan-out on cheap runners). Generous ceiling: large VLM
    # weights (multi-GB) plus first-token latency on cold model loads.
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        model:
          # Auto-download models (weights fetched from HF Hub on first use).
          - name: trocr
            feature: candle-trocr
            test: candle_trocr_e2e_extraction
            hf_repo: ""
            env_var: ""
            debug_env: XBERG_TROCR_DEBUG
          - name: glm-ocr
            feature: candle-glm-ocr
            test: candle_glm_ocr_e2e_extraction
            hf_repo: ""
            env_var: ""
            debug_env: XBERG_GLM_DEBUG
          # Local-weight models (staged by the download step, cached per model).
          - name: hunyuan-ocr
            feature: candle-hunyuan-ocr
            test: candle_hunyuan_ocr_e2e_extraction
            # tencent/HunyuanOCR was pulled from the HF Hub on 2026-07-06 (401 even
            # authenticated). Stage the weights from Tencent's official ModelScope
            # release instead, verified against the same checked-in sha256 manifest
            # the runtime staging path uses (single source of truth) — an upstream
            # change fails loudly instead of silently altering what CI tests.
            hf_repo: ""
            ms_repo: Tencent-Hunyuan/HunyuanOCR
            manifest: crates/xberg/src/candle_ocr/hunyuan-ocr.sha256
            env_var: XBERG_HUNYUAN_OCR_MODEL_PATH
            debug_env: XBERG_HUNYUAN_DEBUG
          - name: deepseek-ocr
            feature: candle-deepseek-ocr
            test: candle_deepseek_ocr_e2e_extraction
            hf_repo: deepseek-ai/DeepSeek-OCR
            env_var: XBERG_DEEPSEEK_OCR_MODEL_PATH
            debug_env: XBERG_DEEPSEEK_DEBUG
          - name: paddleocr-vl
            feature: candle-paddleocr-vl
            test: candle_paddleocr_vl_e2e_extraction
            hf_repo: PaddlePaddle/PaddleOCR-VL
            env_var: XBERG_PADDLEOCR_VL_MODEL_PATH
            debug_env: XBERG_PADDLEOCR_VL_DEBUG

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Verify GPU
        run: |
          nvidia-smi || {
            echo "ERROR: nvidia-smi failed — no GPU detected"
            exit 1
          }
          echo "GPU detected:"
          nvidia-smi --query-gpu=name,driver_version,memory.total --format=csv,noheader

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Setup CUDA runtime libraries
        # The prebuilt candle-cuda test binary (compiled in build-candle) links
        # libcudart at runtime. The L4 runner ships the driver (nvidia-smi) but no
        # CUDA runtime libs, so install the toolkit package which provides them.
        # No Rust toolchain or nvcc compile happens here — inference only.
        run: |
          set -euxo pipefail
          if command -v nvcc >/dev/null 2>&1; then
            echo "nvcc already present: $(command -v nvcc)"
          elif [ -x /usr/local/cuda/bin/nvcc ]; then
            echo "/usr/local/cuda/bin" >> "$GITHUB_PATH"
            echo "CUDA_PATH=/usr/local/cuda" >> "$GITHUB_ENV"
            echo "CUDA_HOME=/usr/local/cuda" >> "$GITHUB_ENV"
          else
            arch="$(uname -m)"
            case "$arch" in
              x86_64) repo_arch="x86_64" ;;
              aarch64) repo_arch="sbsa" ;;
              *) echo "Unsupported arch: $arch"; exit 1 ;;
            esac
            . /etc/os-release
            distro="${ID}${VERSION_ID//./}"
            keyring="cuda-keyring_1.1-1_all.deb"
            curl -fsSL -o "${keyring}" "https://developer.download.nvidia.com/compute/cuda/repos/${distro}/${repo_arch}/${keyring}"
            sudo dpkg -i "${keyring}"
            sudo apt-get update
            # Toolkit only (nvcc + headers); the driver is already on the runner.
            sudo apt-get install -y --no-install-recommends cuda-toolkit-12-6
            echo "/usr/local/cuda-12.6/bin" >> "$GITHUB_PATH"
            echo "CUDA_PATH=/usr/local/cuda-12.6" >> "$GITHUB_ENV"
            echo "CUDA_HOME=/usr/local/cuda-12.6" >> "$GITHUB_ENV"
          fi

      - name: Verify nvcc
        run: nvcc --version

      - name: Setup ONNX Runtime
        # candle-glm-ocr pulls layout-detection, which links ONNX Runtime.
        if: matrix.model.name == 'glm-ocr'
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Restore cached model weights
        if: matrix.model.hf_repo != '' || matrix.model.ms_repo != ''
        id: model-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ github.workspace }}/models/${{ matrix.model.name }}
          # Manifest-verified entries key on the manifest content, so changing
          # the expected bytes can never be satisfied by a stale snapshot.
          key: hf-weights-${{ matrix.model.name }}-${{ matrix.model.manifest != '' && hashFiles(matrix.model.manifest) || 'v1' }}

      - name: Download model weights (Hugging Face)
        id: download-hf
        if: matrix.model.hf_repo != '' && steps.model-cache.outputs.cache-hit != 'true'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          set -euo pipefail
          # The runner's system python3 has no pip and is externally-managed
          # (PEP 668), so install huggingface_hub into an isolated venv.
          # huggingface_hub 1.x dropped the `huggingface-cli` entrypoint (it now
          # exits 1) and the `cli`/`hf_transfer` extras; the CLI is now `hf`.
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends python3-venv
          python3 -m venv "$RUNNER_TEMP/hfvenv"
          "$RUNNER_TEMP/hfvenv/bin/pip" install --quiet --upgrade "huggingface_hub"
          "$RUNNER_TEMP/hfvenv/bin/hf" download \
            "${{ matrix.model.hf_repo }}" \
            --local-dir "${{ github.workspace }}/models/${{ matrix.model.name }}"

      - name: Download model weights (ModelScope, checksum-verified)
        id: download-ms
        if: matrix.model.ms_repo != '' && steps.model-cache.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          # Stage each file named in the manifest from the publisher's official
          # ModelScope repo, then verify every byte against the checked-in
          # sha256 manifest. Trust attaches to the hashes, not the host: a
          # changed or tampered upstream file fails the job instead of silently
          # altering what CI tests.
          dest="${{ github.workspace }}/models/${{ matrix.model.name }}"
          mkdir -p "$dest"
          while read -r _hash file; do
            # Skip blank lines and '#' comments in the sha256sum-format manifest.
            case "${_hash}" in ''|'#'*) continue ;; esac
            [ -n "$file" ] || continue
            echo "downloading $file"
            curl -fSL --retry 5 --retry-delay 10 --retry-all-errors \
              "https://modelscope.cn/models/${{ matrix.model.ms_repo }}/resolve/master/$file" \
              -o "$dest/$file"
          done < "${{ matrix.model.manifest }}"
          # sha256sum -c ignores '#' comment lines; --strict fails on malformed ones.
          (cd "$dest" && sha256sum --check --strict "${{ github.workspace }}/${{ matrix.model.manifest }}")

      - name: Download candle test binary
        uses: actions/download-artifact@v8
        with:
          name: candle-test-${{ matrix.model.name }}

      - name: Run ${{ matrix.model.name }} GPU inference
        # XBERG_REQUIRE_MODELS=1 turns a missing model/weights into a hard failure
        # instead of a silent skip, so a misconfigured matrix entry cannot pass green.
        env:
          XBERG_REQUIRE_MODELS: "1"
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          RUST_LOG: "xberg=debug,xberg_candle_ocr=debug"
          # Per-model debug flags for tensor stats and empty-output detection.
          # When set to "1", logs per-stage tensor shapes, NaN/Inf counts, min/max/mean stats.
          XBERG_TROCR_DEBUG: "1"
          XBERG_GLM_DEBUG: "1"
          XBERG_HUNYUAN_DEBUG: "1"
          XBERG_DEEPSEEK_DEBUG: "1"
          XBERG_PADDLEOCR_VL_DEBUG: "1"
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.model.env_var }}" ]; then
            export ${{ matrix.model.env_var }}="${{ github.workspace }}/models/${{ matrix.model.name }}"
          fi
          # Run the binary compiled in build-candle (no recompile on the GPU runner).
          chmod +x "candle-test-${{ matrix.model.name }}"
          "./candle-test-${{ matrix.model.name }}" "${{ matrix.model.test }}" --ignored --nocapture

      - name: Save model weights cache
        # actions/cache's built-in post-save is skipped when the job fails, so a
        # red run re-downloads multi-GB weights on every iteration. Save
        # explicitly whenever a download step succeeded — even if inference
        # failed — but never after a failed download, so a partial directory
        # cannot poison the cache.
        if: >-
          always() && steps.model-cache.outputs.cache-hit != 'true' &&
          (steps.download-hf.outcome == 'success' || steps.download-ms.outcome == 'success')
        uses: actions/cache/save@v5
        with:
          path: ${{ github.workspace }}/models/${{ matrix.model.name }}
          key: hf-weights-${{ matrix.model.name }}-${{ matrix.model.manifest != '' && hashFiles(matrix.model.manifest) || 'v1' }}
