version: 2

# Dependabot only manages the hand-authored root manifests. Alef-generated trees
# by `alef build`, so their dependency versions are maintained upstream in the alef
# repo (src/core/template_versions.rs + Renovate), not here. Pointing Dependabot at

multi-ecosystem-groups:
  dependencies:
    schedule:
      interval: "weekly"

updates:
  - package-ecosystem: "cargo"
    directories:
      - "/"
    ignore:
      - dependency-name: "xberg"
      - dependency-name: "xberg-ffi"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"

  - package-ecosystem: "pip"
    directories:
      - "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"

  - package-ecosystem: "npm"
    directories:
      - "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"

  - package-ecosystem: "composer"
    directories:
      - "/"
    patterns: ["*"]
    multi-ecosystem-group: "dependencies"
