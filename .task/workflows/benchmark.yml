version: "3"

vars:
  FIXTURES_DIR: "tools/benchmark-harness/fixtures"
  HARNESS_PATH: "./target/release/benchmark-harness"
  BENCHMARK_RESULTS_DIR: "benchmark-results"
  FLAMEGRAPH_DIR: "flamegraphs"

tasks:
  validate:scripts:
    desc: "Validate local benchmark shell helpers"
    cmds:
      - tools/benchmark-harness/tests/test_bench_local_frameworks.sh
      - tools/benchmark-harness/scripts/bench_local_profiles_test.sh

  run:
    desc: "Run benchmark harness with profiling support"
    requires:
      vars:
        - FRAMEWORK
        - MODE
    vars:
      ITERATIONS: '{{ .ITERATIONS | default "1" }}'
      TIMEOUT: '{{ .TIMEOUT | default "900" }}'
      MAX_CONCURRENT: '{{ if eq .MODE "single-file" }}1{{ else }}4{{ end }}'
    env:
      RUST_BACKTRACE: short
    cmds:
      - mkdir -p "{{.BENCHMARK_RESULTS_DIR}}/{{.FRAMEWORK}}-{{.MODE}}"
      - |
        {{.HARNESS_PATH}} \
          run \
          --fixtures "{{.FIXTURES_DIR}}" \
          --frameworks "{{.FRAMEWORK}}" \
          --output "{{.BENCHMARK_RESULTS_DIR}}/{{.FRAMEWORK}}-{{.MODE}}" \
          --iterations "{{.ITERATIONS}}" \
          --timeout "{{.TIMEOUT}}" \
          --mode "{{.MODE}}" \
          --max-concurrent "{{.MAX_CONCURRENT}}"

  profile:
    desc: "Run pipeline-benchmark with flamegraph profiling. Builds with --profile profiling so Rust symbols are resolved."
    vars:
      PIPELINE: '{{ .PIPELINE | default "baseline" }}'
      DOC_FILTER: '{{ .DOC_FILTER | default "pdf" }}'
      SHA:
        sh: git rev-parse --short HEAD
    env:
      RUST_BACKTRACE: short
    cmds:
      - cargo build --locked --profile profiling -p xberg-cli --features all
      - cargo build --locked --profile profiling -p benchmark-harness --features profiling
      - mkdir -p "{{.FLAMEGRAPH_DIR}}/{{.SHA}}"
      - |
        target/profiling/benchmark-harness pipeline-benchmark \
          --fixtures "{{.FIXTURES_DIR}}" \
          --paths "{{.PIPELINE}}" \
          --doc "{{.DOC_FILTER}}" \
          --profile-dir "{{.FLAMEGRAPH_DIR}}/{{.SHA}}"
      - 'echo "Flamegraph SVGs in {{.FLAMEGRAPH_DIR}}/{{.SHA}}/. Run: python3 tools/perf/extract_top_symbols.py {{.FLAMEGRAPH_DIR}}/{{.SHA}}/{{.PIPELINE}}.svg"'

  compare:
    desc: "Framework comparison with quality guardrails (baseline vs layout)"
    cmds:
      - cargo run --locked -p benchmark-harness -- compare --fixtures "{{.FIXTURES_DIR}}" --guardrails

  local:
    desc: "Local head-to-head PDF benchmark: xberg vs liteparse (+docling if installed) with per-document gap report"
    cmds:
      - bash tools/benchmark-harness/scripts/bench_local.sh

  local:smoke:
    desc: "Quick smoke of the local head-to-head (small fixture shard) to validate the pipeline end-to-end"
    env:
      SHARD: "1/60"
    cmds:
      - bash tools/benchmark-harness/scripts/bench_local.sh

  pipeline:quick:
    desc: "Pipeline benchmark — native paths only (P1+P2)"
    cmds:
      - cargo run --locked -p benchmark-harness -- pipeline-benchmark --fixtures "{{.FIXTURES_DIR}}" --paths baseline,layout

  pipeline:all:
    desc: "Pipeline benchmark — all 6 extraction paths"
    cmds:
      - cargo run --locked -p benchmark-harness -- pipeline-benchmark --fixtures "{{.FIXTURES_DIR}}"

  survey:
    desc: "Corpus-wide extraction stats for all PDFs"
    cmds:
      - cargo run --locked -p benchmark-harness -- survey --fixtures "{{.FIXTURES_DIR}}" --types pdf

  models:
    desc: "Layout model A/B comparison (fast vs accurate)"
    cmds:
      - cargo run --locked -p benchmark-harness -- model-benchmark --fixtures "{{.FIXTURES_DIR}}"

  split:
    desc: "Multi-document split-boundary benchmark (Auto accuracy, reconstruction, single-parse timing)"
    vars:
      SPLIT_FIXTURES_DIR: '{{ .SPLIT_FIXTURES_DIR | default "tools/benchmark-harness/fixtures/split" }}'
    cmds:
      - cargo run --locked -p benchmark-harness -- split-benchmark --fixtures "{{.SPLIT_FIXTURES_DIR}}"

  split:sweep:
    desc: "Split-boundary benchmark with the MultidocThresholds sweep grid"
    vars:
      SPLIT_FIXTURES_DIR: '{{ .SPLIT_FIXTURES_DIR | default "tools/benchmark-harness/fixtures/split" }}'
    cmds:
      - cargo run --locked -p benchmark-harness -- split-benchmark --fixtures "{{.SPLIT_FIXTURES_DIR}}" --sweep

  split:gen-fixtures:
    desc: "Regenerate synthesized multi-document split fixtures from the test_documents submodule"
    cmds:
      - bash tools/benchmark-harness/scripts/gen_split_fixtures.sh

  generate-gt:
    desc: "Generate markdown ground truth from PDFs using Gemini"
    cmds:
      - uv run --no-sync tools/benchmark-harness/scripts/generate_markdown_gt.py

  download:omnidocbench:
    desc: "Download OmniDocBench dataset from HuggingFace (~1.3 GB)"
    cmds:
      - bash tools/benchmark-harness/scripts/download_omnidocbench.sh
    status:
      - test -f tools/benchmark-harness/datasets/omnidocbench/OmniDocBench.json

  import:omnidocbench:
    desc: "Import OmniDocBench into benchmark fixtures (run download:omnidocbench first)"
    deps: ["download:omnidocbench"]
    cmds:
      - python3 tools/benchmark-harness/scripts/import_omnidocbench.py tools/benchmark-harness/datasets/omnidocbench .
    status:
      - test -f tools/benchmark-harness/fixtures/pdf/omnidoc_*.json

  clean-results:
    desc: "Clean up benchmark results and profiles"
    cmds:
      - rm -rf "{{.BENCHMARK_RESULTS_DIR}}"
      - rm -rf "{{.FLAMEGRAPH_DIR}}"

  candle-glm-ocr:
    desc: "Build and run benchmark harness with candle-glm-ocr backend"
    cmds:
      - cargo build --locked -p benchmark-harness --features glm-ocr-bench --release
      - cargo run --locked -p benchmark-harness --features glm-ocr-bench --release -- pipeline-benchmark --fixtures "{{.FIXTURES_DIR}}"

  candle-deepseek-ocr:
    desc: "Build and run benchmark harness with candle-deepseek-ocr backend"
    cmds:
      - cargo build --locked -p benchmark-harness --features candle-deepseek-ocr-bench --release
      - cargo run --locked -p benchmark-harness --features candle-deepseek-ocr-bench --release -- pipeline-benchmark --fixtures "{{.FIXTURES_DIR}}"

  candle-paddleocr-vl-15:
    desc: "Build and run benchmark harness with candle-paddleocr-vl-15 backend"
    cmds:
      - cargo build --locked -p benchmark-harness --features candle-paddleocr-vl-15-bench --release
      - cargo run --locked -p benchmark-harness --features candle-paddleocr-vl-15-bench --release -- pipeline-benchmark --fixtures "{{.FIXTURES_DIR}}"

  corpus:cache:publish:
    desc: "Package the license-restricted reference corpus (.corpus-cache) and upload it to the private GCS bucket, keyed by the test_documents SHA. Run after a corpus rebuild + build_corpus.py --stage materialize."
    cmds:
      - scripts/benchmarks/publish-corpus-cache.sh

  corpus:cache:restore:
    desc: "Restore the reference corpus (.corpus-cache) from the private GCS bucket for the current test_documents SHA"
    cmds:
      - scripts/benchmarks/restore-corpus-cache.sh
