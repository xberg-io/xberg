version: "3"
internal: true

vars:
  PYTHON_PKG: "packages/python"

tasks:
  update:
    desc: "Update Python dependencies within major versions (uv sync --upgrade-package)"
    silent: false
    cmds:
      - cmd: |
          cd {{.PYTHON_PKG}} && uv sync --no-install-project --no-install-workspace --all-extras --upgrade-package "*" --prerelease=allow
        ignore_error: false

  upgrade:
    desc: "Upgrade Python dependencies to latest including breaking changes (uv sync --upgrade)"
    silent: false
    cmds:
      - cmd: |
          cd {{.PYTHON_PKG}} && uv sync --no-install-project --no-install-workspace --all-extras --upgrade --prerelease=allow
        ignore_error: false
