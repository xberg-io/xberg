version: "3"
internal: true

tasks:
  update:
    desc: "Update Node.js dependencies within major versions (pnpm up)"
    silent: false
    cmds:
      - cmd: |
          pnpm up
        ignore_error: false

  upgrade:
    desc: "Upgrade Node.js dependencies to latest including breaking changes (pnpm up --latest)"
    silent: false
    cmds:
      - cmd: |
          pnpm up --latest
        ignore_error: false
