version: "3"

tasks:
  mock-server:build:
    desc: Build mock-server binaries for standalone test_app tasks
    internal: true
    cmds:
      - bash "{{.ROOT_DIR}}/scripts/e2e/build-mock-server.sh" all

  smoke:
    desc: Run all test_app smoke tests
    cmds:
      - task: smoke:python
      - task: smoke:node
      - task: smoke:ruby
      - task: smoke:go
      - task: smoke:java
      - task: smoke:elixir
      - task: smoke:csharp
      - task: smoke:php
      - task: smoke:rust
      - task: smoke:wasm
      - task: smoke:dart
      - task: smoke:zig
      - task: smoke:swift
      - task: smoke:kotlin_android

  smoke:python:
    desc: Run Python test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/python"
    deps: [mock-server:build]
    cmds:
      - uv sync
      - uv run --no-sync python -m pytest tests/test_smoke.py -v

  smoke:node:
    desc: Run Node.js test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/node"
    deps: [mock-server:build]
    cmds:
      - pnpm install
      - pnpm exec vitest run tests/smoke.test.ts

  smoke:ruby:
    desc: Run Ruby test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/ruby"
    cmds:
      - export PATH="$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH" && ruby -S bundle install
      - export PATH="$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH" && ruby -S bundle exec rspec spec/smoke_spec.rb

  smoke:go:
    desc: Run Go test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/go"
    env:
      GOWORK: "off"
    cmds:
      - go mod download
      - go test -v -run '^Test_Smoke' ./...

  smoke:java:
    desc: Run Java test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/java"
    deps: [mock-server:build]
    cmds:
      - mvn test -Dtest=SmokeTest

  smoke:elixir:
    desc: Run Elixir test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/elixir"
    cmds:
      - mix deps.get
      - mix test test/smoke_test.exs

  smoke:csharp:
    desc: Run C# test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/csharp"
    deps: [mock-server:build]
    cmds:
      - dotnet restore
      - dotnet test --filter "FullyQualifiedName~SmokeTests"

  smoke:php:
    desc: Run PHP test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/php"
    deps: [mock-server:build]
    cmds:
      - composer install
      - vendor/bin/phpunit

  smoke:rust:
    desc: Run Rust test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/rust"
    cmds:
      - cargo test --locked --release --test smoke_test

  smoke:wasm:
    desc: Run WASM test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/wasm"
    cmds:
      - pnpm install
      - pnpm exec vitest run tests/smoke.test.ts

  smoke:dart:
    desc: Run Dart test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/dart"
    cmds:
      - dart pub get
      # Pub.dev cannot ship the >100MB per-platform native set; the published package exposes a
      # download_libs executable that fetches the native from the GitHub release. Without it,
      # RustLib.init() finds no native and setUpAll fails. ~keep
      - dart run xberg:download_libs
      - dart test test/smoke_test.dart

  smoke:zig:
    desc: Run Zig test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/zig"
    cmds:
      - zig build test --test-filter "smoke"

  smoke:swift:
    desc: Run Swift test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/swift_e2e"
    cmds:
      - swift test --filter SmokeTests

  smoke:kotlin_android:
    desc: Run Kotlin Android test_app smoke test
    dir: "{{.ROOT_DIR}}/test_apps/kotlin_android"
    deps: [mock-server:build]
    cmds:
      - ./gradlew testDebugUnitTest --tests "*SmokeTest"

  comprehensive:
    desc: Run all test_app comprehensive tests
    cmds:
      - task: comprehensive:python
      - task: comprehensive:node
      - task: comprehensive:ruby
      - task: comprehensive:go

  comprehensive:python:
    desc: Run Python test_app comprehensive tests
    dir: "{{.ROOT_DIR}}/test_apps/python"
    deps: [mock-server:build]
    cmds:
      - uv sync
      - uv run --no-sync python -m pytest tests/ -v

  comprehensive:node:
    desc: Run Node.js test_app comprehensive tests
    dir: "{{.ROOT_DIR}}/test_apps/node"
    deps: [mock-server:build]
    cmds:
      - pnpm install
      - pnpm exec vitest run

  comprehensive:ruby:
    desc: Run Ruby test_app comprehensive tests
    dir: "{{.ROOT_DIR}}/test_apps/ruby"
    cmds:
      - export PATH="$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH" && ruby -S bundle install
      - export PATH="$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH" && ruby -S bundle exec rspec

  comprehensive:go:
    desc: Run Go test_app comprehensive tests
    dir: "{{.ROOT_DIR}}/test_apps/go"
    cmds:
      - go test -v ./...
