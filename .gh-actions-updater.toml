[scan]
include = [
  ".github/workflows/**/*.yml",
  ".github/workflows/**/*.yaml",
  ".github/actions/**/action.yml",
  ".github/actions/**/action.yaml",
  "action.yml",
  "action.yaml",
]
exclude = []
recursive = false

[cache]
enabled = true
ttl = "6h"

[update]
mode = "latest-tag"
exclude = ["erlef/setup-beam", "rubygems/configure-rubygems-credentials"]
include_prereleases = false
preserve_major = true
missing_ref = "warn"

[output]
format = "human"
color = "auto"

[github]
api_url = "https://api.github.com"

[performance]
