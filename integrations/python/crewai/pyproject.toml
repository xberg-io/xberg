[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "crewai-xberg"
version = "1.0.0rc34"
description = "Xberg document extraction tools for CrewAI agents — text, metadata, and batch extraction across 97 file formats"
readme = "README.md"
keywords = ["agents", "ai", "crewai", "document-extraction", "llm", "ocr", "pdf", "rag", "text-extraction", "xberg"]
license = "MIT"
maintainers = [{ name = "Xberg", email = "contact@xberg.io" }]
authors = [{ name = "Xberg", email = "contact@xberg.io" }]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Text Processing :: General",
  "Typing :: Typed",
]
dependencies = ["crewai>=1.15,<2", "xberg>=1.0.0rc34,<2"]
urls.Changelog = "https://github.com/xberg-io/xberg/blob/main/integrations/python/crewai/CHANGELOG.md"
urls.Homepage = "https://github.com/xberg-io/xberg/tree/main/integrations/python/crewai"
urls.Repository = "https://github.com/xberg-io/xberg/tree/main/integrations/python/crewai"

[dependency-groups]
dev = ["mypy>=1.19", "pre-commit>=4", "pytest>=9", "pytest-asyncio>=1", "pytest-cov>=6", "ruff>=0.14"]

[tool.hatch]
build.targets.sdist.include = ["src/crewai_xberg", "CHANGELOG.md", "LICENSE", "README.md", "pyproject.toml"]
build.targets.wheel.packages = ["src/crewai_xberg"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest]
ini_options.testpaths = ["tests"]
ini_options.asyncio_mode = "auto"

[tool.coverage]
run.source = ["crewai_xberg"]
report.fail_under = 80

[tool.uv]
# xberg ships as a pre-release (1.0.0rcN) until the 1.0.0 GA; persist prerelease
# resolution so the lockfile is authoritative and `uv run` does not re-resolve. ~keep
prerelease = "allow"
