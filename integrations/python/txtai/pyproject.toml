[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "txtai-xberg"
version = "1.0.0rc33"
description = "Xberg document extraction and chunking pipeline for txtai embeddings"
readme = "README.md"
keywords = [
  "chunking",
  "document-extraction",
  "embeddings",
  "ocr",
  "pdf",
  "rag",
  "semantic-search",
  "text-extraction",
  "txtai",
  "vector-search",
  "xberg",
]
license = "MIT"
maintainers = [{ name = "Xberg", email = "contact@xberg.io" }]
authors = [{ name = "Xberg", email = "contact@xberg.io" }]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Text Processing :: General",
  "Topic :: Text Processing :: Indexing",
  "Typing :: Typed",
]
dependencies = ["xberg>=1.0.0rc33,<2"]
optional-dependencies.txtai = ["txtai>=9.7,<10"]
urls.Changelog = "https://github.com/xberg-io/xberg/blob/main/integrations/python/txtai/CHANGELOG.md"
urls.Documentation = "https://docs.xberg.io"
urls.Homepage = "https://github.com/xberg-io/xberg/tree/main/integrations/python/txtai"
urls.Issues = "https://github.com/xberg-io/xberg/issues"
urls.Repository = "https://github.com/xberg-io/xberg/tree/main/integrations/python/txtai"

[dependency-groups]
dev = ["mypy>=1.20.1", "pre-commit>=4.5.1", "pytest>=9", "pytest-cov>=7.1", "ruff>=0.15.10"]

[tool.hatch]
build.targets.sdist.include = ["src/txtai_xberg", "CHANGELOG.md", "LICENSE", "README.md", "pyproject.toml"]
build.targets.wheel.packages = ["src/txtai_xberg"]

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest]
ini_options.testpaths = ["tests"]
ini_options.markers = ["slow: marks tests that hit the OCR path or other slow Xberg backends"]

[tool.coverage]
run.source = ["txtai_xberg"]
report.fail_under = 80

[tool.uv]
# xberg ships as a pre-release (1.0.0rcN) until the 1.0.0 GA; persist prerelease
# resolution so the lockfile is authoritative and `uv run` does not re-resolve. ~keep
prerelease = "allow"
