[project]
name = "llama-index-xberg"
version = "0.0.0"
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]

[dependency-groups]
dev = [
  "xberg>=1.0.0rc33,<1.1",
  "llama-index-core>=0.14.23,<0.15",
  "mypy>=2.1.0",
  "pre-commit>=4.6",
  "pydantic>=2.13.4",
  "pytest>=9.1.1",
  "pytest-asyncio>=1.4.0",
  "pytest-cov>=7.1",
  "ruff>=0.15.20",
]

[tool.mypy]
python_version = "3.10"
strict = true
explicit_package_bases = true
mypy_path = "readers/llama-index-readers-xberg:node_parsers/llama-index-node-parser-xberg"
overrides = [{ module = ["xberg", "xberg.*"], follow_imports = "skip" }]

[tool.uv]
# xberg ships as a pre-release (1.0.0rcN) until the 1.0.0 GA; persist prerelease
# resolution so the lockfile is authoritative and `uv run` does not re-resolve. ~keep
prerelease = "allow"
