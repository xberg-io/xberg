[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/langchain_xberg"]

[tool.hatch.build.targets.sdist]
include = ["src/langchain_xberg", "CHANGELOG.md", "LICENSE", "README.md", "pyproject.toml"]

[project]
name = "langchain-xberg"
version = "1.0.0rc34"
description = "LangChain document loader for Xberg — extract 88+ file formats into Documents with async, batching, chunking, and rich metadata"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
authors = [{ name = "Xberg", email = "contact@xberg.io" }]
maintainers = [{ name = "Xberg", email = "contact@xberg.io" }]
keywords = [
  "xberg",
  "langchain",
  "document-loader",
  "text-extraction",
  "pdf",
  "ocr",
  "chunking",
  "rag",
  "llm",
  "ai",
  "nlp",
  "document-intelligence",
]
classifiers = [
  "Development Status :: 5 - Production/Stable",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Text Processing :: General",
  "Topic :: Text Processing :: Indexing",
  "Typing :: Typed",
]
dependencies = ["langchain-core>=1.0,<2.0", "xberg>=1.0.0rc34,<2"]

[dependency-groups]
dev = ["pytest>=9.0", "pytest-asyncio>=0.24", "pytest-cov>=6.0", "ruff>=0.14", "mypy>=1.19", "pre-commit>=4.0"]

[project.urls]
Homepage = "https://github.com/xberg-io/xberg/tree/main/integrations/python/langchain"
Documentation = "https://docs.xberg.io/integrations/langchain/"
Repository = "https://github.com/xberg-io/xberg/tree/main/integrations/python/langchain"
Issues = "https://github.com/xberg-io/xberg/issues"

[tool.mypy]
python_version = "3.10"
strict = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = ["integration: real file extraction tests (no mocks, slower)"]

[tool.coverage.run]
source = ["langchain_xberg"]

[tool.coverage.report]
fail_under = 80

[tool.uv]
# xberg ships as a pre-release (1.0.0rcN) until the 1.0.0 GA; persist prerelease
# resolution so the lockfile is authoritative and `uv run` does not re-resolve. ~keep
prerelease = "allow"
