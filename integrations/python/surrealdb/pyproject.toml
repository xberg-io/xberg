[build-system]
build-backend = "hatchling.build"
requires = ["hatchling"]

[project]
name = "surrealdb-xberg"
version = "1.0.0rc34"
description = """\
  Xberg-to-SurrealDB connector for document ingestion pipelines — schema management, content deduplication, \
  chunk storage, and index configuration\
  """
readme = "README.md"
keywords = [
  "ai",
  "document-extraction",
  "document-intelligence",
  "embeddings",
  "graph-database",
  "hybrid-search",
  "xberg",
  "llm",
  "nlp",
  "ocr",
  "pdf",
  "rag",
  "surrealdb",
  "text-extraction",
  "vector-search",
]
license = "MIT"
authors = [{ name = "Xberg", email = "contact@xberg.io" }]
maintainers = [{ name = "Xberg", email = "contact@xberg.io" }]
requires-python = ">=3.10"
classifiers = [
  "Development Status :: 4 - Beta",
  "Intended Audience :: Developers",
  "Intended Audience :: Science/Research",
  "License :: OSI Approved :: MIT License",
  "Operating System :: OS Independent",
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Topic :: Database",
  "Topic :: Scientific/Engineering :: Artificial Intelligence",
  "Topic :: Text Processing :: General",
  "Topic :: Text Processing :: Indexing",
  "Typing :: Typed",
]
dependencies = [
  "anyio>=4,<5",
  "xberg>=1.0.0rc34,<2",
  "surrealdb>=2.0.0,<3",
  "typing-extensions>=4; python_version<'3.11'",
]
urls.Documentation = "https://docs.xberg.io"
urls.Homepage = "https://github.com/xberg-io/xberg/tree/main/integrations/python/surrealdb"
urls.Issues = "https://github.com/xberg-io/xberg/issues"
urls.Repository = "https://github.com/xberg-io/xberg/tree/main/integrations/python/surrealdb"
urls.SurrealDB = "https://surrealdb.com"

[dependency-groups]
dev = ["mypy>=1.19", "pre-commit>=4", "pytest>=9", "pytest-asyncio>=0.24", "pytest-cov>=6", "ruff>=0.14"]

[tool.hatch]
build.targets.sdist.include = ["src/surrealdb_xberg", "CHANGELOG.md", "LICENSE", "README.md", "pyproject.toml"]
build.targets.wheel.packages = ["src/surrealdb_xberg"]

[tool.mypy]
python_version = "3.10"
strict = true
exclude = ["examples/"]

[tool.pytest]
ini_options.testpaths = ["tests"]
ini_options.asyncio_mode = "auto"
ini_options.markers = ["integration: tests requiring a live SurrealDB instance (no mocks, slower)"]

[tool.coverage]
run.source = ["surrealdb_xberg"]
report.fail_under = 80

[tool.uv]
# xberg ships as a pre-release (1.0.0rcN) until the 1.0.0 GA; persist prerelease
# resolution so the lockfile is authoritative and `uv run` does not re-resolve. ~keep
prerelease = "allow"
