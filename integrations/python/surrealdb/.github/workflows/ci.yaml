name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    uses: xberg-io/actions/.github/workflows/reusable-validate.yml@v1
    with:
      setup-python: true

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Run unit tests
        run: uv run pytest --cov --cov-report=xml --ignore=tests/test_integration.py

  integration:
    runs-on: ubuntu-latest
    env:
      ORT_VERSION: "1.23.0"
      SURREALDB_URL: "ws://localhost:8000"
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7

      - name: Start SurrealDB
        run: |
          docker run --rm -d -p 8000:8000 surrealdb/surrealdb:latest start --user root --pass root
          for _ in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              break
            fi
            sleep 1
          done

      - name: Install ONNX Runtime
        run: |
          curl -sL -o /tmp/ort.tgz "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz"
          tar xzf /tmp/ort.tgz
          sudo cp "onnxruntime-linux-x64-${ORT_VERSION}/lib/libonnxruntime.so.${ORT_VERSION}" /usr/local/lib/libonnxruntime.so
          sudo ldconfig

      - name: Install dependencies
        run: uv sync

      - name: Run integration tests
        run: uv run pytest tests/test_integration.py -v -m integration
