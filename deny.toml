

[graph]
targets = []
all-features = false
no-default-features = false

[output]
feature-depth = 1

[advisories]
ignore = [
    "RUSTSEC-2024-0436",
    "RUSTSEC-2025-0119",
    "RUSTSEC-2020-0144",
    "RUSTSEC-2026-0115",
    "RUSTSEC-2026-0116",
    "RUSTSEC-2026-0117",
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
    "RUSTSEC-2026-0192",
    "RUSTSEC-2026-0206",
]

[licenses]
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "MIT-0",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unlicense",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "bzip2-1.0.6",
    "BSL-1.0",
    "OpenSSL",
    "NCSA",
    "MIT-0",
]
confidence-threshold = 0.8

exceptions = [
    { allow = ["MPL-2.0"], crate = "cbindgen" },
    { allow = ["MPL-2.0"], crate = "option-ext" },
    # colored is pulled transitively by hf-xet (hf-hub 1.0's Xet transfer backend).
    # MPL-2.0 is file-level weak copyleft; merely linking it imposes no obligation
    # on xberg. Unavoidable while on hf-hub 1.0. ~keep
    { allow = ["MPL-2.0"], crate = "colored" },
    { allow = ["LGPL-2.1-or-later"], crate = "r-efi" },
    # dyn-eq is pulled by the tract-onnx pure-Rust inference engine (issue #1275).
    # MPL-2.0 is file-level weak copyleft; merely linking it imposes no obligation on
    # xberg. Unavoidable while depending on tract.
    { allow = ["MPL-2.0"], crate = "dyn-eq" },
    { allow = ["MPL-2.0"], crate = "symphonia" },
    { allow = ["MPL-2.0"], crate = "symphonia-core" },
    { allow = ["MPL-2.0"], crate = "symphonia-common" },
    { allow = ["MPL-2.0"], crate = "symphonia-bundle-mp3" },
    { allow = ["MPL-2.0"], crate = "symphonia-format-isomp4" },
    { allow = ["MPL-2.0"], crate = "symphonia-format-mkv" },
    { allow = ["MPL-2.0"], crate = "symphonia-codec-aac" },
    { allow = ["MPL-2.0"], crate = "symphonia-metadata" },
    { allow = ["MPL-2.0"], crate = "symphonia-format-riff" },
    { allow = ["MPL-2.0"], crate = "symphonia-utils-xiph" },
    { allow = ["MPL-2.0"], crate = "symphonia-codec-adpcm" },
    { allow = ["MPL-2.0"], crate = "symphonia-codec-pcm" },
    { allow = ["MPL-2.0"], crate = "symphonia-codec-vorbis" },
    { allow = ["MPL-2.0"], crate = "symphonia-bundle-flac" },
    { allow = ["MPL-2.0"], crate = "symphonia-format-ogg" },
]

#[[licenses.clarify]]
#{ path = "LICENSE", hash = 0xbd0eed23 }

[licenses.private]
ignore = false
registries = []

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = []

#[[bans.features]]

skip = []
skip-tree = []

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
gitlab = []
bitbucket = []
