language: "en-US"

reviews:
  profile: "assertive"
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - "main"
      - "feature/**"
      - "fix/**"
      - "chore/**"
  path_filters:
    - "!**/package-lock.json"
    - "!**/Cargo.lock"
    - "!**/.generated-manifest.json"
    - "!.ai-rulez/**"
    - "!.superpowers/**"
    - "!docs/superpowers/**"
    - "!packages/*/CHANGELOG.md"
    - "!e2e/**"

chat:
  auto_reply: true
