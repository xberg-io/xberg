# Android (any arch) and iOS: libheif-sys + ORT do not cross-compile to mobile
# NDK/SDK targets. Use the `android-target` aggregate (pure-Rust base + excel +
# tree-sitter + ocr + api + mcp). Previously narrowed to
# `target_arch = "x86_64"` for Android only.
[[crates.dart.target_dep_overrides]]
cfg = 'target_os = "android"'
features = ["android-target"]
default_features = false

[[crates.dart.target_dep_overrides]]
cfg = 'target_os = "ios"'
features = ["android-target"]
default_features = false

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the Dart server native cdylib drops `heic` along with the ORT-dependent
# features (same shape the kreuzberg-ffi crate uses).
[[crates.dart.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

[crates.kotlin_android]
# Self-contained Android library project at packages/kotlin-android/. Server-
# side Kotlin/JVM consumers use the Java binding directly (Kotlin interops
# with Java records natively); the Android AAR ships jniLibs/arm64-v8a/ +
# jniLibs/x86_64/ so Gradle embeds the kreuzberg-ffi cdylib into app builds
# without manual setup. Emitted by alef-backend-kotlin-android (alef ≥ 0.16).
package = "dev.kreuzberg"
namespace = "dev.kreuzberg"
artifact_id = "kreuzberg-android"
group_id = "dev.kreuzberg"
abis = ["arm64-v8a", "x86_64"]
# `features = ["full"]` is consumed by the JNI scaffolder (see
# `alef::scaffold::languages::jni`) to populate the kreuzberg dependency in
# `crates/kreuzberg-jni/Cargo.toml`. Without it the umbrella dep is featureless,
# so the JNI shim binds against kreuzberg's stub fallbacks — which take
# `&mut ExtractionResult` for what should be borrow-only ops — and the
# generated `Java_*` shims fail to compile with mismatched-borrow errors.
features = ["full"]
exclude_types = [
  # Internal DTO type used by plugin trait-bridges; marshalled as JSON strings at FFI boundary.
  # Not exposed in the Kotlin Android interface — methods that would reference it use String instead.
  "InternalDocument",
]
exclude_functions = [
  # embed_texts_async creates naming conflict with suspend wrapper of embed_texts.
  # Callers should use embedTextsAsync (suspend) from embed_texts instead.
  "embed_texts_async",
  "calculate_quality_score",
]

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the host-side JNI build (Kotlin AAR `:nativeTest`) drops `heic` along with
# the ORT-dependent features. Android targets (aarch64-linux-android,
# x86_64-linux-android) already get `android-target` via the FFI overrides.
[[crates.kotlin_android.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

[crates.jni]
# JNI shim crate that emits Java_* symbols for all JNI functions and trait-bridge
# registrations. Paired with kotlin_android backend to provide type-safe calling
# interface from Kotlin to Rust core via JNI.  Feature selection for the
# kreuzberg umbrella dependency lives in `[crates.kotlin_android] features`
# above — the JNI scaffolder reads from there so the same feature set is
# applied to both the AAR and the host-side test build.

[crates.swift]
module_name = "Kreuzberg"
package_name = "Kreuzberg"
# `heic` is intentionally excluded: libheif-sys cannot cross-compile to iOS SDK
# or Android NDK targets. Desktop builds still get heic because the
# `cfg(not(ios/android/windows))` target dep uses `features = ["full"]` which
# includes heic directly on the kreuzberg dependency side.
features = [
  "pdf",
  "excel",
  "office",
  "hwp",
  "hwpx",
  "iwork",
  "email",
  "html",
  "xml",
  "archives",
