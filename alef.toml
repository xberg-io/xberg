[crates.e2e.registry.packages.zig]
# Placeholder until v5.0.0-rc.4 ships and the tarball SHA is known.
# Update post-release with the real Zig multihash for
# https://github.com/xberg-io/xberg/releases/download/v{version}/xberg-zig-v{version}.tar.gz
hash = "xberg-1.0.0-rc.7-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA"

# Point WASM e2e at the wasm-pack `nodejs` target. The default `pkg/` is the
# bundler target whose JS glue uses `import * as foo from "env"` statements
# (unresolved namespace imports for getrandom/wasi-bound symbols), which Node
# cannot satisfy at import time. The `pkg/nodejs/` variant inlines those
# imports as `require()` calls handled by wasm-bindgen's Node loader.
[crates.e2e.packages.wasm]
name = "@xberg-io/xberg-wasm"
path = "../../crates/xberg-wasm/pkg/nodejs"

# URL e2e fixtures use Alef's loopback mock-server. Xberg URL extraction delegates to
# crawlberg, whose default SSRF policy rejects private networks unless this is set.
[crates.e2e.env]
CRAWLBERG_ALLOW_PRIVATE_NETWORK = "true"

[crates.e2e.format]
python = "ruff check --fix {dir} && ruff format {dir}"
go = "gofmt -w {dir}"
rust = "(cd {dir} && cargo fmt --all)"

# The Zig e2e harness links xberg-ffi, which is built with `--features all`
# and therefore pulls in libheif. On strict-linker targets (notably aarch64)
# the FFI's undefined libheif symbols cannot be resolved unless the e2e build
# links libheif explicitly. libheif is installed to /usr/local/lib by the CI
# install-system-deps action.
[crates.e2e.extra_system_libs]
zig = ["heif"]

[crates.e2e.fields]
chunks_have_content = "chunks_have_content"

[crates.e2e.fields_c_types]
"extraction_result.metadata" = "Metadata"

[crates.e2e.registry]
output = "test_apps"
github_repo = "https://github.com/xberg-io/xberg"

[crates.scaffold]
description = "High-performance document intelligence library"
license = "MIT"
repository = "https://github.com/xberg-io/xberg"
homepage = "https://xberg.io"
authors = ["Na'aman Hirschfeld <naaman@xberg.io>"]
keywords = ["document", "extraction", "pdf", "ocr", "text"]

[crates.scaffold.cargo]
rustc_wrapper = ".cargo/rustc-wrapper.sh"

# Force dynamic CRT (/MD) for cc-rs MSVC builds. xberg-tesseract uses
# cmake-rs which picks /MD, but cc-rs builds (e.g. esaxx-rs via gliner via
# tokenizers) default to /MT. When both rlibs are linked into the same
# cdylib (xberg_php.dll, xberg_nif.dll) the mismatch trips
# LNK1319 "RuntimeLibrary mismatch detected". cc-rs honors target-suffixed
# env vars (CFLAGS_<target>, CXXFLAGS_<target>) only when actually
# compiling for that target, so this is safe on non-Windows builds.
[crates.scaffold.cargo.env]
CFLAGS_x86_64_pc_windows_msvc = "/MD"
CXXFLAGS_x86_64_pc_windows_msvc = "/MD"
CFLAGS_i686_pc_windows_msvc = "/MD"
CXXFLAGS_i686_pc_windows_msvc = "/MD"

