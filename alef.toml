[crates.exclude]
types = [
    # Generic types — alef(skip) source annotation not picked up for generic structs
    # (alef-extract does not propagate cfg_attr through type-parameter bounds).
    "Pool",

    # Internal docx/hwp parser types — kept hidden from bindings (still
    # alef(skip)-annotated in source); serde derives added in Phase 1 but
    # binding surface is unchanged. Listed here to defend against future
    # codegen passes that might re-emit them as transitive container fields.
    "xberg::extraction::docx::parser::Table",
    "xberg::extraction::docx::parser::TableCell",
    "xberg::extraction::docx::parser::TableRow",
    "xberg::extraction::docx::parser::HeaderFooter",
    "xberg::extraction::docx::parser::Note",
    "xberg::extraction::hwp::model::Section",

    # GlineBackend has a private Arc<Mutex<GLiNER<SpanMode>>> field and a pub
    # fn new() constructor; alef v0.23.2 strict-construction validation cannot
    # auto-generate From<JsGlineBackend>/From<GlineBackend> without all fields.
    # The type is not a direct API parameter in any binding function — NER is
    # invoked via detect_entities()/redact() which accept NerConfig/RedactionConfig.
    "GlineBackend",
    "LlmBackend",
    "xberg::text::ner::llm::LlmBackend",

    # Segment<'a> is an internal semantic-chunking type with a lifetime-bound
    # &'a str field. Alef cannot generate a From impl for lifetime-parameterised
    # types without a matching static constructor. Not part of the public API.
    "xberg::chunking::semantic::merge::Segment",

    # NerBackend is a pub trait without a corresponding plugin registry entry
    # (no register_ner_backend/get_ner_backend_registry exists in xberg
    # plugins). Treating it as a binding-visible type breaks swift-bridge
    # (must be declared with `type NerBackend`) and dart frb codegen (needs
    # `dyn NerBackend` in `RustAutoOpaqueInner<T>`). Until a proper trait_bridge
    # entry is added, exclude the trait from the binding surface.
    "NerBackend",
    "xberg::text::ner::backend::NerBackend",

    # EnrichmentConfig + EnrichedResult sit on top of the (currently
    # binding-excluded) NerBackend trait via `NerEnrichmentConfig.backend:
    # Arc<dyn NerBackend>` and `EnrichedResult.ner: Option<Vec<EntityResult>>`.
    # EnrichmentConfig lacks serde::{Serialize, Deserialize}; EnrichedResult
    # lacks serde::Serialize and Default. Bindings that marshal via serde
    # (JNI, NAPI, PyO3) cannot generate cross-FFI glue without those derives.
    # Exclude until either (a) the NerBackend trait_bridge lands and the
    # enrich types gain serde derives, or (b) a non-NER-only enrich subset is
    # exposed.
    "EnrichmentConfig",
    "EnrichedResult",
    "xberg::enrich::EnrichmentConfig",
    "xberg::enrich::EnrichedResult",
    "NerEnrichmentConfig",
    "xberg::enrich::NerEnrichmentConfig",
    "ClassificationEnrichmentConfig",
    "xberg::enrich::ClassificationEnrichmentConfig",
    "CaptioningEnrichmentConfig",
    "xberg::enrich::CaptioningEnrichmentConfig",

    # Standalone helper DTOs that remain Rust-only for v1 bindings. The
    # extraction pipeline exposes their effects through ExtractionResult and
    # ExtractionConfig, not through separate binding helper APIs.
    "EnrichOptions",
    "EnrichResult",
    "EnrichStatus",
    "xberg::enrichment::EnrichOptions",
    "xberg::enrichment::EnrichResult",
    "xberg::enrichment::EnrichStatus",
    "ChunkPlan",
    "ChunkingDecision",
    "xberg::heuristics::decision::ChunkPlan",
    "xberg::heuristics::decision::ChunkingDecision",
    "ChunkingResult",
    "ConfidenceSignals",
    "ConfidenceWeights",
    "EmbeddingPreset",
    "RerankerPreset",
    "StructuredInput",
    "StructuredThresholds",
    "StructuredCallMode",
    "StructuredOptions",
    "StructuredOutput",
    "StructuredError",
    "PresetSpec",
    "VisionConfig",

    # ClassifyContext<'a> has a lifetime-bound &'a str field plus a bare
    # `Value` field that alef cannot prove is `serde_json::Value`. Internal
    # type used only by the classify_one() helper; not part of the public
    # binding surface. classify_pages/classify_text/classify_document are the
    # public entry points.
    "ClassifyContext",
    "xberg::text::classification::page_classifier::ClassifyContext",

    # Legacy extraction DTOs kept only for internal helpers. The v1 public
    # extraction surface is ExtractInput plus extract/extract_batch.
    "BatchBytesItem",
    "BatchFileItem",

    "SyncExtractor",

    # Rust-only extraction engine (crates/xberg/src/engine/). Not part of the
    # binding surface: declared as a bare `pub mod engine;` in lib.rs and its
    # files are not listed in `sources`. Listed here as belt-and-suspenders so a
    # future codegen pass cannot re-emit them as transitive container fields.
    "Engine",
    "EngineBuilder",
    "xberg::engine::Engine",
    "xberg::engine::EngineBuilder",

    # Rust-only engine extension seams (crates/xberg/src/engine/seams/). Same
    # isolation as Engine/EngineBuilder above: traits + in-core defaults that live
    # under the bare `pub mod engine;`, are not listed in `sources`, and are not
    # re-exported from lib.rs. Listed here as belt-and-suspenders against a future
    # codegen pass re-emitting them as transitive container fields.
    "CacheBackend",
    "NoopCache",
    "ProgressSink",
    "ProgressEvent",
    "NoopProgressSink",
    "StructuredPolicy",
    "DefaultStructuredPolicy",
    "PresetResolver",
    "CorePresetResolver",
    "LlmClient",
    "LiterLlmClient",
    "ModelProvider",
    "DefaultModelProvider",
    "ModelId",
    "xberg::engine::seams::CacheBackend",
    "xberg::engine::seams::NoopCache",
