[[crates.source_crates]]
name = "crawlberg"
sources = [
    "../crawlberg/crates/crawlberg/src/types/config.rs",
    "../crawlberg/crates/crawlberg/src/types/discovery.rs",
    "../crawlberg/crates/crawlberg/src/types/results.rs",
    "../crawlberg/crates/crawlberg/src/net/ssrf.rs",
]
roots = ["crawlberg::CrawlConfig", "crawlberg::MapResult"]

# Pin crawlberg to its concrete registry version rather than `workspace = true`.
# The publish out-of-workspace build scripts strip `workspace = true` markers
# (s/workspace = true//) to detach the crate from the repo workspace; an
# external workspace-dep like crawlberg would be left sourceless ("dependency
# (crawlberg) specified without providing a version"). Keep this in sync with
# the root Cargo.toml [workspace.dependencies] entry.
[crates.extra_dependencies]
crawlberg = { version = "1.0.2", default-features = false }

[crates.python]
module_name = "_xberg"
exclude_types = [
    # Arc<Mutex<T>> opaque types — codegen doesn't generate .lock() for methods
    "PooledString",
]
exclude_fields = ["FormatMetadata.Code"]
exclude_functions = [
    "calculate_quality_score",
    "count_tokens",
    "embed_texts",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
    # Trait-bridge registration emits Python adapters for these plugin families.
    # The raw Rust functions take Arc<dyn Trait> and duplicate the bridge names.
    "register_document_extractor",
    "register_renderer",
    "unregister_document_extractor",
    "unregister_renderer",
]
reexported_types = ["ExtractionResult", "ExtractedDocument", "ExtractionDiff"]

[crates.python.stubs]
output = "packages/python/xberg/"

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the PyO3 cdylib drops `heic` along with the ORT-dependent features.
[[crates.python.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

# Intel macOS: ort ships no static x86_64-apple-darwin prebuilt (dropped rc.11;
# Microsoft dropped onnxruntime-osx-x86_64 after 1.23), so this arch loads ONNX
# Runtime dynamically via `macos-intel-target` (full + ort-dynamic). arm64 macOS
# keeps the default ort-bundled path. The wheel must vendor libonnxruntime.dylib.
[[crates.python.target_dep_overrides]]
cfg = 'all(target_os = "macos", target_arch = "x86_64")'
features = ["macos-intel-target"]
default_features = false

[crates.node]
package_name = "@xberg-io/xberg"
exclude_types = [
    # Opaque Arc<Mutex<T>> types — codegen doesn't generate .lock() calls for methods
    "StreamReader",
    "PooledString",
]
exclude_functions = [
    "calculate_quality_score",
    "count_tokens",
    "embed_texts",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
]

[crates.node.extra_dependencies]
# Required by alef-emitted #[serde_with::serde_as] attribute on HashMap<_, Vec<u8>>
# fields (e.g. binary cache maps). Not added by alef-backend-napi automatically.
serde_with = "3"

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the NAPI-RS cdylib drops `heic` along with the ORT-dependent features.
[[crates.node.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

# Intel macOS: dynamic ONNX Runtime (see the python override above).
[[crates.node.target_dep_overrides]]
cfg = 'all(target_os = "macos", target_arch = "x86_64")'
features = ["macos-intel-target"]
default_features = false

[crates.ruby]
gem_name = "xberg"
exclude_functions = [
    "calculate_quality_score",
    "count_tokens",
    "embed_texts",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
]

[crates.ruby.stubs]
output = "packages/ruby/sig/"

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the Magnus cdylib drops `heic` along with the ORT-dependent features.
[[crates.ruby.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

# Intel macOS: dynamic ONNX Runtime (see the python override above).
[[crates.ruby.target_dep_overrides]]
cfg = 'all(target_os = "macos", target_arch = "x86_64")'
features = ["macos-intel-target"]
default_features = false

[crates.php]
extension_name = "xberg"
exclude_types = [
    # Enum types that don't have From<String> implementation for PHP
    "ChunkerType",
    "OutputFormat",
    "EmbeddingModelType",
    "UriKind",
    "ChunkType",
    # PooledString has methods incompatible with ext-php-rs (buffer_mut, deref_mut, fmt(f))
    # that trigger E0716/E0596/E0507 in the #[php_impl] macro expansion.
    "PooledString",
    # Tagged data enums whose flat-PHP-class From<core> impls call .into() on PathBuf,
    # usize, TableGrid, Vec<(String,String)>, [(u32,u32);4] fields that don't have the
    # required Into<String>/Into<i64> implementations. Tracked upstream in alef-backend-php.
    "ChunkSizing",
    "EmbeddingModelType",
    "NodeContent",
    "OcrBoundingGeometry",
]
exclude_functions = [
    "calculate_quality_score",
    "count_tokens",
    "embed_texts",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
    # embed_texts_async and rerank_async are now generated with always-true cfg
    # conditions to work around ext-php-rs's #[php_impl] macro unconditional
    # function resolution. See prepend_cfg_for_php in rust_bindings.rs.
]

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the ext-php-rs cdylib drops `heic` along with the ORT-dependent features.
[[crates.php.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

# Intel macOS: dynamic ONNX Runtime (see the python override above).
[[crates.php.target_dep_overrides]]
cfg = 'all(target_os = "macos", target_arch = "x86_64")'
features = ["macos-intel-target"]
default_features = false

[crates.elixir]
app_name = "xberg"
# RustlerPrecompiled targets emitted into lib/xberg/native.ex. Overrides alef's
# default (which omits x86_64-apple-darwin) so the Intel-macOS NIF built by the
# elixir-natives CI matrix is downloadable by consumers.
