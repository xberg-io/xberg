]
exclude_types = [
  # Internal DTO type used by plugin trait-bridges; marshalled as JSON strings at FFI boundary
  "InternalDocument",
  # alef 0.25.19 drops the `#[cfg(any(feature = "keywords-yake", feature = "keywords-rake"))]`
  # extern blocks that declared `KeywordConfig`, `Keyword`, `YakeParams`, and `RakeParams`,
  # but leaves the references to them in fields/getters intact. swift-bridge then fails to
  # parse the bridge module with `UndeclaredType`. Exclude the types and their fields until
  # the alef swift bridge type-collection is fixed.
  "KeywordConfig",
  "Keyword",
  "YakeParams",
  "RakeParams",
  "KeywordAlgorithm",
]
exclude_fields = [
  "ExtractionResult.ocr_internal_document",
  "OcrExtractionResult.internal_document",
  "ExtractionConfig.keywords",
  "FileExtractionConfig.keywords",
  "ExtractionResult.extracted_keywords",
]
exclude_functions = [
  "calculate_quality_score",
  "embed_texts",
  # Pure Rust helper functions without swift-bridge extern declarations
  "find_all",
  "scan_text",
  # FFI-wrapped function whose RustString return is not properly converted
  "download_model",
  # alef emits cfg-gated fallback stubs (`not(feature = "embeddings"/"reranker")`)
  # that reference the real `kreuzberg::*_async` functions via super::, but the
  # swift_bridge module's extern blocks still expose the symbols unconditionally
  # — same wrinkle as PHP's php_impl macro. Drop the async variants until the
  # alef swift backend can suppress cfg-gated stub fns.
  "embed_texts_async",
  "rerank_async",
]

# iOS: libheif-sys + ORT do not cross-compile to the iOS SDK, so the
# swift-bridge cdylib drops `heic` along with the ORT-dependent features.
# `android-target` is a misnomer here but its feature set (pure-Rust base +
# excel + tree-sitter + ocr + api + mcp) is what iOS can support today.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "ios"'
features = ["android-target"]
default_features = false

# Android: same native-C constraint. Included so cross-compiling kreuzberg-swift
# to Android (e.g. via swift-bridge's Linux-host workflow) doesn't pull in
# libheif-sys either.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "android"'
features = ["android-target"]
default_features = false

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the Swift-bridge cdylib drops `heic` along with the ORT-dependent features.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

