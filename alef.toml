precondition = "command -v pnpm >/dev/null 2>&1"
before = "cd crates/kreuzberg-node && pnpm install && CARGO_BUILD_JOBS=1 pnpm exec napi build --output-dir . --release --platform"
e2e = "cd e2e/node && pnpm install --frozen-lockfile=false && pnpm test"

