[crates.test.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
before = [
    "bash scripts/e2e/build-mock-server.sh",
    "cargo build --release -p xberg-ffi",
    "ln -sf libxberg_ffi.dylib target/release/libxberg_jni.dylib 2>/dev/null || ln -sf libxberg_ffi.so target/release/libxberg_jni.so 2>/dev/null || true",
]
command = "cd packages/kotlin-android && gradle test --no-daemon"
e2e = "cd e2e/kotlin_android && gradle test --no-daemon"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = ["cargo build --release -p xberg-swift", "bash scripts/setup-swift-bridge.sh"]
command = "cd packages/swift && swift test"
e2e = "bash scripts/e2e/run-with-mock-server.sh bash -c 'cd e2e/swift_e2e && swift test'"

[crates.test.dart]
# packages/dart is a pure-Dart FFI package (no `flutter:` SDK constraint, no ffiPlugin
# block) — the FRB runtime works in server-Dart. Drive everything with the Dart SDK:
# `flutter test` pulls in the Flutter engine + impellerc, unavailable in headless CI.
# e2e/dart is likewise pure-Dart (package:test).
precondition = "command -v dart >/dev/null 2>&1"
before = """
{ command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0; } && \
cd packages/dart && dart pub get && cd rust && \
{ \
  INPUT_HASH=$(printf '%s' "$(cat src/lib.rs flutter_rust_bridge.yaml)" | shasum | cut -d' ' -f1); \
  HASH_FILE=.frb_codegen_hash; \
  if [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE" 2>/dev/null)" = "$INPUT_HASH" ]; then \
    echo "FRB codegen skipped (inputs unchanged)"; \
  else \
    flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml && \
    echo "$INPUT_HASH" > "$HASH_FILE"; \
  fi; \
} && cd ../../.. && cargo build --release -p xberg-dart && \
bash scripts/e2e/build-mock-server.sh
"""
command = "cd packages/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"
e2e = "cd e2e/dart && for dir in docx html json pdf text xlsx images; do test -L $dir || ln -sf ../../test_documents/$dir $dir; done && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test --concurrency=1"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cargo build --release -p xberg-ffi"
# Pass absolute ffi_path/ffi_include_path: zig bakes DT_RUNPATH as a literal
# string and the test binaries run with cwd=test_documents/, so the default
# `../../target/release` resolves outside the repo at runtime.
command = "cd packages/zig && zig build test -Dffi_path=$PWD/../../target/release -Dffi_include_path=$PWD/../../crates/xberg-ffi/include"
e2e = "cd e2e/zig && zig build test -Dffi_path=$PWD/../../target/release -Dffi_include_path=$PWD/../../crates/xberg-ffi/include"

[crates.publish]
core_crate = "crates/xberg"

[crates.publish.languages.ruby]
vendor_mode = "registry"

[crates.publish.languages.elixir]
vendor_mode = "registry"
nif_versions = ["2.16", "2.17"]

[crates.publish.languages.dart]
# dart/rust/Cargo.toml carries path deps on xberg; rewrite to registry on publish.
# NOTE: resolve_binding_manifest does not yet resolve the Dart manifest path — the rewrite
# is a no-op until alef is updated to handle packages/dart/rust/Cargo.toml.
vendor_mode = "registry"

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

