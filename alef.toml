[crates.lint.python]
precondition = "command -v ruff >/dev/null 2>&1"
before = "cd packages/python && uv sync --no-install-project --no-install-workspace"
typecheck = "cd packages/python && uv run --no-sync mypy ."

[crates.lint.node]
precondition = "command -v pnpm >/dev/null 2>&1"
format = "pnpm dlx oxfmt crates/xberg-node"
check = "pnpm dlx oxlint crates/xberg-node"

[crates.lint.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "export PATH=\"$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH\" && cd packages/ruby && ruby -S bundle install"
format = "export PATH=\"$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH\" && cd packages/ruby && ruby -S bundle exec rubocop -a ."

[crates.lint.php]
precondition = "command -v composer >/dev/null 2>&1"
before = "composer install"
format = "composer format"
check = "composer phpstan"

[crates.lint.go]
before = "cargo build --release -p xberg-ffi"

[crates.lint.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && mix deps.get"
check = "cd packages/elixir && mix credo"

[crates.lint.java]
precondition = "command -v mvn >/dev/null 2>&1"
check = "mvn -f packages/java/pom.xml spotless:check -q"

[crates.lint.kotlin_android]
precondition = "command -v ktfmt >/dev/null 2>&1"
format = "find packages/kotlin-android \\( -name build -o -name .gradle \\) -prune -o \\( -name '*.kt' -o -name '*.kts' \\) -type f -print0 | xargs -0 ktfmt --kotlinlang-style"
check = "find packages/kotlin-android \\( -name build -o -name .gradle \\) -prune -o \\( -name '*.kt' -o -name '*.kts' \\) -type f -print0 | xargs -0 ktfmt --kotlinlang-style --dry-run --set-exit-if-changed"

[crates.lint.swift]
precondition = "command -v swift >/dev/null 2>&1"
format = "swift format --in-place --recursive packages/swift/Sources"
check = "swift format lint --recursive packages/swift/Sources"

[crates.lint.dart]
precondition = "command -v dart >/dev/null 2>&1"
format = "cd packages/dart && dart format ."
check = "cd packages/dart && dart analyze"

[crates.lint.zig]
precondition = "command -v zig >/dev/null 2>&1"
format = "cd packages/zig && zig fmt src"
check = "cd packages/zig && zig fmt --check src"

[crates.update.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
update = "echo 'kotlin-android: no-op (versions pinned by alef regen)'"
upgrade = "echo 'kotlin-android: no-op (versions pinned by alef regen)'"

[crates.update.swift]
precondition = "command -v swift >/dev/null 2>&1"
update = "cd packages/swift && swift package update"
upgrade = "cd packages/swift && swift package update"

[crates.update.dart]
precondition = "command -v dart >/dev/null 2>&1"
update = "cd packages/dart && dart pub upgrade"
upgrade = "cd packages/dart && dart pub upgrade --major-versions"

[crates.update.zig]
precondition = "command -v zig >/dev/null 2>&1"
update = "cd packages/zig && zig build --fetch"
upgrade = "cd packages/zig && zig build --fetch"

[crates.test.python]
precondition = "command -v uv >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cd e2e/python && uv sync --reinstall-package xberg"
e2e = "cd e2e/python && uv run --no-sync python -m pytest tests/ -q"

[crates.test.node]
precondition = "command -v pnpm >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cd crates/xberg-node && pnpm install && CARGO_BUILD_JOBS=1 pnpm exec napi build --output-dir . --release --platform && cd ../../e2e/node && pnpm install --frozen-lockfile=false"
e2e = "cd e2e/node && pnpm test"

[crates.test.go]
precondition = "command -v go >/dev/null 2>&1"
before = "cargo build --release -p xberg-ffi && mkdir -p packages/go/include && cp crates/xberg-ffi/include/xberg.h packages/go/include/ && bash scripts/stage_go_native_local.sh"
e2e = "cd e2e/go && go test ./... -count=1"

[crates.test.ruby]
precondition = "command -v bundle >/dev/null 2>&1"
before = "export PATH=\"$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH\" && cd packages/ruby && ruby -S bundle install && ruby -S bundle exec rake compile && cd ../../e2e/ruby && ruby -S bundle install"
e2e = "export PATH=\"$HOME/.rbenv/shims:$HOME/.asdf/shims:$PATH\" && cd e2e/ruby && ruby -S bundle exec rspec"

[crates.test.php]
precondition = "command -v composer >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cargo build --release -p xberg-php && cd e2e/php && composer install"
e2e = "cd e2e/php && php run_tests.php"

[crates.test.java]
precondition = "command -v mvn >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cargo build --release -p xberg-ffi && cd packages/java && mvn -T 1 clean package -DskipTests"
e2e = "cd e2e/java && mvn test"

[crates.test.csharp]
precondition = "command -v dotnet >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cargo build --release -p xberg-ffi && bash scripts/stage_csharp_native_local.sh"
e2e = "dotnet test e2e/csharp"

[crates.test.elixir]
precondition = "command -v mix >/dev/null 2>&1"
before = "cd packages/elixir && XBERG_BUILD=1 mix deps.get && XBERG_BUILD=1 mix compile && cd ../../e2e/elixir && XBERG_BUILD=1 mix deps.get"
e2e = "cd e2e/elixir && XBERG_BUILD=1 mix test"

[crates.test.wasm]
precondition = "command -v wasm-pack >/dev/null 2>&1"
before = "wasm-pack build crates/xberg-wasm --release --target nodejs --out-dir pkg/nodejs && cd e2e/wasm && pnpm install --ignore-workspace"
e2e = "cd e2e/wasm && pnpm test"

[crates.test.rust]
precondition = "command -v cargo >/dev/null 2>&1"
e2e = "cd e2e/rust && cargo test"

[crates.test.kotlin_android]
precondition = "command -v gradle >/dev/null 2>&1"
before = [
    "bash scripts/e2e/build-mock-server.sh",
    "cargo build --release -p xberg-ffi",
    "ln -sf libxberg_ffi.dylib target/release/libxberg_jni.dylib 2>/dev/null || ln -sf libxberg_ffi.so target/release/libxberg_jni.so 2>/dev/null || true",
]
command = "cd packages/kotlin-android && gradle test --no-daemon"
e2e = "cd e2e/kotlin_android && gradle test --no-daemon"

[crates.test.swift]
precondition = "command -v swift >/dev/null 2>&1"
before = ["cargo build --release -p xberg-swift", "bash scripts/setup-swift-bridge.sh"]
command = "cd packages/swift && swift test"
e2e = "bash scripts/e2e/run-with-mock-server.sh bash -c 'cd e2e/swift_e2e && swift test'"

[crates.test.dart]
precondition = "command -v dart >/dev/null 2>&1"
before = """
{ command -v flutter_rust_bridge_codegen >/dev/null 2>&1 || cargo install flutter_rust_bridge_codegen --version 2.12.0; } && \
cd packages/dart && dart pub get && cd rust && \
{ \
  INPUT_HASH=$(printf '%s' "$(cat src/lib.rs flutter_rust_bridge.yaml)" | shasum | cut -d' ' -f1); \
  HASH_FILE=.frb_codegen_hash; \
  if [ -f "$HASH_FILE" ] && [ "$(cat "$HASH_FILE" 2>/dev/null)" = "$INPUT_HASH" ]; then \
    echo "FRB codegen skipped (inputs unchanged)"; \
  else \
    flutter_rust_bridge_codegen generate --config-file flutter_rust_bridge.yaml && \
    echo "$INPUT_HASH" > "$HASH_FILE"; \
  fi; \
} && cd ../../.. && cargo build --release -p xberg-dart && \
bash scripts/e2e/build-mock-server.sh
"""
command = "cd packages/dart && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test"
e2e = "cd e2e/dart && for dir in docx html json pdf text xlsx images; do test -L $dir || ln -sf ../../test_documents/$dir $dir; done && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart pub get && DYLD_FALLBACK_LIBRARY_PATH=$PWD/../../target/release LD_LIBRARY_PATH=$PWD/../../target/release FRB_DART_LOAD_EXTERNAL_LIBRARY_NATIVE_LIB_DIR=$PWD/../../target/release dart test --concurrency=1"

[crates.test.zig]
precondition = "command -v zig >/dev/null 2>&1"
before = "bash scripts/e2e/build-mock-server.sh && cargo build --release -p xberg-ffi"
command = "cd packages/zig && zig build test -Dffi_path=$PWD/../../target/release -Dffi_include_path=$PWD/../../crates/xberg-ffi/include"
e2e = "cd e2e/zig && zig build test -Dffi_path=$PWD/../../target/release -Dffi_include_path=$PWD/../../crates/xberg-ffi/include"

[crates.publish]
core_crate = "crates/xberg"

[crates.publish.languages.ruby]
vendor_mode = "registry"

[crates.publish.languages.elixir]
vendor_mode = "registry"
nif_versions = ["2.16"]

[crates.publish.languages.dart]
# NOTE: resolve_binding_manifest does not yet resolve the Dart manifest path — the rewrite
vendor_mode = "registry"

[crates.publish.languages.ffi]
pkg_config = true
cmake_config = true

