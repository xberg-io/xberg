  "stopwords",
  "auto-rotate",
  "auto-rotate-types",
  "tree-sitter",
  "tokio-runtime",
  "api",
  "mcp",
  "liter-llm",
  "quality",
]
exclude_types = [
  # Trait-bridge opaque types serialized as JSON strings at FFI boundary
  "InternalDocument",
  "OcrBackendType",
  "ProcessingStage",
  "SyncExtractor",
]
exclude_functions = [
  "calculate_quality_score",
  "embed_texts",
]

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the Panama / JNI cdylib drops `heic` along with the ORT-dependent features.
[[crates.java.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

[crates.dart]
pubspec_name = "kreuzberg"
lib_name = "kreuzberg"
style = "frb"
# `heic` is intentionally excluded from this list: libheif-sys cannot cross-compile
# to Android NDK or iOS SDK targets, so `heic` must not appear in the crate-level
# `[features] default`. Desktop builds still get heic because the
# `cfg(not(android/ios/windows))` target dep uses `features = ["full"]` which
# includes heic directly on the kreuzberg dependency side.
features = [
  "pdf",
  "excel",
  "office",
  "hwp",
  "hwpx",
  "iwork",
  "email",
  "html",
  "xml",
  "archives",
  "mdx",
  "svg",
  "language-detection",
  "chunking",
  "chunking-tokenizers",
  "quality",
  "keywords",
  "diff",
  "api",
  "api-types",
  "mcp",
  "ocr",
  "paddle-ocr",
  "paddle-ocr-types",
  "layout-detection",
  "layout-types",
  "embeddings",
  "embedding-presets",
  "reranker",
  "reranker-presets",
  "transcription-types",
  "tree-sitter",
  "liter-llm",
  "tokio-runtime",
  "ner-llm",
  "ner-onnx",
  "redaction",
  "summarization",
  "classification",
  "captioning",
  "qr-codes",
  "auto-rotate-types",
