# It refreshes the copied path dependency before `uv run --no-sync` executes tests.
before = "bash scripts/e2e/build-mock-server.sh && cd e2e/python && uv sync --reinstall-package xberg"
e2e = "cd e2e/python && uv run --no-sync python -m pytest tests/ -q"

