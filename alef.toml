[crates.kotlin_android]
# Self-contained Android library project at packages/kotlin-android/. Server-
# side Kotlin/JVM consumers use the Java binding directly (Kotlin interops
# with Java records natively); the Android AAR ships jniLibs/arm64-v8a/ +
# jniLibs/x86_64/ so Gradle embeds the xberg-ffi cdylib into app builds
# without manual setup. Emitted by alef-backend-kotlin-android (alef ≥ 0.16).
package = "io.xberg"
namespace = "io.xberg"
artifact_id = "xberg-android"
group_id = "io.xberg"
abis = ["arm64-v8a", "x86_64"]
# `features = ["full"]` is consumed by the JNI scaffolder (see
# `alef::scaffold::languages::jni`) to populate the xberg dependency in
# `crates/xberg-jni/Cargo.toml`. Without it the umbrella dep is featureless,
# so the JNI shim binds against xberg's stub fallbacks — which take
# `&mut ExtractionResult` for what should be borrow-only ops — and the
# generated `Java_*` shims fail to compile with mismatched-borrow errors.
features = ["full"]
exclude_types = [
    # Internal DTO type used by plugin trait-bridges; marshalled as JSON strings at FFI boundary.
    # Not exposed in the Kotlin Android interface — methods that would reference it use String instead.
    "InternalDocument",
]
exclude_fields = [
    "ExtractedDocument.ocr_internal_document",
    "ExtractedDocument.internal_document",
    "OcrExtractionResult.internal_document",
]
exclude_functions = [
    # embed_texts_async creates naming conflict with suspend wrapper of embed_texts.
    # Callers should use embedTextsAsync (suspend) from embed_texts instead.
    "embed_texts_async",
    "calculate_quality_score",
    "count_tokens",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
]

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the host-side JNI build (Kotlin AAR `:nativeTest`) drops `heic` along with
# the ORT-dependent features. Android targets (aarch64-linux-android,
# x86_64-linux-android) already get `android-target` via the FFI overrides.
[[crates.kotlin_android.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

[crates.jni]
# JNI shim crate that emits Java_* symbols for all JNI functions and trait-bridge
