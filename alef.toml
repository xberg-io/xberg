    "metadata.created_at",
    "metadata.modified_at",
    "metadata.created_by",
    "metadata.modified_by",
    "metadata.output_format",
    "metadata.category",
    "metadata.tags",
    "metadata.document_version",
    "metadata.abstract_text",
    "chunks",
    "images",
    "pages",
    "elements",
    "djot_content",
    "ocr_elements",
    "document",
    "extraction_method",
    "detected_languages",
    "extracted_keywords",
    "quality_score",
    "annotations",
    "translation",
    "page_classifications",
    "redaction_report",
    "formatted_content",
]
fields_array = [
    "results",
    "tables",
    "results[0].elements",
    "results[0].document.nodes",
    "results[0].extracted_keywords",
    "chunks",
    "images",
    "pages",
    "elements",
    "ocr_elements",
    "detected_languages",
    "extracted_keywords",
    "annotations",
    "processing_warnings",
    "metadata.sheet_names",
    "results[0].metadata.format.excel.sheet_names",
    "metadata.format.excel.sheet_names",
    "document.node_types",
]
# Enum-typed fields on the result tree. Typed bindings (C#, Java, Kotlin,
# Elixir atoms, etc.) emit enum variants for these, so the e2e codegen must
# avoid string-only assertion helpers (e.g. `.Trim()`, `String.trim/1`) and
# compare against the serde-wire string form instead.
fields_enum = ["results[0].summary.strategy"]
# Xberg's public extraction calls return an `ExtractionResult` envelope.
# The PHP and Rust e2e codegens use this both to validate assertion paths
# and to derive the root return type — the unique TypeDef whose field names
# are a superset of this list.
result_fields = [
    "results",
    "errors",
    "summary",
    "crawl_final_urls",
    "crawl_redirect_count",
    "crawl_unique_normalized_urls",
]

# Xberg's `ExtractedDocument` is the per-document DTO inside
# `ExtractionResult.results` and exposes every result field as a `pub <field>:`
# struct field. The Rust e2e renderer in alef uses `fields_method_calls` to
# decide whether to append `()` after the accessor. Most paths stay as plain
# field access (`result.content`, not `result.content()`); entries here are the
# Rust tagged-enum variant accessors (e.g. `FormatMetadata::excel()`) that take
# `&self` and return `Option<&Variant>`. Java/Kotlin/Swift/Csharp generate
# their own accessor shape via per-language backend conventions and do not
# consult this set.
fields_method_calls = ["results[0].metadata.format.excel", "metadata.format.excel"]

