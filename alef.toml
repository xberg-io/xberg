    # Trait-bridge registration emits SwiftDocumentExtractorBox/SwiftRendererBox
    # adapters. The raw Rust lifecycle fns take Arc<dyn Trait> wrappers that
    # swift-bridge cannot declare as ordinary extern types and duplicate the
    # bridge functions.
    "register_document_extractor",
    "unregister_document_extractor",
    "register_renderer",
    "unregister_renderer",
    "extract_sync",
    "extract_batch_sync",
    "extract_bytes",
    "extract_bytes_sync",
    "extract_file",
    "extract_file_sync",
    "batch_extract_bytes",
    "batch_extract_bytes_sync",
    "batch_extract_files",
    "batch_extract_files_sync",
]

# iOS: libheif-sys + ORT do not cross-compile to the iOS SDK, so the
# swift-bridge cdylib drops `heic` along with the ORT-dependent features.
# `android-target` is a misnomer here but its feature set (pure-Rust base +
# excel + tree-sitter + ocr + api + mcp) is what iOS can support today.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "ios"'
features = ["android-target"]
default_features = false

# Android: same native-C constraint. Included so cross-compiling xberg-swift
# to Android (e.g. via swift-bridge's Linux-host workflow) doesn't pull in
# libheif-sys either.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "android"'
features = ["android-target"]
default_features = false

# Windows: libheif is not installed on the `windows-latest` runner image, so
# the Swift-bridge cdylib drops `heic` along with the ORT-dependent features.
[[crates.swift.target_dep_overrides]]
cfg = 'target_os = "windows"'
features = ["windows-target"]
default_features = false

# Intel macOS: dynamic ONNX Runtime (see the python override above).
[[crates.swift.target_dep_overrides]]
cfg = 'all(target_os = "macos", target_arch = "x86_64")'
features = ["macos-intel-target"]
default_features = false

