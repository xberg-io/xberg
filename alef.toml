    "LayoutDetection.class",
    "LayoutRegion.class",

    # Generic impl methods — cannot be represented without monomorphization metadata
    "ModelCache.new",
    "MetricsLayer.layer",
    "MultipartApi.from_request",

    # next_token takes &PiiCategory (a reference) and &mut self; alef v0.23.2
    # strict-construction validation cannot auto-delegate methods with borrowed
    # params that differ from the opaque-handle receiver. Callers use apply_strategy
    # (a free function) to consume a TokenCounter, making this method internal.
    "TokenCounter.next_token",

]

functions = [
    # Rust-only structured-extraction mechanism free functions
    # (crates/xberg/src/engine/structured/). Same isolation as the engine/structured
    # types excluded above: they live under the bare `pub mod engine`, are not listed
    # in `sources`, and are not re-exported from lib.rs. alef otherwise discovers them
    # through the public module tree and trips lossy_sanitized_surface because their
    # signatures reference the excluded mechanism types (PageImage, Batch, BuiltPrompt,
    # CitationOutput, …). Exclude them so the Rust-only engine stays off the binding surface.
    "fuse",
    "build_prompt",
    "build_vision_fallback_prompt",
    "batch_pages",
    "pages_for_call",
    "validate_and_merge",
    "xberg::engine::structured::citations::fuse",
    "xberg::engine::structured::prompts::build_prompt",
    "xberg::engine::structured::prompts::build_vision_fallback_prompt",
    "xberg::engine::structured::chunk::batch_pages",
    "xberg::engine::structured::rasterize::pages_for_call",
    "xberg::engine::structured::schema::validate_and_merge",

    # apply_strategy takes &mut TokenCounter; alef v0.23.2 wraps TokenCounter in
    # Arc<Mutex<T>> in binding types and generates &counter.inner instead of
    # &mut *counter.inner.lock().unwrap(). The higher-level redact() function
    # covers all practical use cases. Also: the Swift backend emits
    # &category.0 (newtype syntax) for PiiCategory mapped to String.
    # Excluded globally until upstream fixes &mut-through-Arc delegation.
    "apply_strategy",

    # classify_one is an internal helper invoked by classify_pages/classify_text;
    # takes a `&ClassifyContext<'_>` with a bare `Value` field that alef cannot
    # prove is `serde_json::Value`. Public entry points are
    # classify_pages/classify_text/classify_document.
    "classify_one",

    # detect_entities takes `&dyn NerBackend` — the trait is excluded above and
    # has no plugin registry yet, so the free function is unreachable from
    # bindings. The Python binding exposes the higher-level redact()/detect_pii()
    # pipeline; other languages will gain NER access once the trait_bridge
    # entry lands.
    "detect_entities",

    # caption_images takes `&[&[u8]]` (slice of byte slices). Alef cannot
    # automatically convert binding-side `Vec<Vec<u8>>` (or `Vec<Value>` for
    # JNI) into a slice-of-slices reference; would require a per-binding
    # adapter to call `iter().map(Vec::as_slice).collect::<Vec<_>>()` first.
    # caption_image() (single image) covers the common case; multi-image
    # callers can loop client-side until alef gains slice-of-slice conversion.
    "caption_image",
    "caption_image_file",
    "caption_images",

    # Capability helpers stay Rust-only while the v1 binding surface is narrowed
