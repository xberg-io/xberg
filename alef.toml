dart = "packages/dart/lib/src/"
zig = "packages/zig/src/"

[crates.exclude]
types = [
  # Generic types — alef(skip) source annotation not picked up for generic structs
  # (alef-extract does not propagate cfg_attr through type-parameter bounds).
  "Pool",

  # Internal docx/hwp parser types — kept hidden from bindings (still
  # alef(skip)-annotated in source); serde derives added in Phase 1 but
  # binding surface is unchanged. Listed here to defend against future
  # codegen passes that might re-emit them as transitive container fields.
  "kreuzberg::extraction::docx::parser::Table",
  "kreuzberg::extraction::docx::parser::TableCell",
  "kreuzberg::extraction::docx::parser::TableRow",
  "kreuzberg::extraction::docx::parser::HeaderFooter",
  "kreuzberg::extraction::docx::parser::Note",
  "kreuzberg::extraction::hwp::model::Section",

  # GlineBackend has a private Arc<Mutex<GLiNER<SpanMode>>> field and a pub
  # fn new() constructor; alef v0.23.2 strict-construction validation cannot
  # auto-generate From<JsGlineBackend>/From<GlineBackend> without all fields.
  # The type is not a direct API parameter in any binding function — NER is
  # invoked via detect_entities()/redact() which accept NerConfig/RedactionConfig.
  "GlineBackend",

  # Segment<'a> is an internal semantic-chunking type with a lifetime-bound
  # &'a str field. Alef cannot generate a From impl for lifetime-parameterised
  # types without a matching static constructor. Not part of the public API.
  "kreuzberg::chunking::semantic::merge::Segment",

  # NerBackend is a pub trait without a corresponding plugin registry entry
  # (no register_ner_backend/get_ner_backend_registry exists in kreuzberg
  # plugins). Treating it as a binding-visible type breaks swift-bridge
  # (must be declared with `type NerBackend`) and dart frb codegen (needs
  # `dyn NerBackend` in `RustAutoOpaqueInner<T>`). Until a proper trait_bridge
  # entry is added, exclude the trait from the binding surface.
  "NerBackend",
  "kreuzberg::text::ner::backend::NerBackend",

  # EnrichmentConfig + EnrichedResult sit on top of the (currently
  # binding-excluded) NerBackend trait via `NerEnrichmentConfig.backend:
  # Arc<dyn NerBackend>` and `EnrichedResult.ner: Option<Vec<EntityResult>>`.
  # EnrichmentConfig lacks serde::{Serialize, Deserialize}; EnrichedResult
  # lacks serde::Serialize and Default. Bindings that marshal via serde
  # (JNI, NAPI, PyO3) cannot generate cross-FFI glue without those derives.
  # Exclude until either (a) the NerBackend trait_bridge lands and the
  # enrich types gain serde derives, or (b) a non-NER-only enrich subset is
  # exposed.
  "EnrichmentConfig",
  "EnrichedResult",
  "kreuzberg::enrich::EnrichmentConfig",
  "kreuzberg::enrich::EnrichedResult",
  "NerEnrichmentConfig",
  "kreuzberg::enrich::NerEnrichmentConfig",

  # ClassifyContext<'a> has a lifetime-bound &'a str field plus a bare
  # `Value` field that alef cannot prove is `serde_json::Value`. Internal
  # type used only by the classify_one() helper; not part of the public
  # binding surface. classify_pages/classify_text/classify_document are the
  # public entry points.
  "ClassifyContext",
  "kreuzberg::text::classification::page_classifier::ClassifyContext",
]
methods = [
  # From<T> trait impls — auto-emitted by derive/trait-bridge
  "ApiError.from",

  # fmt trait impls — auto-emitted by derive, not callable from bindings
  "BBox.fmt",
  "LayoutDetection.fmt",
  "PooledString.fmt",

  # Deref/DerefMut impls for internal pooled types — not part of public API
  "PooledString.deref",
  "PooledString.deref_mut",
  "PooledString.buffer_mut",

  # Internal methods that can't easily be source-annotated (trait impls or unusual patterns)
  "BBox.center",
  "TessdataManager.manifest",

  # Deprecated Rust-only aliases — excluded from bindings
  "LayoutDetection.class",
  "LayoutRegion.class",

  # Generic impl methods — cannot be represented without monomorphization metadata
  "ModelCache.new",
  "MetricsLayer.layer",
  "MultipartApi.from_request",

  # next_token takes &PiiCategory (a reference) and &mut self; alef v0.23.2
  # strict-construction validation cannot auto-delegate methods with borrowed
  # params that differ from the opaque-handle receiver. Callers use apply_strategy
  # (a free function) to consume a TokenCounter, making this method internal.
  "TokenCounter.next_token",

]

functions = [
  # apply_strategy takes &mut TokenCounter; alef v0.23.2 wraps TokenCounter in
  # Arc<Mutex<T>> in binding types and generates &counter.inner instead of
  # &mut *counter.inner.lock().unwrap(). The higher-level redact() function
  # covers all practical use cases. Also: the Swift backend emits
  # &category.0 (newtype syntax) for PiiCategory mapped to String.
  # Excluded globally until upstream fixes &mut-through-Arc delegation.
  "apply_strategy",

  # classify_one is an internal helper invoked by classify_pages/classify_text;
  # takes a `&ClassifyContext<'_>` with a bare `Value` field that alef cannot
  # prove is `serde_json::Value`. Public entry points are
  # classify_pages/classify_text/classify_document.
  "classify_one",

  # detect_entities takes `&dyn NerBackend` — the trait is excluded above and
  # has no plugin registry yet, so the free function is unreachable from
  # bindings. The Python binding exposes the higher-level redact()/detect_pii()
  # pipeline; other languages will gain NER access once the trait_bridge
  # entry lands.
  "detect_entities",

  # caption_images takes `&[&[u8]]` (slice of byte slices). Alef cannot
  # automatically convert binding-side `Vec<Vec<u8>>` (or `Vec<Value>` for
  # JNI) into a slice-of-slices reference; would require a per-binding
  # adapter to call `iter().map(Vec::as_slice).collect::<Vec<_>>()` first.
  # caption_image() (single image) covers the common case; multi-image
  # callers can loop client-side until alef gains slice-of-slice conversion.
  "caption_images",

  # enrich() takes &EnrichmentConfig and returns EnrichedResult — both
  # excluded above pending NerBackend trait_bridge and serde derives.
  "enrich",
]

