[project]
name = "llama-index-xberg"
version = "0.0.0"
requires-python = ">=3.10"
classifiers = [
  "Programming Language :: Python :: 3 :: Only",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
]

[dependency-groups]
dev = [
  "xberg>=1.0.0",
  "llama-index-core>=0.14.22,<0.15",
  "mypy>=2.1.0",
  "pre-commit>=4.6",
  "pydantic>=2.13.4",
  "pytest>=9.1.0",
  "pytest-asyncio>=1.4.0",
  "pytest-cov>=7.1",
  "ruff>=0.15.17",
]

[tool.ruff]
target-version = "py310"
line-length = 120
lint.select = [ "ALL" ]
lint.ignore = [
  "ANN401",
  "COM812",
  "D100",
  "D104",
  "D107",
  "D203",
  "D213",
  "FIX002",
  "ISC001",
  "PLR0913",
  "TD002",
  "TD003"
]
lint.per-file-ignores."node_parsers/**/tests/**" = [
  "ANN",
  "D",
  "PERF401",
  "PERF402",
  "PLC0415",
  "PLR2004",
  "S101",
  "S105",
  "S106",
  "S108",
  "SLF001",
  "TC001",
  "TC003",
]
lint.per-file-ignores."readers/**/tests/**" = [
  "ANN",
  "D",
  "PERF401",
  "PERF402",
  "PLC0415",
  "PLR2004",
  "S101",
  "S105",
  "S106",
  "S108",
  "SLF001",
  "TC001",
  "TC003",
]

[tool.codespell]
check-filenames = true
check-hidden = true
skip = "*.csv,*.html,*.json,*.jsonl,*.pdf,*.txt,*.ipynb"

[tool.mypy]
python_version = "3.10"
strict = true
explicit_package_bases = true
mypy_path = "readers/llama-index-readers-xberg:node_parsers/llama-index-node-parser-xberg"
overrides = [ { module = [ "xberg", "xberg.*" ], follow_imports = "skip" } ]
