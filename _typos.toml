# Configuration for the typos spell checker.
# https://github.com/crate-ci/typos

[default]
extend-ignore-re = [
  # Hex strings (e.g. commit hashes, checksums)
  "[a-fA-F0-9]{32,}",
  # Base64 encoded strings
  "[A-Za-z0-9+/]{40,}={0,2}",
  # URLs — avoid flagging path segments
  "https?://[^\\s]+",
]

[default.extend-words]
# Project-specific terms that are not typos.
# Keys are lowercase; values must match the key exactly.
kreuzberg = "kreuzberg"
zensical = "zensical"
pdfium = "pdfium"
tesseract = "tesseract"
onnx = "onnx"
surrealdb = "surrealdb"
docling = "docling"
markitdown = "markitdown"
pymupdf = "pymupdf"
openwebui = "openwebui"
webui = "webui"
wasm = "wasm"
mkdocs = "mkdocs"
rumdl = "rumdl"
flate = "flate"
tha = "tha"

[default.extend-identifiers]
# Allow these identifiers in code
PyMuPDF = "PyMuPDF"
MarkItDown = "MarkItDown"
SurrealDB = "SurrealDB"
PDFium = "PDFium"
WebUI = "WebUI"

[files]
extend-exclude = [
  # Test fixtures and vendor files
  "test_documents/",
  "fixtures/",
  # Lock files
  "*.lock",
  "pnpm-lock.yaml",
  # Build artifacts
  "target/",
  "node_modules/",
  "dist/",
  "site/",
  # Code snippets (validated separately by snippet-runner)
  "docs/snippets/",
  # Generated files
  "docs/CHANGELOG.md",
  # Vendored / third-party code
  "**/vendor/",
  "**/vendored/",
  # Binary files
  "*.whl",
  "*.tar.gz",
  "*.png",
  "*.ico",
  "*.svg",
]
