<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <title>Organization Chart</title>
  <desc>Company organizational structure showing departments and roles</desc>

  <!-- CEO -->
  <rect x="300" y="20" width="200" height="60" rx="8" fill="#2c3e50" stroke="#1a252f"/>
  <text x="400" y="45" text-anchor="middle" fill="white" font-family="Arial" font-size="14" font-weight="bold">Jane Smith</text>
  <text x="400" y="65" text-anchor="middle" fill="#bdc3c7" font-family="Arial" font-size="11">Chief Executive Officer</text>

  <!-- CTO -->
  <rect x="50" y="140" width="180" height="60" rx="8" fill="#2980b9" stroke="#1f6da0"/>
  <text x="140" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Bob Chen</text>
  <text x="140" y="185" text-anchor="middle" fill="#d4e6f1" font-family="Arial" font-size="11">Chief Technology Officer</text>

  <!-- CFO -->
  <rect x="310" y="140" width="180" height="60" rx="8" fill="#27ae60" stroke="#1e8449"/>
  <text x="400" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Maria Garcia</text>
  <text x="400" y="185" text-anchor="middle" fill="#d5f5e3" font-family="Arial" font-size="11">Chief Financial Officer</text>

  <!-- COO -->
  <rect x="570" y="140" width="180" height="60" rx="8" fill="#8e44ad" stroke="#6c3483"/>
  <text x="660" y="165" text-anchor="middle" fill="white" font-family="Arial" font-size="13" font-weight="bold">Alex Johnson</text>
  <text x="660" y="185" text-anchor="middle" fill="#e8daef" font-family="Arial" font-size="11">Chief Operating Officer</text>

  <!-- Engineering -->
  <rect x="20" y="260" width="150" height="50" rx="6" fill="#3498db" stroke="#2980b9"/>
  <text x="95" y="290" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Engineering</text>

  <!-- Product -->
  <rect x="190" y="260" width="150" height="50" rx="6" fill="#3498db" stroke="#2980b9"/>
  <text x="265" y="290" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Product</text>

  <!-- Finance -->
  <rect x="360" y="260" width="150" height="50" rx="6" fill="#2ecc71" stroke="#27ae60"/>
  <text x="435" y="290" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Finance</text>

  <!-- Sales -->
  <rect x="530" y="260" width="150" height="50" rx="6" fill="#9b59b6" stroke="#8e44ad"/>
  <text x="605" y="290" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Sales</text>

  <!-- Operations -->
  <rect x="700" y="260" width="150" height="50" rx="6" fill="#9b59b6" stroke="#8e44ad"/>
  <text x="775" y="290" text-anchor="middle" fill="white" font-family="Arial" font-size="12">Operations</text>

  <!-- Team members -->
  <text x="95" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">15 engineers</text>
  <text x="265" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">8 product managers</text>
  <text x="435" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">6 analysts</text>
  <text x="605" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">12 sales reps</text>
  <text x="775" y="340" text-anchor="middle" font-family="Arial" font-size="10" fill="#555">10 ops staff</text>

  <!-- Connecting lines -->
  <line x1="400" y1="80" x2="140" y2="140" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="400" y1="80" x2="400" y2="140" stroke="#7f8c8d" stroke-width="2"/>
  <line x1="400" y1="80" x2="660" y2="140" stroke="#7f8c8d" stroke-width="2"/>

  <!-- Summary -->
  <text x="400" y="400" text-anchor="middle" font-family="Arial" font-size="13" fill="#333">Total headcount: 51 employees across 5 departments</text>
  <text x="400" y="420" text-anchor="middle" font-family="Arial" font-size="11" fill="#777">Last updated: January 2024</text>
</svg>
