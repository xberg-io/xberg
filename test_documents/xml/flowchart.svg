<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <title>Software Development Lifecycle</title>
  <desc>A flowchart showing the stages of software development</desc>

  <!-- Requirements box -->
  <rect x="50" y="30" width="150" height="50" rx="10" fill="#4a90d9" stroke="#2c5f8a" stroke-width="2"/>
  <text x="125" y="60" text-anchor="middle" fill="white" font-family="Arial" font-size="14">Requirements</text>

  <!-- Design box -->
  <rect x="50" y="120" width="150" height="50" rx="10" fill="#50b848" stroke="#357a2e" stroke-width="2"/>
  <text x="125" y="150" text-anchor="middle" fill="white" font-family="Arial" font-size="14">Design</text>

  <!-- Implementation box -->
  <rect x="50" y="210" width="150" height="50" rx="10" fill="#f5a623" stroke="#c17d0e" stroke-width="2"/>
  <text x="125" y="240" text-anchor="middle" fill="white" font-family="Arial" font-size="14">Implementation</text>

  <!-- Testing box -->
  <rect x="50" y="300" width="150" height="50" rx="10" fill="#d0021b" stroke="#8e0112" stroke-width="2"/>
  <text x="125" y="330" text-anchor="middle" fill="white" font-family="Arial" font-size="14">Testing</text>

  <!-- Arrows -->
  <line x1="125" y1="80" x2="125" y2="120" stroke="#333" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="125" y1="170" x2="125" y2="210" stroke="#333" stroke-width="2"/>
  <line x1="125" y1="260" x2="125" y2="300" stroke="#333" stroke-width="2"/>

  <!-- Side annotations -->
  <text x="250" y="60" font-family="Arial" font-size="12" fill="#666">Gather user needs and constraints</text>
  <text x="250" y="150" font-family="Arial" font-size="12" fill="#666">Architecture and interface planning</text>
  <text x="250" y="240" font-family="Arial" font-size="12" fill="#666">Write and review source code</text>
  <text x="250" y="330" font-family="Arial" font-size="12" fill="#666">Verify correctness and performance</text>

  <!-- Footer -->
  <text x="300" y="385" text-anchor="middle" font-family="Arial" font-size="11" fill="#999">Software Development Lifecycle v2.0</text>
</svg>
