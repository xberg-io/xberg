apiVersion: v1
kind: Pod
metadata:
  name: "{{ include "kreuzberg.fullname" . }}-test-connection"
  labels:
    {{- include "kreuzberg.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  containers:
    - name: wget
      image: busybox:latest
      command: ['wget']
      args: ['--spider', '--timeout=5', '{{ include "kreuzberg.fullname" . }}:{{ .Values.service.port }}/health']
  restartPolicy: Never
