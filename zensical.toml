[project.theme]
name = "material"
custom_dir = "docs/overrides"
logo = "assets/logo.svg"
favicon = "assets/favicon.ico"
language = "en"
features = [
  "content.code.copy",
  "content.code.annotate",
  "content.tabs.link",
  "navigation.instant",
  "navigation.instant.progress",
  "navigation.path",
  "navigation.prune",
  "navigation.indexes",
  "navigation.sections",
  "navigation.tabs",
  "navigation.tabs.sticky",
  "navigation.tracking",
  "navigation.top",
  "search.highlight",
  "search.share",
  "search.suggest",
  "toc.follow",
  "toc.integrate",
  "announce.dismiss",
]

[project.theme.font]
text = "Inter"
code = "JetBrains Mono"

[project.theme.icon]
repo = "github"
search = "search"

# First palette is the default (dark). Second is light; users can toggle via header.
[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"

[project.theme.palette.toggle]
icon = "sun"
name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"

[project.theme.palette.toggle]
icon = "moon"
name = "Switch to dark mode"

# --- Markdown Extensions ---

[project.markdown_extensions.admonition]

[project.markdown_extensions.attr_list]

[project.markdown_extensions.def_list]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.toc]
permalink = true
toc_depth = 3

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
options = { custom_icons = ["docs/overrides/.icons"] }

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
linenums = false
use_pygments = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.keys]

[project.markdown_extensions.pymdownx.mark]

[project.markdown_extensions.pymdownx.smartsymbols]

[project.markdown_extensions.pymdownx.snippets]
base_path = [".", "docs"]
check_paths = true

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true

[project.markdown_extensions.pymdownx.tabbed.slugify]
case = "lower"

[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true

# --- Plugins ---

[project.plugins.search]

[project.plugins.mkdocstrings]
default_handler = "python"

[project.plugins.mkdocstrings.handlers.python]
paths = ["packages/python"]

[project.plugins.mkdocstrings.handlers.python.options]
show_source = true
show_root_heading = true
heading_level = 2
show_category_heading = true
show_if_no_docstring = false
show_signature_annotations = true
show_submodules = false
docstring_style = "google"
docstring_section_style = "spacy"

