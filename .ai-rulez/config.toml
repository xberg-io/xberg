# AI-Rulez Configuration (migrated to V4 TOML format)
# Documentation: https://github.com/Goldziher/ai-rulez

version = '4.0'
name = 'Xberg'
description = 'Rust document intelligence library with active Python, TypeScript/Node, Ruby, PHP, Go, Java, C#, Elixir, WebAssembly, Dart, Kotlin Android, Swift, Zig, and C FFI bindings'
gitignore = true
presets = ['claude', 'copilot', 'cursor', 'antigravity', 'codex']
builtins = [
    'rust',
    'python',
    'go',
    'java',
    'ruby',
    'php',
    'csharp',
    'elixir',
    'wasm',
    'pyo3',
    'napi-rs',
    'magnus',
    'ext-php-rs',
    'rustler',
    'cgo',
    'default-commands',
]

[[includes]]
name = 'xberg-core'
source = 'https://github.com/xberg-io/ai-rulez.git'
path = 'modules/core'
merge_strategy = 'local-override'

[[includes]]
name = 'xberg-languages'
source = 'https://github.com/xberg-io/ai-rulez.git'
path = 'modules/languages'
merge_strategy = 'local-override'

[[includes]]
name = 'xberg-cicd'
source = 'https://github.com/xberg-io/ai-rulez.git'
path = 'modules/cicd'
merge_strategy = 'local-override'

[[includes]]
name = 'xberg-infrastructure'
source = 'https://github.com/xberg-io/ai-rulez.git'
path = 'modules/infrastructure'
merge_strategy = 'local-override'

[[includes]]
name = 'xberg-e2e-generator'
source = 'https://github.com/xberg-io/ai-rulez.git'
path = 'modules/e2e-generator'
merge_strategy = 'local-override'

[[installed_skills]]
name = 'alef'
source = 'https://github.com/xberg-io/alef.git'

[[installed_skills]]
name = 'shadcn'
source = 'https://github.com/shadcn-ui/ui.git'

[[mcp_servers]]
name = 'playwright'
description = 'Playwright browser automation for E2E testing and docs verification'
command = 'npx'
args = ['-y', '@playwright/mcp@latest']

[defaults]
effort = 'medium'

[[marketplaces]]
name = "basemind"
source = "Goldziher/basemind"
type = "github"

[[plugins]]
marketplace = "basemind"
name = "basemind"
scope = "project"
enabled = true
