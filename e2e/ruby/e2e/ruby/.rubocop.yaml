inherit_from: ../../packages/ruby/.rubocop.yaml

plugins:
  - rubocop-rspec

AllCops:
  NewCops: enable
  SuggestExtensions: false

RSpec/PredicateMatcher:
  Enabled: false

RSpec/NoExpectationExample:
  Enabled: false

RSpec/RepeatedExample:
  Enabled: false

Metrics/BlockLength:
  Enabled: false

Metrics/MethodLength:
  Enabled: false

Metrics/AbcSize:
  Enabled: false

Metrics/CyclomaticComplexity:
  Enabled: false

Metrics/PerceivedComplexity:
  Enabled: false

Metrics/ModuleLength:
  Enabled: false

Metrics/ParameterLists:
  Enabled: false
