version: "3"

# ============================================================================
# kreuzberg — Root Taskfile
# ============================================================================
# Primary development interface. Rust core tasks delegate to .task/languages/rust.yml.
# All binding language operations (setup, build, test, lint, format, clean,
# update, upgrade, publish) are handled by alef v0.7.9.
#
# Command patterns:
#   task setup         -> install all dependencies
#   task build         -> build core + bindings (debug)
#   task build:release -> build core + bindings (release)
#   task test          -> run all tests
#   task test:e2e      -> generate + run e2e tests for all bindings
#   task test:cov      -> tests with coverage
#   task format        -> format all code (cargo fmt + alef fmt)
#   task lint          -> lint via prek (full pre-commit chain)
#   task update        -> compatible dependency updates everywhere
#   task upgrade       -> aggressive upgrades (cargo upgrade --incompatible,
#                         pnpm up --latest, uv sync --upgrade, bundle update, etc.)
#   task clean         -> remove all build artifacts
#   task publish:*     -> alef publish validate/prepare/build/package
#   task rust:*        -> Rust-specific tasks
# ============================================================================

includes:
  rust:
    taskfile: ./.task/languages/rust.yml
  version:
    taskfile: ./.task/tools/version-sync.yml
  benchmark:
    taskfile: ./.task/workflows/benchmark.yml
  pdfium:
    taskfile: ./.task/tools/pdfium.yml
  docs:
    taskfile: ./.task/tools/docs.yml
  _tools:
    taskfile: ./.task/tools/general.yml
    flatten: true

tasks:
  # === Default ===
  default:
    desc: "List available tasks"
    cmds:
      - task --list

  # === Setup ===
  setup:
    desc: "Install all dependencies and setup development environment"
    cmds:
      - task: rust:install
      - alef setup
      - task: pre-commit:install

  # === Build ===
  build:
    desc: "Build core Rust library and all language bindings (debug)"
    cmds:
      - task: rust:build:dev
      - alef build

  build:release:
    desc: "Build core Rust library and all language bindings (release)"
    cmds:
      - task: rust:build:release
      - alef build --release

  build:ci:
    desc: "Build all in CI mode"
    cmds:
      - task: rust:build:ci

  build:core:
    desc: "Build Rust core library only"
    cmds:
      - task: rust:build

  build:bindings:
    desc: "Build all language bindings (skip Rust core)"
    cmds:
      - alef build

  build:cli:
    desc: "Build the kreuzberg CLI binary"
    cmds:
      - task: rust:cli:build

  # === Test ===
  test:
    desc: "Run all test suites (Rust core + bindings)"
    cmds:
      - task: rust:test
      - alef test

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:e2e:
    desc: "Generate and run e2e tests across all bindings"
    cmds:
      - alef e2e generate
      - alef test --e2e

  test:cov:
    desc: "Run all tests with coverage"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  test:ci:
    desc: "Run all tests with coverage (CI mode, alias for test:cov)"
    cmds:
      - task: test:cov

  # === Lint & Format ===
  lint:
    desc: "Lint all code via prek (pre-commit framework)"
    cmds:
      - prek run --all-files

  lint:check:
    desc: "Lint all code WITHOUT auto-fix (check-only, Rust + bindings)"
    cmds:
      - task: rust:lint:check
      - alef lint

  format:
    desc: "Format all code (Rust + all bindings)"
    cmds:
      - cargo fmt --all
      - alef fmt

  fmt:
    desc: "Format all code (alias for format)"
    cmds:
      - task: format

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  check:
    desc: "Run all checks (format + lint, no modifications)"
    cmds:
      - task: format:check
      - task: lint:check

  # === Update / Upgrade ===
  update:
    desc: "Update dependencies (compatible only)"
    cmds:
      - task: rust:update
      - alef update
      - prek autoupdate

  upgrade:
    desc: "Upgrade dependencies aggressively (cargo upgrade --incompatible, pnpm up --latest, uv sync --upgrade, etc.)"
    cmds:
      - rustup update stable
      - task: rust:upgrade
      - alef update --latest
      - prek autoupdate

  # === Coverage ===
  cov:rust:
    desc: "Generate Rust coverage report"
    cmds:
      - task: rust:test:ci

  cov:all:
    desc: "Generate coverage for all languages"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  # === Version ===
  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - task: version:sync

  # === Alef lifecycle ===
  alef:generate:
    desc: "Run full alef pipeline (generate + stubs + scaffold + readme + docs + e2e)"
    cmds:
      - alef all --clean

  alef:verify:
    desc: "Check bindings are up-to-date (CI mode)"
    cmds:
      - alef verify --exit-code

  alef:build:
    desc: "Build all language bindings"
    cmds:
      - alef build

  alef:sync:
    desc: "Sync version from Cargo.toml to all manifests"
    cmds:
      - alef sync-versions

  alef:docs:
    desc: "Generate API reference documentation"
    cmds:
      - alef docs --output docs/reference/

  # === E2E tests ===
  e2e:generate:
    desc: "Generate E2E tests for all languages from fixtures"
    cmds:
      - alef e2e generate

  e2e:test:
    desc: "Run E2E tests for all languages (alias for test:e2e)"
    cmds:
      - task: test:e2e

  # === Publish ===
  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/

  # === Clean ===
  clean:
    desc: "Remove build artifacts across all languages"
    cmds:
      - cargo clean
      - alef clean
      - rm -rf coverage.lcov dist/ .alef/
