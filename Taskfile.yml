version: "3"

includes:
  _cfg:
    taskfile: .task/config/vars.yml
    internal: true

  rust:
    taskfile: .task/languages/rust.yml

  benchmark:
    taskfile: .task/workflows/benchmark.yml

  pdfium:
    taskfile: .task/tools/pdfium.yml
  docs:
    taskfile: .task/tools/docs.yml
  _tools:
    taskfile: .task/tools/general.yml
    flatten: true

vars:
  RUST_LOG: info

tasks:
  setup:
    desc: "Install all dependencies and initialize project."
    cmds:
      - echo "Installing Rust tools..."
      - task: rust:install
      - alef setup
      - task: pre-commit:install
      - echo "Setup complete"

  build:
    desc: Build core Rust libraries
    cmds:
      - task: rust:build
      - alef build

  test:
    desc: Run Rust test suite
    cmds:
      - task: rust:test
      - alef test

  check:
    desc: Run all linting and formatting checks via prek
    cmds:
      - task: lint

  update:
    desc: Update all dependencies to latest versions
    cmds:
      - echo "Updating Rust dependencies..."
      - task: rust:update
      - alef update
      - echo "Updating prek dependencies..."
      - prek autoupdate
      - echo "All dependencies updated"

  clean:
    desc: Clean all build artifacts
    cmds:
      - task: rust:clean
      - alef clean

  lint:
    desc: Run all linters and formatters via prek (pre-commit framework)
    cmds:
      - prek run --all-files

  build:bindings:
    desc: "Build all language bindings (skip Rust core)"
    cmds:
      - alef build

  test:bindings:
    desc: "Run binding test suites only (skip Rust core)"
    cmds:
      - alef test

  test:ci:
    desc: "Run all tests with coverage (CI mode)"
    cmds:
      - task: rust:test:ci
      - alef test --coverage

  fmt:
    desc: "Format all code"
    cmds:
      - cargo fmt --all
      - alef fmt

  format:
    desc: "Format all code (alias for fmt)"
    cmds:
      - task: fmt

  format:check:
    desc: "Check code formatting without modifications"
    cmds:
      - task: rust:format:check

  versions:sync:
    desc: "Synchronize version from Cargo.toml to all package manifests"
    cmds:
      - alef sync-versions

  # Alef binding generation tasks
  alef:generate:
    desc: Generate all bindings, stubs, scaffolding, and README via alef
    cmds:
      - alef all --clean

  alef:verify:
    desc: Verify all generated bindings are up to date (CI mode)
    cmds:
      - alef verify --exit-code

  alef:build:
    desc: Build all language bindings
    cmds:
      - alef build

  alef:e2e:generate:
    desc: Generate e2e tests from fixtures
    cmds:
      - alef e2e generate

  alef:e2e:test:
    desc: Run e2e tests for all languages
    cmds:
      - alef test --e2e

  alef:sync:
    desc: Sync version from Cargo.toml to all package manifests
    cmds:
      - alef sync-versions

  alef:docs:
    desc: Generate API reference documentation
    cmds:
      - alef docs --output docs/reference/

  publish:validate:
    desc: "Validate publish manifests are consistent"
    cmds:
      - alef publish validate

  publish:prepare:
    desc: "Prepare packages for publishing (vendor deps, stage FFI)"
    cmds:
      - alef publish prepare

  publish:build:
    desc: "Build release artifacts for all languages"
    cmds:
      - alef publish build

  publish:package:
    desc: "Package built artifacts into distributable archives"
    cmds:
      - alef publish package -o dist/
