packages:
  - "."
  - "crates/*"
  - "packages/*"
  - "packages/**/*"
  - "e2e/**/*"
  - "e2e/*"
  - "!e2e/wasm" # excluded: depends on wasm-pack build output (crates/xberg-wasm/pkg)
allowBuilds:
  esbuild: true
sharedWorkspaceLockfile: true
autoInstallPeers: true
hoist: true
overrides:
  glob: "10.5.0"
minimumReleaseAge: 0
