packages:
  - "."
  - "crates/*"
  - "packages/*"
  - "packages/**/*"
  - "e2e/**/*"
  - "e2e/*"
  - "!e2e/wasm" # excluded: depends on wasm-pack build output (crates/xberg-wasm/pkg)
allowBuilds:
  better-sqlite3: true
  esbuild: true
  onnxruntime-node: true
  protobufjs: false
  sharp: true
onlyBuiltDependencies:
  - better-sqlite3
sharedWorkspaceLockfile: true
autoInstallPeers: true
hoist: true
overrides:
  glob: "10.5.0"
  onnxruntime-node: "1.21.0"
  onnxruntime-web: "1.22.0-dev.20250409-89f8206ba4"
minimumReleaseAge: 0
