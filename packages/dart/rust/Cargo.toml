[package]
name = "xberg-dart"
version = "1.0.0-rc.18"
edition = "2024"
license = "MIT"

[package.metadata.cargo-machete]
# Umbrella + sibling crates are pulled in so flutter_rust_bridge can resolve
# every referenced type, but the generated Rust wrapper only `use`s a subset.
ignored = ["async-trait", "crawlberg", "xberg"]

[lib]
crate-type = ["cdylib", "staticlib"]
[features]
default = ["api", "api-types", "auto-rotate-types", "chunking-tokenizers", "diff", "embedding-presets", "heuristics", "html", "keywords-rake", "keywords-yake", "late-interaction-presets", "layout-types", "liter-llm", "markdown-footnotes", "ocr", "ocr-wasm", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker-presets", "sparse-embedding-presets", "svg", "tokio-runtime", "transcription-types", "tree-sitter", "url-config-types", "url-ingestion", "xml"]
api = ["xberg/api"]
api-types = ["xberg/api-types"]
auto-rotate-types = ["xberg/auto-rotate-types"]
chunking-tokenizers = ["xberg/chunking-tokenizers"]
diff = ["xberg/diff"]
embedding-presets = ["xberg/embedding-presets"]
heuristics = ["xberg/heuristics"]
html = ["xberg/html"]
keywords-rake = ["xberg/keywords-rake"]
keywords-yake = ["xberg/keywords-yake"]
late-interaction = ["xberg/late-interaction"]
late-interaction-presets = ["xberg/late-interaction-presets"]
layout-types = ["xberg/layout-types"]
liter-llm = ["xberg/liter-llm"]
markdown-footnotes = ["xberg/markdown-footnotes"]
ocr = ["xberg/ocr"]
ocr-wasm = ["xberg/ocr-wasm"]
office = ["xberg/office"]
paddle-ocr-types = ["xberg/paddle-ocr-types"]
pdf = ["xberg/pdf"]
presets = ["xberg/presets"]
quality = ["xberg/quality"]
redaction = ["xberg/redaction"]
reranker = ["xberg/reranker"]
reranker-presets = ["xberg/reranker-presets"]
sparse-embedding-presets = ["xberg/sparse-embedding-presets"]
sparse-embeddings = ["xberg/sparse-embeddings"]
svg = ["xberg/svg"]
tokio-runtime = ["xberg/tokio-runtime"]
transcription-types = ["xberg/transcription-types"]
tree-sitter = ["xberg/tree-sitter"]
url-config-types = ["xberg/url-config-types"]
url-ingestion = ["xberg/url-ingestion"]
xml = ["xberg/xml"]
android-target = ["xberg/android-target", "api", "api-types", "auto-rotate-types", "chunking-tokenizers", "diff", "embedding-presets", "heuristics", "html", "keywords-rake", "keywords-yake", "late-interaction-presets", "layout-types", "liter-llm", "markdown-footnotes", "ocr", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker-presets", "sparse-embedding-presets", "svg", "tokio-runtime", "transcription-types", "tree-sitter", "url-config-types", "url-ingestion", "xml"]

[dependencies]
async-trait = "0.1"
crawlberg = { default-features = false, version = "1.0.3" }
flutter_rust_bridge = "=2.12.0"
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
[target.'cfg(all(target_os = "macos", target_arch = "x86_64"))'.dependencies]
xberg = { path = "../../../crates/xberg", default-features = false, features = ["macos-intel-target"] }
[target.'cfg(not(any(target_os = "android", target_os = "ios", target_os = "windows", all(target_os = "macos", target_arch = "x86_64"))))'.dependencies]
xberg = { path = "../../../crates/xberg", features = ["pdf", "excel", "office", "hwp", "hwpx", "iwork", "email", "html", "xml", "archives", "mdx", "svg", "language-detection", "chunking", "chunking-tokenizers", "quality", "keywords", "diff", "api", "api-types", "mcp", "ocr", "paddle-ocr", "paddle-ocr-types", "layout-detection", "layout-types", "embeddings", "embedding-presets", "reranker", "reranker-presets", "sparse-embeddings", "sparse-embedding-presets", "late-interaction", "late-interaction-presets", "transcription-types", "tree-sitter", "liter-llm", "tokio-runtime", "ner-llm", "ner-onnx", "redaction", "summarization", "classification", "captioning", "qr-codes", "auto-rotate-types", "stopwords"] }
[target.'cfg(target_os = "android")'.dependencies]
xberg = { path = "../../../crates/xberg", default-features = false, features = ["android-target"] }
[target.'cfg(target_os = "ios")'.dependencies]
xberg = { path = "../../../crates/xberg", default-features = false, features = ["android-target"] }
[target.'cfg(target_os = "windows")'.dependencies]
xberg = { path = "../../../crates/xberg", default-features = false, features = ["windows-target"] }

[lints.rust]
# flutter_rust_bridge uses #[cfg(frb_expand)] internally during macro expansion.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
