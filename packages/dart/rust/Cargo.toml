[package]
name = "kreuzberg-dart"
version = "5.0.0-rc.25"
edition = "2024"
license = "Elastic-2.0"

[package.metadata.cargo-machete]
# Umbrella + sibling crates are pulled in so flutter_rust_bridge can resolve
# every referenced type, but the generated Rust wrapper only `use`s a subset.
ignored = ["kreuzberg"]

[lib]
crate-type = ["cdylib", "staticlib"]
[features]
default = ["api", "api-types", "auto-rotate-types", "captioning", "chunking", "chunking-tokenizers", "classification", "diff", "embedding-presets", "embeddings", "enrichment", "heuristics", "html", "keywords-rake", "keywords-yake", "layout-types", "liter-llm", "ner-llm", "ocr", "ocr-wasm", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker", "reranker-presets", "structured", "svg", "tokio-runtime", "transcription-types", "tree-sitter", "xml"]
api = ["kreuzberg/api"]
api-types = ["kreuzberg/api-types"]
auto-rotate-types = ["kreuzberg/auto-rotate-types"]
captioning = ["kreuzberg/captioning"]
chunking = ["kreuzberg/chunking"]
chunking-tokenizers = ["kreuzberg/chunking-tokenizers"]
classification = ["kreuzberg/classification"]
diff = ["kreuzberg/diff"]
embedding-presets = ["kreuzberg/embedding-presets"]
embeddings = ["kreuzberg/embeddings"]
enrichment = ["kreuzberg/enrichment"]
heic = ["kreuzberg/heic"]
heuristics = ["kreuzberg/heuristics"]
html = ["kreuzberg/html"]
keywords-rake = ["kreuzberg/keywords-rake"]
keywords-yake = ["kreuzberg/keywords-yake"]
layout-types = ["kreuzberg/layout-types"]
liter-llm = ["kreuzberg/liter-llm"]
ner-llm = ["kreuzberg/ner-llm"]
ocr = ["kreuzberg/ocr"]
ocr-wasm = ["kreuzberg/ocr-wasm"]
office = ["kreuzberg/office"]
paddle-ocr-types = ["kreuzberg/paddle-ocr-types"]
pdf = ["kreuzberg/pdf"]
presets = ["kreuzberg/presets"]
quality = ["kreuzberg/quality"]
redaction = ["kreuzberg/redaction"]
reranker = ["kreuzberg/reranker"]
reranker-presets = ["kreuzberg/reranker-presets"]
structured = ["kreuzberg/structured"]
svg = ["kreuzberg/svg"]
tokio-runtime = ["kreuzberg/tokio-runtime"]
transcription-types = ["kreuzberg/transcription-types"]
tree-sitter = ["kreuzberg/tree-sitter"]
xml = ["kreuzberg/xml"]
android-target = ["kreuzberg/android-target", "api", "api-types", "auto-rotate-types", "captioning", "chunking", "chunking-tokenizers", "classification", "diff", "embedding-presets", "enrichment", "heuristics", "html", "keywords-rake", "keywords-yake", "layout-types", "liter-llm", "ner-llm", "ocr", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker-presets", "structured", "svg", "tokio-runtime", "transcription-types", "tree-sitter", "xml"]

[dependencies]
async-trait = "0.1"
flutter_rust_bridge = "=2.12.0"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "sync"] }
[target.'cfg(not(any(target_os = "android", target_os = "ios", target_os = "windows")))'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", features = ["pdf", "excel", "office", "hwp", "hwpx", "iwork", "email", "html", "xml", "archives", "mdx", "svg", "language-detection", "chunking", "chunking-tokenizers", "quality", "keywords", "diff", "api", "api-types", "mcp", "ocr", "paddle-ocr", "paddle-ocr-types", "layout-detection", "layout-types", "embeddings", "embedding-presets", "reranker", "reranker-presets", "transcription-types", "tree-sitter", "liter-llm", "tokio-runtime", "ner-llm", "ner-onnx", "redaction", "summarization", "classification", "captioning", "qr-codes", "auto-rotate-types", "stopwords"] }
[target.'cfg(target_os = "android")'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", default-features = false, features = ["android-target"] }
[target.'cfg(target_os = "ios")'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", default-features = false, features = ["android-target"] }
[target.'cfg(target_os = "windows")'.dependencies]
kreuzberg = { path = "../../../crates/kreuzberg", default-features = false, features = ["windows-target"] }

[lints.rust]
# flutter_rust_bridge uses #[cfg(frb_expand)] internally during macro expansion.
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(frb_expand)'] }
