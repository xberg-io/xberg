[package]
name = "xberg-r"
version = "1.0.0-rc.1"
edition = "2024"
license = "MIT"
description = "High-performance document intelligence library"
readme = false
keywords = ["document", "extraction", "ocr", "pdf", "text"]
categories = []

[lib]
crate-type = ["staticlib", "lib"]

[dependencies]
async-trait = "0.1"
extendr-api = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread"] }
xberg = { version = "1.0.0-rc.1", path = "../../../../crates/xberg", features = ["full", "pdf", "ocr", "paddle-ocr", "paddle-ocr-types", "layout-detection", "layout-types", "embeddings", "embedding-presets", "reranker", "reranker-presets", "chunking", "keywords-yake", "keywords-rake", "language-detection", "html", "tree-sitter", "office", "email", "archives", "stopwords", "auto-rotate", "auto-rotate-types", "tokio-runtime", "api", "api-types", "mcp", "liter-llm", "quality", "svg", "transcription", "transcription-types", "classification", "captioning", "ner-onnx", "ner-llm", "diff", "markdown-footnotes", "redaction", "enrichment", "heuristics", "presets", "structured", "url-ingestion"] }

[features]
default = ["api", "api-types", "auto-rotate-types", "chunking-tokenizers", "diff", "enrichment", "heic", "heuristics", "html", "keywords-rake", "keywords-yake", "layout-types", "liter-llm", "markdown-footnotes", "ocr", "ocr-wasm", "office", "paddle-ocr-types", "pdf", "presets", "quality", "redaction", "reranker", "reranker-presets", "svg", "transcription-types", "tree-sitter", "url-ingestion", "xml"]
api = ["xberg/api"]
api-types = ["xberg/api-types"]
auto-rotate-types = ["xberg/auto-rotate-types"]
chunking-tokenizers = ["xberg/chunking-tokenizers"]
diff = ["xberg/diff"]
enrichment = ["xberg/enrichment"]
heic = ["xberg/heic"]
heuristics = ["xberg/heuristics"]
html = ["xberg/html"]
keywords-rake = ["xberg/keywords-rake"]
keywords-yake = ["xberg/keywords-yake"]
layout-types = ["xberg/layout-types"]
liter-llm = ["xberg/liter-llm"]
markdown-footnotes = ["xberg/markdown-footnotes"]
ocr = ["xberg/ocr"]
ocr-wasm = ["xberg/ocr-wasm"]
office = ["xberg/office"]
paddle-ocr-types = ["xberg/paddle-ocr-types"]
pdf = ["xberg/pdf"]
presets = ["xberg/presets"]
quality = ["xberg/quality"]
redaction = ["xberg/redaction"]
reranker = ["xberg/reranker"]
reranker-presets = ["xberg/reranker-presets"]
svg = ["xberg/svg"]
transcription-types = ["xberg/transcription-types"]
tree-sitter = ["xberg/tree-sitter"]
url-ingestion = ["xberg/url-ingestion"]
xml = ["xberg/xml"]
